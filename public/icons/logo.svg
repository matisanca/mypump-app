<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pump Team">
  <!-- Fondo brand verde -->
  <rect width="512" height="512" rx="96" fill="#10b981"/>

  <!-- Torso musculoso estilizado (silueta + detalles internos). Trazo blanco.
       Coordenadas elegidas para centrar la figura con ~50px de aire a cada lado. -->
  <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">

    <!-- Contorno externo: hombros + brazos + cintura + V-line abajo -->
    <path d="
      M 110 195
      C 130 165, 175 145, 210 150
      L 256 178
      L 302 150
      C 337 145, 382 165, 402 195
      L 402 250
      C 395 270, 380 280, 365 282
      L 350 282
      L 340 320
      L 350 360
      L 332 405
      L 296 432
      L 256 442
      L 216 432
      L 180 405
      L 162 360
      L 172 320
      L 162 282
      L 147 282
      C 132 280, 117 270, 110 250
      Z" />

    <!-- Pectoral izquierdo (curva) -->
    <path d="M 210 195 C 195 215, 195 245, 220 265 L 250 275" />
    <!-- Pectoral derecho (espejo) -->
    <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275" />

    <!-- Línea central abdominal -->
    <line x1="256" y1="282" x2="256" y2="405" />

    <!-- Abs: 3 líneas horizontales separando los 6 packs -->
    <line x1="200" y1="312" x2="312" y2="312" />
    <line x1="195" y1="348" x2="317" y2="348" />
    <line x1="190" y1="385" x2="322" y2="385" />

  </g>
</svg>
