    // Si ya estaba abierto, cargar contenido inmediatamente
    if (STATE.adhOpen && !STATE.adhData) {
      const content = $('#adhContent');
      if (content) {
        content.innerHTML = `<div style="padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:13px">Cargando…</div>`;
        window.mypumpDB.getAdherencia30d(TOKEN).then(data => {
          STATE.adhData = data || [];
          if (content) content.innerHTML = renderAdhGrid(STATE.adhData);
        });
      }
    }
  }
}

function renderAguaGlasses(n) {
  let html = '';
  for (let i = 0; i < 12; i++) {
    html += `<span class="agua-glass${i < n ? '' : ' empty'}">💧</span>`;
  }
  return html;
}

let _aguaTimer = null;
function cambiarAgua(delta) {
  const current = MYDAY?.vasos_agua ?? 0;
  const next = Math.max(0, Math.min(12, current + delta));
  if (next === current) return;

  // Actualizar UI inmediatamente (optimistic)
  if (MYDAY) MYDAY.vasos_agua = next;
  else MYDAY = { vasos_agua: next };
  const numEl = $('#aguaNum');
  const glassEl = $('#aguaGlasses');
  if (numEl) numEl.textContent = next;
  if (glassEl) glassEl.innerHTML = renderAguaGlasses(next);

  // Debounce: guardar al servidor 600ms después del último clic
  clearTimeout(_aguaTimer);
  _aguaTimer = setTimeout(() => {
    window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, 'vasos_agua', String(next)).then(res => {
      if (res.success && res.data?.length > 0) MYDAY = res.data[0];
    });
  }, 600);
}

function renderAdhGrid(rows) {
  if (!rows || rows.length === 0) {
    return `<div style="padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:13px">Sin datos aún</div>`;
  }
  // rows ordenados más reciente primero (desde la RPC)
  // Necesitamos reversed para mostrar cronológicamente de izq a der
  const sorted = [...rows].reverse(); // más antiguo primero
  let html = '<div class="adh-grid">';
  sorted.forEach(row => {
    const isHoy = row.fecha === TODAY_LOCAL;
    let cls = 'adh-day vacio';
    if (row.es_valido) cls = 'adh-day valido';
    else if (row.entrenamiento || row.comio_segun_plan != null || row.durmio_bien != null) cls = 'adh-day parcial';
    if (isHoy) cls += ' hoy';
    const label = new Date(row.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    html += `<div class="${cls}" title="${label}"></div>`;
  });
  html += '</div>';
  // Leyenda
  const validos = rows.filter(r => r.es_valido).length;
  html += `<div style="padding:0 var(--space-4) var(--space-4);display:flex;gap:var(--space-3);font-size:12px;color:var(--color-text-muted);align-items:center">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-brand);display:inline-block;opacity:.85"></span> Día cumplido</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-bg-tertiary);border:1px solid var(--color-border);display:inline-block"></span> Sin datos</span>
    <span style="margin-left:auto;font-weight:600;color:var(--color-text-secondary)">${validos}/30</span>
  </div>`;
  return html;
}

/* ---- TABS / THEME ---- */
function setScene(scene) {
  STATE.scene = scene;
  $$('.tab').forEach(t => {
    const active = t.getAttribute('data-scene') === scene;
    t.classList.toggle('is-active', active);
    t.setAttribute('aria-selected', active);
  });
  $$('.scene').forEach(s => s.classList.toggle('is-active', s.id === `scene-${scene}`));

  const dp = $('#dayPicker');
  const hp = $('#hdrProgress');

  if (scene === 'train') {
    updateDayHeader();
    if (dp) dp.hidden = (DATA._dias || []).length <= 1;
    if (hp) hp.hidden = false;
  } else if (scene === 'diet') {
    $('#hdrEyebrow').textContent = 'DIETA · HOY';
    $('#hdrTitle').textContent = 'Plan de alimentación';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  } else if (scene === 'myday') {
    $('#hdrEyebrow').textContent = 'HÁBITOS · HOY';
    $('#hdrTitle').textContent = 'Mi Día';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  } else if (scene === 'revision') {
    $('#hdrEyebrow').textContent = 'REVISIÓN · SEMANAL';
    $('#hdrTitle').textContent = 'Revisión';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  } else if (scene === 'progress') {
    // Rama explicita a proposito: cuando esto era un `else` suelto, cualquier
    // escena nueva heredaba el header de Progreso y parecia un bug de CSS.
    $('#hdrEyebrow').textContent = `PROGRESO · ${DATA.rutina.nombre_plan.split('—')[0].trim().toUpperCase()}`;
    $('#hdrTitle').textContent = 'Tu evolución';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  }

  if (scene === 'train') renderTrain();
  if (scene === 'diet') renderDiet();
  if (scene === 'myday') renderMyday();
  if (scene === 'revision') renderRevision();
  if (scene === 'progress') renderProgress();
  // Recordatorio semanal (P4) DESPUES de pintar la escena: cada render* re-arma
  // el innerHTML entero, asi que si el banner se insertaba antes, el propio
  // render lo borraba y solo reaparecia cuando terminaba alguna carga async.
  try { renderRecordatorio(); } catch (_) {}
  window.scrollTo(0, 0);
}

$$('.tab').forEach(t => t.addEventListener('click', () => setScene(t.getAttribute('data-scene'))));

$('#themeToggle').addEventListener('click', () => {

});

/* ---- INIT ---- */
async function init() {
  // Apply saved theme
  const savedTheme = localStorage.getItem('mypump-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.body.setAttribute('data-theme', savedTheme);

  if (!TOKEN && !DEMO) { showError('no-token'); return; }

  showLoading();
  window.mypumpDB.init();

  let info, rutina, dieta;
  let _fromCache = false;
  if (DEMO) {
    // Sin red: rutina/dieta quedan sin definir y cae al SAMPLE de abajo
    // (_isDemo:true), que ademas apaga todas las escrituras a Supabase.
    info = { nombre: 'Demo Pump Team', perfil: 'natural' };
  } else if ((info = await window.mypumpDB.getClienteInfo(TOKEN))) {
    [rutina, dieta] = await Promise.all([
      window.mypumpDB.getRutinaActiva(TOKEN),
      window.mypumpDB.getDietaActiva(TOKEN),
    ]);
    // Guardar snapshot para modo offline (solo si trajo rutina real con estructura).
    if (rutina && rutina.estructura && rutina.estructura.dias) {
      saveOfflineSnapshot(info, rutina, dieta);
    }
  } else {
    // Distinguir: token inválido (sin error) vs servicio caído / sin conexión.
    const lastErr = window.mypumpDB._lastError;
    if (lastErr) {
      // Servicio caído o sin conexión (network down, 402 cuota, 503, etc.).
      // Antes de rendirse: intentar el último snapshot cacheado → modo offline.
      const snap = loadOfflineSnapshot();
      if (snap && snap.info && snap.rutina) {
        info = snap.info; rutina = snap.rutina; dieta = snap.dieta; _fromCache = true;
        console.warn('[init] offline → usando snapshot cacheado');
      } else {
        console.error('[init] Service error:', lastErr);
        showError('service-down', TOKEN.slice(0,8)+'…');
        return;
      }
    } else {
      // Sin error pero info=null → el token realmente no existe o está revocado
      showError('invalid', TOKEN.slice(0,8)+'…');
      return;
    }
  }

  // Build DATA
  if (rutina && rutina.estructura && rutina.estructura.dias) {
    RUTINA_ID = rutina.id;
    const est = rutina.estructura;
    const dia = getSuggestedDay(est.dias, rutina.id);
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil, objetivo: normObjetivo(est.perfil && est.perfil.objetivo) },
      rutina: {
        nombre_plan: est.nombre_plan || 'Mi plan',
        split: est.split || est.perfil?.split || '',
        semana_actual: rutina.semana_actual || 1,
        semanas_total: est.semanas_total || 1,
        // Macrociclo 2+: la semana se MUESTRA continuada (SEM 13/24) aunque
        // internamente el plan siga siendo 1-12. Solo afecta labels.
        semana_offset: Number(est.semana_offset) || 0,
        // Hay un bloque nuevo EN COLA (se activa al terminar el actual).
        tiene_siguiente: !!rutina.tiene_siguiente,
      },
      dia,
      historico_por_ejercicio: {},
      _dias: est.dias,
      _isDemo: false,
    };
    persistLastDay(dia.id, rutina.id); // persiste el día sugerido como punto de partida
  } else {
    // Demo fallback
    const dia = getSuggestedDay(SAMPLE_RUTINA.dias, 'demo');
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil, objetivo: 'volumen' },
      rutina: { ...SAMPLE_RUTINA, semana_actual: 1 },
      dia,
      historico_por_ejercicio: {},
      _dias: SAMPLE_RUTINA.dias,
      _isDemo: true,
    };
  }

  if (dieta && dieta.estructura && (dieta.estructura.comidas || dieta.estructura.tipos_dia)) {
    DIETA_ID = dieta.id;
    DIET = dieta.estructura;
  } else {
    DIET = SAMPLE_DIET;
  }

  // Restaurar tipo-día seleccionado (Formato B)
  if (DIET.tipos_dia && DIET.tipos_dia.length) {
    const savedTipo = localStorage.getItem('mypump_tipo_dia');
    STATE.activeTipoDia = (DIET.tipos_dia.find(t => t.id === savedTipo) || DIET.tipos_dia[0]).id;
  }

  STATE.meals = buildMeals();

  // Cargar swaps persistidos del localStorage (fast path; sirve como cache de lectura)
  STATE.foodSwaps = JSON.parse(
    localStorage.getItem(`mypump_food_swaps_${DIETA_ID||'demo'}`) || '{}'
  );

  // Hidratar foodSwaps + custom foods desde Supabase (multi-device + truth of source)
  // Es paralelo y no bloqueante; re-renderiza la dieta cuando termina.
  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    hydrateSwapsAndCustomFoodsFromBackend();
  }

  // Swaps de ejercicio (visual/por-sesión) desde localStorage.
  STATE.exerciseSwaps = JSON.parse(
    localStorage.getItem(`mypump_exercise_swaps_${RUTINA_ID||'demo'}`) || '{}'
  );
  // F5 — compat: swaps guardados antes del flag "fijado" se tratan como
  // FIJADOS (la gente los eligió cuando el swap era permanente; no borrarles nada).
  for (const k in STATE.exerciseSwaps) {
    if (STATE.exerciseSwaps[k] && STATE.exerciseSwaps[k].fijado === undefined) {
      STATE.exerciseSwaps[k].fijado = true;
    }
  }
  pruneExerciseSwaps();

  // Catálogo de ejercicios en memoria: cache local sincrónico + refresh async.
  window.MYPUMP_EJERCICIO_DB = window.MYPUMP_EJERCICIO_DB || [];
  hydrateEjercicioDBFromCache();
  if (!(DATA && DATA._isDemo)) loadEjercicioCatalogo();   // no bloqueante

  // Comentarios coach ↔ cliente (para badges + secciones). No bloqueante.
  if (!(DATA && DATA._isDemo)) loadComentarios();

  STATE.session = buildSession();
  prefetchHistoricoDia();

  // Restaurar la sesión del día (estados + series + si el día ya fue cerrado).
  // Reconecta con la sesión real aunque localStorage esté vacío (cambio de
  // dispositivo, incógnito, cache limpio, retroceso de semana).
  await restoreSesionDelDia();

  // Update header initial state (con offset de macrociclo: "SEM 13/24")
  const _wOff = DATA.rutina.semana_offset || 0;
  $('#hdrWeek').textContent = DATA.rutina.semana_actual + _wOff;
  $('#hdrWeekTotal').textContent = DATA.rutina.semanas_total + _wOff;
  updateDayHeader();

  DATA._offline = _fromCache;   // arrancó desde snapshot cacheado (sin conexión)

  if (DEMO) {
    // Sembrar Mi Día para que no quede en "Cargando…": las cargas de red
    // cortan por !TOKEN en demo. Datos de ejemplo, no se guardan.
    MYDAY = { entrenamiento: 'entrene', comio_segun_plan: true, durmio_bien: true, vasos_agua: 2, cardio: false };
    STREAK = { streak: 3, ultimo_dia_valido: TODAY_LOCAL };
    STATE.mydayLoaded = true;
  }

  showApp();
  renderDayPicker();
  renderTrain();
  renderDiet();
  updateOfflineBanner();
  restoreRest();   // B2 — reanudar el timer de descanso si quedó uno corriendo
  // Las escenas se pintan al abrir el tab; los datos se van cargando de fondo.
  // Las tres son independientes entre si: si una falla, las otras cargan igual.
  loadMyday();    // habitos diarios + streak → Mi Día
  loadSalud();    // alimenta la card Salud (Mi Día) Y la de Peso (Revisión)
  loadRevision(); // check + fotos → Revisión
  // Tracking de comidas del día — en background, re-renderiza si la scene es 'diet'
  loadComidasMarcadas();
  // F10 — comidas libres de hoy (foto/manual), suman al anillo
  loadComidasLibres();
  // F1 — días completados de la semana (pinta el picker cuando llega)
  loadDiasCompletados();

  // Outbox: cargar escrituras pendientes de sesiones anteriores y drenarlas.
  if (OUTBOX_ENABLED && !(DATA && DATA._isDemo)) {
    Outbox.load();
    if (Outbox.pending() > 0) Outbox.flushSoon(1500);   // esperar a que asiente el arranque
  }
}

/* ---- OFFLINE: snapshot de datos + banner (R3) ---- */
// Guarda el último cliente/rutina/dieta que trajo el backend, para poder abrir
// la app sin conexión (el gym con mala señal). Junto al service worker (sw.js)
// que cachea el código, esto hace la app usable 100% offline.
function saveOfflineSnapshot(info, rutina, dieta) {
  try {
    localStorage.setItem(`mypump_offline_${TOKEN}`, JSON.stringify({ info, rutina, dieta, ts: Date.now() }));
  } catch (_) {}
}
function loadOfflineSnapshot() {
  try { return JSON.parse(localStorage.getItem(`mypump_offline_${TOKEN}`) || 'null'); }
  catch (_) { return null; }
}
function updateOfflineBanner() {
  const offline = !navigator.onLine || (DATA && DATA._offline);
  let el = document.getElementById('offline-banner');
  if (offline) {
    if (!el) { el = document.createElement('div'); el.id = 'offline-banner'; document.body.appendChild(el); }
    el.textContent = (DATA && DATA._offline)
      ? '⚡ Sin conexión — mostrando tu última rutina guardada. Lo que cargues se sincroniza al volver.'
      : '⚡ Sin conexión — lo que cargues se guarda y se sincroniza al volver.';
    el.classList.add('show');
  } else if (el) {
    el.classList.remove('show');
    // Volvió la conexión: si habíamos arrancado de cache, ya no lo estamos.
    if (DATA) DATA._offline = false;
  }
}
window.addEventListener('online',  updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

/* ---- SWAP MODAL ---- */
let _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
const _swapCache = {};

function openSwapModal(food, comidaId, optIdx, foodIdx) {
  _swapState = { comidaId, optIdx, foodIdx, original:food, selected:null, query:'' };
  const cat = food.category || inferFoodCategory(food);

  if (cat === 'condimento') {
    $('#modalHost').innerHTML = `
    <div class="modal-back" id="swapModalBack">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Sin sustitutos</div>
        <div class="swap-empty">Este alimento no se puede sustituir.</div>
        <button class="btn-secondary" onclick="closeSwapModal()">Cerrar</button>
      </div>
    </div>`;
    $('#swapModalBack').addEventListener('click', e => { if(e.target===e.currentTarget) closeSwapModal(); });
    return;
  }

  // Cache de sustitutos (recalcula si se agregó un custom food después)
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  if (!_swapCache[cacheKey]) {
    _swapCache[cacheKey] = window.MyPump
      ? window.MyPump.foodSwap.findSubstitutes(food)
      : [];
  }

  renderSwapModal();
}

// Card de un sustituto. data-sub usa el índice en allSubs (no en la lista
// mostrada) para que selectSwapCard/confirmSwap sigan funcionando tras agrupar/filtrar.
function _swapCardHtml(s, allSubs, food) {
  const origIdx = allSubs.indexOf(s);
  const origKcal = food.kcal;
  const kcalDiff = origKcal > 0 ? Math.round((s.kcal - origKcal) / origKcal * 100) : 0;
  const sign = kcalDiff > 0 ? '+' : '';
  const dCls = Math.abs(kcalDiff) <= 5 ? 'ok' : 'warn';
  const customBadge = s._isCustom ? '<span class="swap-custom-badge">★ Personalizado</span>' : '';
  const uniBadge = s._universal ? '<span class="swap-uni-badge" style="margin-left:6px">🌍</span>' : '';
  const enLabel = s._en ? `<div class="swap-card-en" style="font-size:11px;color:var(--color-text-muted);margin-top:1px">${s._en}</div>` : '';
  return `<div class="swap-card${origIdx===_swapState.selected?' is-selected':''}" data-sub="${origIdx}" onclick="selectSwapCard(this,${origIdx})">
    <div class="swap-card-info">
      <div class="swap-card-name">${s.name}${uniBadge}${customBadge}</div>
      ${enLabel}
      <div class="swap-card-qty">${s.qty} ${s.unit}</div>
      <div class="swap-card-macros">${s.kcal} kcal · ${s.prot}p / ${s.carb}c / ${s.fat}g</div>
    </div>
    <span class="swap-delta ${dCls}">${sign}${kcalDiff}%</span>
  </div>`;
}

// Lista de sustitutos agrupada: universales (disponibles en cualquier país)

function _swapListHtml(subs, allSubs, food, query) {
  if (!subs.length) {
    return `<div class="swap-empty">${query
      ? `Sin resultados para "${query}". Probá crear tu alimento personalizado.`
      : 'No hay sustitutos equivalentes disponibles dentro del rango de macros.'}</div>`;
  }
  const uni  = subs.filter(s => s._universal);
  const rest = subs.filter(s => !s._universal);
  let html = '';
  if (uni.length) {
    html += `<div class="swap-subs-title">🌍 Disponibles en cualquier país</div>`;
    html += `<div class="swap-list">${uni.map(s => _swapCardHtml(s, allSubs, food)).join('')}</div>`;
  }
  if (rest.length) {
    if (uni.length) html += `<div class="swap-subs-title">Otras opciones</div>`;
    html += `<div class="swap-list">${rest.map(s => _swapCardHtml(s, allSubs, food)).join('')}</div>`;
  }
  return html;
}

/* ---- VISIÓN (F7/F10): foto → JSON vía el servicio Codex de la Mini ---- */
async function visionDesdeFoto(file, tipo) {
  const url = (window.MYPUMP_CONFIG && window.MYPUMP_CONFIG.VISION_URL) || '';
  if (!url) throw new Error('servicio no configurado');
  const b64 = await _fotoABase64Reducida(file, 1024, 0.8);
  const res = await fetch(url + '/vision', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: TOKEN, tipo, imagen_base64: b64 }),
  });
  const j = await res.json().catch(() => null);
  if (!res.ok || !j || !j.ok) throw new Error((j && j.error) || 'servicio no disponible');
  return j.data;
}
// Reduce la foto client-side (≤maxPx, jpeg) para no subir 8 MB por 4G del gym.
function _fotoABase64Reducida(file, maxPx, calidad) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const sc = Math.min(1, maxPx / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(img.width * sc));
        c.height = Math.max(1, Math.round(img.height * sc));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', calidad));
      } catch (e) { reject(e); }
      finally { URL.revokeObjectURL(url); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('no se pudo leer la imagen')); };
    img.src = url;
  });
}

async function saveCustomFood() {
  const name = $('#cfName').value.trim();
  // Campo vacío o inválido → 0 (no forzamos cargar los 5). Negativos se clampean.
  const num = (id) => { const v = parseFloat($('#'+id).value); return isFinite(v) && v > 0 ? v : 0; };
  const prot = num('cfProt');
  const carb = num('cfCarb');
  const fat  = num('cfFat');
  // Si no cargaron kcal, se derivan de los macros (4/4/9). Útil: mucha gente sabe
  // los macros pero no las calorías exactas.
  const kcalRaw = parseFloat($('#cfKcal').value);
  const kcal = ($('#cfKcal').value.trim() !== '' && isFinite(kcalRaw) && kcalRaw > 0)
    ? kcalRaw
    : Math.round(prot * 4 + carb * 4 + fat * 9);
  const unit = $('#cfUnit').value;
  const unitGramsRaw = $('#cfUnitGrams') ? $('#cfUnitGrams').value : '';
  const unitGrams = (unit === 'g' || unit === 'ml') ? null : parseFloat(unitGramsRaw);
  const category = $('#cfCategory').value;

  const errEl = $('#cfErr');
  function showErr(msg) { if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } }

  if (!name) { showErr('El nombre es obligatorio.'); return; }
  if (kcal <= 0 && prot <= 0 && carb <= 0 && fat <= 0) {
    showErr('Cargá al menos las calorías o algún macro.'); return;
  }
  if (unit !== 'g' && unit !== 'ml' && (!unitGrams || unitGrams <= 0)) {
    showErr(`Para "${unit}" indicá cuánto pesa 1 ${unit} en gramos.`); return;
  }

  const foodData = {
    name, kcal, prot, carb, fat, unit,
    unitGrams: unitGrams || undefined,
    category,
  };

  // Demo / sin token: agregar solo en memoria
  if (!TOKEN || (DATA && DATA._isDemo)) {
    const localFood = { ...foodData, _isCustom: true };
    if (!window.MYPUMP_FOOD_DB.find(f => f.name.toLowerCase() === name.toLowerCase())) {
      window.MYPUMP_FOOD_DB.push(localFood);
    }
    _invalidateSwapCache();
    await aplicarCustomFoodComoSwap(name);
    return;
  }

  // Backend
  const res = await window.mypumpDB.createCustomFood(TOKEN, foodData);
  if (!res.success) {
    showErr(res.error || 'No se pudo crear el alimento. Probá de nuevo.');
    return;
  }
  // Agregar a la DB local para que aparezca en los sustitutos
  const created = res.data && res.data[0];
  if (created) {
    const localFood = {
      name: created.name,
      kcal: Number(created.kcal),
      prot: Number(created.prot),
      carb: Number(created.carb),
      fat:  Number(created.fat),
      unit: created.unit,
      unitGrams: created.unit_grams ? Number(created.unit_grams) : undefined,
      category: created.category,
      _isCustom: true,
    };
    const existingIdx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === localFood.name.toLowerCase());
    if (existingIdx >= 0) window.MYPUMP_FOOD_DB[existingIdx] = localFood;
    else window.MYPUMP_FOOD_DB.push(localFood);
  }
  _invalidateSwapCache();
  // "Crear y usar" → aplicarlo de una como sustituto de la comida (antes solo lo
  // agregaba a la lista; si el cliente no lo seleccionaba + Sustituir, no quedaba
  // aplicado y al recargar la comida volvía al original → "desaparecía").
  await aplicarCustomFoodComoSwap(name);
}

// Aplica el custom food recién creado como sustituto del alimento del swap actual
// (persiste local + backend) y muestra la dieta. Replica el flujo de confirmSwap.
async function aplicarCustomFoodComoSwap(name) {
  const orig = _swapState.original;
  if (!orig || _swapState.comidaId == null) { closeCustomFoodModal(); return; }
  const subs = window.MyPump.foodSwap.findSubstitutes(orig) || [];
  const sub  = subs.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (!sub) { closeCustomFoodModal(); return; }  // fallback: queda en la lista para elegir

  const { comidaId, optIdx, foodIdx } = _swapState;
  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  STATE.foodSwaps[key] = { original: orig, current: sub };
  persistSwaps();
  $('#modalHost').innerHTML = '';
  _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
  renderDiet();

  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    Outbox.enqueue('swap', { dietaId: DIETA_ID, comidaId, optIdx: +optIdx, foodIdx: +foodIdx, food: sub },
      `swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}`);
  }
}

function _invalidateSwapCache() {
  for (const k of Object.keys(_swapCache)) delete _swapCache[k];
}

/* ---- PWA: AGREGAR A PANTALLA DE INICIO ----
 * Detecta plataforma (Android Chrome vs iOS Safari) y muestra un prompt
 * para instalar la app como PWA. Una vez instalada (display: standalone)
 * o dismissed, no vuelve a aparecer (persiste en localStorage).
 *
 * Android Chrome: usa el evento beforeinstallprompt → prompt nativo.
 * iOS Safari: NO tiene API de instalación, muestra instrucciones manuales
 * (Compartir → Agregar a pantalla de inicio).
 */
(function setupA2HS() {
  // Si ya está corriendo como PWA instalada, no hacer nada
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  if (isStandalone) return;

  // Si el usuario ya respondió (instalado o dismissed), no volver a mostrar
  const A2HS_KEY = 'mypump_a2hs_v1';
  const stored = localStorage.getItem(A2HS_KEY);
  if (stored === 'installed' || stored === 'dismissed') return;

  // Detección de plataforma
  const ua = navigator.userAgent || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/i.test(ua);
  const isSafariIOS = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);

  let deferredPrompt = null;

  // Android Chrome: capturar el evento para disparar el prompt nativo on-demand
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar nuestro banner; el click llama deferredPrompt.prompt()
    setTimeout(showA2HSBanner, 1500);
  });

  // Si ya está instalada (Chrome dispara 'appinstalled')
  window.addEventListener('appinstalled', () => {
    localStorage.setItem(A2HS_KEY, 'installed');
    closeA2HSBanner();
  });

  // En iOS, no hay beforeinstallprompt — mostrar banner manual después del load
  if (isSafariIOS) {
    // Esperar a que la app cargue completamente para no interrumpir
    setTimeout(() => {
      if (localStorage.getItem(A2HS_KEY)) return; // por las dudas
      showA2HSBanner();
    }, 4000);
  }

  function showA2HSBanner() {
    if (document.getElementById('a2hsBanner')) return; // ya está visible
    const banner = document.createElement('div');
    banner.id = 'a2hsBanner';
    banner.className = 'a2hs-banner';

    if (isSafariIOS) {
      // iOS: instrucciones manuales con icono de Share
      banner.innerHTML = `
        <button class="a2hs-close" id="a2hsClose" aria-label="Cerrar">×</button>
        <div class="a2hs-icon">
          <svg viewBox="0 0 512 512" width="44" height="44">
            <rect width="512" height="512" rx="96" fill="#10b981"/>
            <g fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 110 195 C 130 165, 175 145, 210 150 L 256 178 L 302 150 C 337 145, 382 165, 402 195 L 402 250 C 395 270, 380 280, 365 282 L 350 282 L 340 320 L 350 360 L 332 405 L 296 432 L 256 442 L 216 432 L 180 405 L 162 360 L 172 320 L 162 282 L 147 282 C 132 280, 117 270, 110 250 Z"/>
              <path d="M 210 195 C 195 215, 195 245, 220 265 L 250 275"/>
              <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275"/>
              <line x1="256" y1="282" x2="256" y2="405"/>
              <line x1="200" y1="312" x2="312" y2="312"/>
              <line x1="195" y1="348" x2="317" y2="348"/>
              <line x1="190" y1="385" x2="322" y2="385"/>
            </g>
          </svg>
        </div>
        <div class="a2hs-body">
          <div class="a2hs-title">Tenela como app en tu inicio</div>
          <div class="a2hs-text">
            Tocá
            <svg class="a2hs-share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13"/><path d="m6 8 6-6 6 6"/><rect x="4" y="14" width="16" height="8" rx="2"/></svg>
            <strong>Compartir</strong> abajo y elegí <strong>Pantalla de Inicio</strong>.
          </div>
        </div>`;
    } else {
      // Android Chrome (o navegador con beforeinstallprompt soportado)
      banner.innerHTML = `
        <button class="a2hs-close" id="a2hsClose" aria-label="Cerrar">×</button>
        <div class="a2hs-icon">
          <svg viewBox="0 0 512 512" width="44" height="44">
            <rect width="512" height="512" rx="96" fill="#10b981"/>
            <g fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 110 195 C 130 165, 175 145, 210 150 L 256 178 L 302 150 C 337 145, 382 165, 402 195 L 402 250 C 395 270, 380 280, 365 282 L 350 282 L 340 320 L 350 360 L 332 405 L 296 432 L 256 442 L 216 432 L 180 405 L 162 360 L 172 320 L 162 282 L 147 282 C 132 280, 117 270, 110 250 Z"/>
              <path d="M 210 195 C 195 215, 195 245, 220 265 L 250 275"/>
              <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275"/>
              <line x1="256" y1="282" x2="256" y2="405"/>
              <line x1="200" y1="312" x2="312" y2="312"/>
              <line x1="195" y1="348" x2="317" y2="348"/>
              <line x1="190" y1="385" x2="322" y2="385"/>
            </g>
          </svg>
        </div>
        <div class="a2hs-body">
          <div class="a2hs-title">Instalá MyPump como app</div>
          <div class="a2hs-text">Tenela en tu inicio y abrila como una app, sin el navegador.</div>
        </div>
        <button class="a2hs-install" id="a2hsInstall">Instalar</button>`;
    }

    document.body.appendChild(banner);
    // Animación de entrada
    requestAnimationFrame(() => banner.classList.add('is-open'));

    // Eventos
    document.getElementById('a2hsClose').addEventListener('click', () => {
      localStorage.setItem(A2HS_KEY, 'dismissed');
      closeA2HSBanner();
    });

    const installBtn = document.getElementById('a2hsInstall');
    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) { closeA2HSBanner(); return; }
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') localStorage.setItem(A2HS_KEY, 'installed');
        else localStorage.setItem(A2HS_KEY, 'dismissed');
        deferredPrompt = null;
        closeA2HSBanner();
      });
    }
  }

  function closeA2HSBanner() {
    const b = document.getElementById('a2hsBanner');
    if (!b) return;
    b.classList.remove('is-open');
    setTimeout(() => b.remove(), 250);
  }
})();

/* ---- MANIFEST DINÁMICO ----
 * Si tenemos un TOKEN válido, generamos un manifest blob con el token
 * inyectado en start_url. Así cuando el cliente haga "Agregar a Inicio"
 * en iOS Safari (que respeta el start_url del manifest), el ícono
 * guardado abre /cliente.html?t=TOKEN directamente — sin depender de
 * localStorage que iOS aísla entre Safari y el contexto standalone PWA.
 *
 * Si no hay token, dejamos el manifest estático tal cual.
 */
(function injectDynamicManifest() {
  if (!TOKEN) return;
  try {
    const link = document.querySelector('link[rel="manifest"]');
    if (!link) return;
    // Construir manifest con start_url personalizado
    const manifest = {
      "name": "MyPump — Pump Team",
      "short_name": "MyPump",
      "description": "Tu sector dentro del team. Rutina, dieta y tracking diario.",
      "start_url": "/cliente.html?t=" + encodeURIComponent(TOKEN),
      "scope": "/",
      "display": "standalone",
      "orientation": "portrait",
      "background_color": "#ffffff",
      "theme_color": "#10b981",
      "lang": "es",
      "categories": ["health", "fitness", "lifestyle"],
      "icons": [
        { "src": "/icons/logo.svg?v=3",    "sizes": "any",      "type": "image/svg+xml", "purpose": "any" },
        { "src": "/icons/icon-192.png?v=3","sizes": "192x192",  "type": "image/png",     "purpose": "any maskable" },
        { "src": "/icons/icon-512.png?v=3","sizes": "512x512",  "type": "image/png",     "purpose": "any maskable" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    link.href = URL.createObjectURL(blob);
  } catch(e) { /* sin manifest dinámico, fallback al estático */ }
})();

init();

// Service Worker — offline real (R3). Registro no bloqueante; si falla, la app
// sigue funcionando normal (solo pierde el offline). En localhost por http se
// permite; en producción CF Pages es https.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((e) => console.warn('[sw] no registró:', e));
  });
}
</script>
