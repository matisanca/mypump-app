/* ---- REST TIMER ----
 * Timer wall-clock (basado en Date.now() vs setInterval decremental) para
 * resistir el throttling que hace el navegador cuando la pestaña va a
 * background. Si el usuario sale a otra app/tab y vuelve, el remaining se
 * recalcula contra wall-clock — no se atrasa.
 *
 * Feedback al terminar:
 *   - 3 beeps generados con Web Audio API (oscilador, sin assets)
 *   - Vibración reforzada (patrón largo)
 *   - Notification del sistema si la pestaña está hidden (best-effort)
 *
 * Limitaciones conocidas:
 *   - Si el cliente CIERRA la pestaña: imposible notificar sin Service
 *     Worker + PWA full. Fuera de scope MVP.
 *   - iOS Safari suspende AudioContext si la pestaña queda background >30s.
 *     El beep puede no sonar al volver. La vibración sí dispara.
 *   - Sin persistencia entre recargas (descansos son cortos, raro reload).
 */

let _audioCtx       = null;
let _audioUnlocked  = false;
let _notifAsked     = false;

function unlockAudio() {
  if (_audioUnlocked) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    _audioCtx = new AC();
    // Tocar un buffer silencioso para "desbloquear" iOS Safari
    const b = _audioCtx.createBuffer(1, 1, 22050);
    const src = _audioCtx.createBufferSource();
    src.buffer = b; src.connect(_audioCtx.destination); src.start(0);
    _audioUnlocked = true;
  } catch(e) { /* sin audio, fallback a vibración */ }
}

function playRestDoneBeeps() {
  if (!_audioCtx) return;
  try {
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const now = _audioCtx.currentTime;
    [0, 0.22, 0.44].forEach(offset => {
      const osc  = _audioCtx.createOscillator();
      const gain = _audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      // Envelope rápido attack (10ms) + decay corto (140ms)
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.35, now + offset + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.14);
      osc.connect(gain); gain.connect(_audioCtx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.15);
    });
  } catch(e) {}
}

function fireRestDone() {
  // 1. Beep audio
  playRestDoneBeeps();
  // 2. Vibración reforzada (patrón más largo que el anterior)
  try { navigator.vibrate && navigator.vibrate([400,150,400,150,400]); } catch(e){}
  // 3. Notificación del sistema solo si la pestaña no está visible
  if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
    try {
      const n = new Notification('Descanso completo', {
        body: 'Volvé a la app y arrancá la próxima serie.',
        tag: 'mypump-rest',
        renotify: true,
      });
      setTimeout(() => { try { n.close(); } catch(e){} }, 8000);
      n.onclick = () => { window.focus(); n.close(); };
    } catch(e) {}
  }
}

function maybeAskNotifPermission() {
  if (_notifAsked) return;
  _notifAsked = true;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  try { Notification.requestPermission(); } catch(e) {}
}

function startRest(seconds) {
  stopRest();
  const now = Date.now();
  STATE.rest = {
    endsAt:       now + seconds * 1000,
    target:       seconds,
    intervalId:   null,
    doneFired:    false,
    autoCloseAt:  now + (seconds + 2) * 1000,
  };
  const bar = $('#restBar');
  bar.hidden = false;
  bar.classList.remove('is-done');
  updateRestUI();
  // Pedir permiso de notification la primera vez (no blocking)
  maybeAskNotifPermission();
  // Tick a 250ms: UI más fluida y, ante throttling, latencia ≤250ms para disparar "done"
  STATE.rest.intervalId = setInterval(restTick, 250);
  persistRest();   // B2 — sobrevive cambio de tab / reload
}

/* B2 — Timer de descanso persistente. Guardamos los anclajes wall-clock
   (endsAt/target/autoCloseAt) para poder restaurar el timer tras un reload o
   cambio de app. Como se basa en Date.now(), el tiempo transcurrido mientras la
   app estuvo cerrada se descuenta solo. */
function persistRest() {
  try {
    if (!STATE.rest) { localStorage.removeItem(`mypump_rest_${TOKEN}`); return; }
    localStorage.setItem(`mypump_rest_${TOKEN}`, JSON.stringify({
      endsAt: STATE.rest.endsAt, target: STATE.rest.target, autoCloseAt: STATE.rest.autoCloseAt,
    }));
  } catch (_) {}
}
function restoreRest() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(`mypump_rest_${TOKEN}`) || 'null'); }
  catch (_) { saved = null; }
  if (!saved || !saved.autoCloseAt) return;
  const now = Date.now();
  if (now >= saved.autoCloseAt) { localStorage.removeItem(`mypump_rest_${TOKEN}`); return; }
  stopRest();
  STATE.rest = {
    endsAt:      saved.endsAt,
    target:      saved.target,
    intervalId:  null,
    doneFired:   now >= saved.endsAt,
    autoCloseAt: saved.autoCloseAt,
  };
  const bar = $('#restBar');
  bar.hidden = false;
  bar.classList.toggle('is-done', STATE.rest.doneFired);
  updateRestUI();
  STATE.rest.intervalId = setInterval(restTick, 250);
}

function restTick() {
  if (!STATE.rest) return;
  const now = Date.now();
  // Dispara "done" la primera vez que cruzamos el endsAt
  if (now >= STATE.rest.endsAt && !STATE.rest.doneFired) {
    STATE.rest.doneFired = true;
    $('#restBar').classList.add('is-done');
    fireRestDone();
  }
  // Cerrar 2s después de done
  if (now >= STATE.rest.autoCloseAt) { stopRest(); return; }
  updateRestUI();
}

function stopRest() {
  if (STATE.rest && STATE.rest.intervalId) clearInterval(STATE.rest.intervalId);
  STATE.rest = null;
  $('#restBar').hidden = true;
  $('#restBar').classList.remove('is-done');
  persistRest();   // limpia el timer persistido
}

function updateRestUI() {
  if (!STATE.rest) return;
  const remainingSec = Math.max(0, Math.ceil((STATE.rest.endsAt - Date.now()) / 1000));
  $('#restTime').textContent = fmtTime(remainingSec);
  $('#restTarget').textContent = `/ ${fmtTime(STATE.rest.target)} objetivo`;
  const pct = Math.max(0, Math.min(100, ((STATE.rest.target - remainingSec) / STATE.rest.target) * 100));
  $('#restProgFill').style.width = pct + '%';
}

$$('[data-rest]').forEach(btn => btn.addEventListener('click', () => {
  const v = btn.getAttribute('data-rest');
  if (!STATE.rest) return;
  if (v === 'skip') { stopRest(); return; }
  const deltaSec = parseInt(v);
  STATE.rest.endsAt      += deltaSec * 1000;
  STATE.rest.autoCloseAt += deltaSec * 1000;
  if (deltaSec > 0) STATE.rest.target += deltaSec;
  // Si estábamos en done y sumamos tiempo → salir de done y refire al llegar
  if (STATE.rest.endsAt > Date.now()) {
    STATE.rest.doneFired = false;
    $('#restBar').classList.remove('is-done');
  }
  updateRestUI();
  persistRest();   // guardar los nuevos anclajes tras ±tiempo
}));

// Al volver foreground, forzar un tick para recalcular contra wall-clock
// (compensa el throttling de setInterval cuando la pestaña estuvo background).
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && STATE.rest) restTick();
  // Al volver a foco, drenar escrituras pendientes (pudo haber vuelto la conexión).
  if (!document.hidden && OUTBOX_ENABLED && Outbox.pending() > 0) Outbox.flushSoon(0);
});
// Reintentar en cuanto vuelva la conexión.
window.addEventListener('online', () => { if (OUTBOX_ENABLED) Outbox.flushSoon(0); });

/* ---- DIET SCENE ---- */
/* ---- DIET TRACKING (marcar qué comí + macros consumidos) ----
 * Una marca por (cliente, fecha, comida_id). Si no hay fila → pendiente.
 * Estado: 'comido' | 'saltado'. La marca guarda la opción A/B/C elegida
 * AL MOMENTO de marcar, así si el cliente cambia el tab a otra opción
 * después, el cálculo de macros consumidos mantiene la opción real.
 */
async function loadComidasMarcadas() {
  if (!TOKEN || (DATA && DATA._isDemo)) {
    STATE.comidasMarcadas = {};
    STATE.comidasLoaded = true;
    if (STATE.scene === 'diet') renderDiet();
    return;
  }
  try {
    const rows = await window.mypumpDB.getComidasMarcadas(TOKEN, TODAY_LOCAL);
    const map = {};
    (rows || []).forEach(r => {
      map[r.comida_id] = {
        opcion:     r.opcion_elegida,
        estado:     r.estado,
        marcada_en: r.marcada_en,
        foodsExcluidos: Array.isArray(r.foods_excluidos) ? r.foods_excluidos : [],
      };
    });
    STATE.comidasMarcadas = map;
    STATE.comidasLoaded = true;
    if (STATE.scene === 'diet') renderDiet();
  } catch(e) {
    console.error('[Diet] error cargando comidas marcadas:', e);
    STATE.comidasMarcadas = {};
    STATE.comidasLoaded = true;
  }
}

async function toggleComidaEstado(comidaId, nuevoEstado) {
  // nuevoEstado: 'comido' | 'saltado' | null (null = desmarcar)
  const plan = getActivePlan();
  const comida = plan.comidas.find(c => c.id === comidaId);
  if (!comida) return;
  const optIdx = STATE.meals[comidaId]?.selectedOpt || 0;
  const opcionNombre = comida.options[optIdx]?.name || 'A';

  // Optimistic update. Marcar 'comido' arranca sin exclusiones (comió todo).
  const prev = STATE.comidasMarcadas[comidaId];
  if (nuevoEstado === null) delete STATE.comidasMarcadas[comidaId];
  else STATE.comidasMarcadas[comidaId] = { opcion: opcionNombre, estado: nuevoEstado, foodsExcluidos: [] };
  renderDiet();

  // Modo demo: solo memoria, no backend
  if (!TOKEN || (DATA && DATA._isDemo)) return;

  let res;
  if (nuevoEstado === null) {
    res = await window.mypumpDB.desmarcarComida(TOKEN, TODAY_LOCAL, comidaId);
  } else {
    res = await window.mypumpDB.marcarComida(TOKEN, TODAY_LOCAL, comidaId, opcionNombre, nuevoEstado, []);
  }
  if (!res.success) {
    // Rollback
    if (prev) STATE.comidasMarcadas[comidaId] = prev;
    else delete STATE.comidasMarcadas[comidaId];
    renderDiet();
    console.error('[Diet] error marcando comida:', res.error);
  }
}

// Consumo parcial: incluir/excluir un alimento puntual de una comida ya marcada
// 'comido'. Actualiza foodsExcluidos y re-persiste (retrocompatible).
async function toggleFoodComido(comidaId, foodIdx) {
  const mark = STATE.comidasMarcadas[comidaId];
  if (!mark || mark.estado !== 'comido') return;
  const excl = new Set(mark.foodsExcluidos || []);
  if (excl.has(foodIdx)) excl.delete(foodIdx); else excl.add(foodIdx);
  const nuevos = Array.from(excl).sort((a, b) => a - b);

  const prev = mark.foodsExcluidos || [];
  mark.foodsExcluidos = nuevos;          // optimistic
  renderDiet();

  if (!TOKEN || (DATA && DATA._isDemo)) return;
  const res = await window.mypumpDB.marcarComida(
    TOKEN, TODAY_LOCAL, comidaId, mark.opcion || 'A', 'comido', nuevos
  );
  if (!res.success) {
    mark.foodsExcluidos = prev;          // rollback
    renderDiet();
    console.error('[Diet] error consumo parcial:', res.error);
  }
}

function calcularConsumido() {
  const plan = getActivePlan();
  const tot = { kcal: 0, prot: 0, carb: 0, fat: 0 };
  let nComidas = 0, nComidasMarcadas = 0;
  for (const c of plan.comidas) {
    nComidas++;
    const mark = STATE.comidasMarcadas[c.id];
    if (!mark || mark.estado !== 'comido') continue;
    nComidasMarcadas++;
    // Usar la opción guardada en la marca (no la actualmente seleccionada en UI)
    const optIdx = c.options.findIndex(o => o.name === mark.opcion);
    const opt = c.options[optIdx >= 0 ? optIdx : 0];
    const idxFinal = optIdx >= 0 ? optIdx : 0;
    // Aplicar swaps con getEffectiveFood (respeta sustituciones del cliente)
    const foods = opt.foods.map((f, fi) => getEffectiveFood(f, c.id, idxFinal, fi));
    // Consumo parcial: no sumar los alimentos que el cliente marcó como NO comidos.
    const excluidos = new Set(mark.foodsExcluidos || []);
    foods.forEach((f, fi) => {
      if (excluidos.has(fi)) return;
      tot.kcal += f.kcal || 0;
      tot.prot += f.prot || 0;
      tot.carb += f.carb || 0;
      tot.fat  += f.fat  || 0;
    });
  }
  // F10 — sumar las comidas LIBRES del día (foto del plato / manuales)
  for (const cl of (STATE.comidasLibres || [])) {
    tot.kcal += Number(cl.kcal) || 0;
    tot.prot += Number(cl.prot) || 0;
    tot.carb += Number(cl.carb) || 0;
    tot.fat  += Number(cl.fat)  || 0;
  }
  return { ...tot, nComidas, nComidasMarcadas };
}

async function loadComidasLibres() {
  if (!TOKEN || (DATA && DATA._isDemo) || !window.mypumpDB.getComidasLibres) {
    STATE.comidasLibres = [];
    return;
  }
  try {
    STATE.comidasLibres = (await window.mypumpDB.getComidasLibres(TOKEN, TODAY_LOCAL)) || [];
  } catch (_) { STATE.comidasLibres = []; }
  if (STATE.scene === 'diet') renderDiet();
}

async function guardarComidaLibre(datos) {
  const res = await window.mypumpDB.crearComidaLibre(TOKEN, { ...datos, fecha: TODAY_LOCAL });
  if (res && res.success && res.data && res.data[0]) {
    STATE.comidasLibres.push(res.data[0]);
    renderDiet();
    return true;
  }
  return false;
}

async function borrarComidaLibre(id) {
  const prev = STATE.comidasLibres;
  STATE.comidasLibres = prev.filter(c => c.id !== id);   // optimista
  renderDiet();
  const res = await window.mypumpDB.borrarComidaLibre(TOKEN, id);
  if (!res || !res.success) { STATE.comidasLibres = prev; renderDiet(); }
}

      <div class="consumido-macros">

// ============================================================
// porcionReferencia(food) — referencia de porción casera (mano/objeto/unidades)
// para clientes que no usan balanza. Deriva la equivalencia de los gramos o
// unidades que ya trae el alimento. Devuelve un string (sin el prefijo "≈",
// que lo agrega la UI) o null si no hay match. 100% frontend, no toca backend.
// ============================================================
function porcionReferencia(food) {
  if (!food || typeof food !== 'object') return null;
  const norm = s => (s || '').toString().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
  const name = norm(food.name);
  if (!name) return null;
  const qty = Number(food.qty);
  if (!isFinite(qty) || qty <= 0) return null;
  const unitRaw = norm(food.unit);
  const unitGrams = Number(food.unitGrams);
  const GRAM_UNITS = ['g', 'gr', 'grs', 'gramo', 'gramos'];
  const ML_UNITS = ['ml', 'cc', 'mililitro', 'mililitros'];
  const isMl = ML_UNITS.includes(unitRaw);
  const isGram = unitRaw === '' || GRAM_UNITS.includes(unitRaw) || isMl;
  const UNIT_WORDS = ['u', 'un', 'uni', 'unid', 'unidad', 'unidades'];

  // helpers de formato
  const singular = w => {
    if (w.length > 4 && /ces$/.test(w)) return w.slice(0, -3) + 'z';
    if (w.length > 3 && /es$/.test(w))  return w.slice(0, -2);
    if (w.length > 3 && /s$/.test(w))   return w.slice(0, -1);
    return w;
  };
  const plural = w => /[aeiou]$/.test(w) ? w + 's' : w + 'es';
  const nStr = n => {
    n = Math.round(n * 2) / 2;
    const whole = Math.floor(n);
    const half = (n - whole) === 0.5;
    if (whole === 0) return '½';
    return half ? (whole + '½') : String(whole);
  };
  const fmtCount = (n, base) => {
    n = Math.round(n * 2) / 2;
    if (n <= 0) return null;
    const whole = Math.floor(n);
    const half = (n - whole) === 0.5;
    if (whole === 0) return '½ ' + base;
    if (half) return whole + '½ ' + plural(base);
    return whole + ' ' + (n === 1 ? base : plural(base));
  };
  const nounFromName = () => {
    const stop = new Set(['de', 'del', 'la', 'el', 'los', 'las', 'al', 'con', 'a', 'en', 'sin', 'y']);
    const tokens = name.split(/[\s/]+/).filter(t => t && !stop.has(t));
    return singular(tokens[0] || name);
  };

  // ---- Rama unidad (unit no gramo → qty ya es conteo; o spec: unitGrams) ----
  if (!isGram) {
    let n, base;
    if (unitGrams > 0 && qty > 20) {
      n = qty / unitGrams;
      base = (unitRaw && !UNIT_WORDS.includes(unitRaw)) ? singular(unitRaw) : nounFromName();
    } else if (UNIT_WORDS.includes(unitRaw)) {
      n = qty;
      base = nounFromName();
    } else {
      return null; // unidad ya casera (plato, taza…): no aporta info nueva
    }
    return fmtCount(n, base);
  }

  // ---- Rama gramos / ml ----
  const has = (...kw) => kw.some(k => name.includes(k));
  const g = qty;

  // Formateo de tazas en cuartos (¼ ½ ¾) — la medida de cocina más práctica.
  // Se usa SOLO para categorías que naturalmente se miden en taza (granos,
  // legumbres, yogur). El resto usa fmtCount (mitades: palmas, puños, cucharadas).
  const CUP_FRAC = { 0: '', 0.25: '¼', 0.5: '½', 0.75: '¾' };
  const fmtCup = (cups) => {
    cups = Math.round(cups * 4) / 4;
    if (cups <= 0) return null;
    const whole = Math.floor(cups);
    const frac = CUP_FRAC[cups - whole] || '';
    const num = whole === 0 ? frac : (whole + frac);
    return num + ' ' + (cups > 1 ? 'tazas' : 'taza');
  };

  // Mantequilla/crema de maní untable — cucharadas de 16 g (cdta ≈ 8 g).
  if (has('mani', 'cacahuate') && has('mantequilla', 'manteca', 'crema', 'pasta', 'untable')) {
    if (g < 8) return '1 cucharadita';
    return fmtCount(g / 16, 'cucharada');
  }
  // F6 — Líquidos que se toman en VASO (leche, bebidas, caldos): vaso = 200 ml.
  // Antes caían en la rama de cucharadas del aceite → "200 ml de leche = 13
  // cucharadas". Va ANTES de la rama de aceite.
  if (has('leche', 'bebida', 'jugo', 'zumo', 'licuado', 'gaseosa', 'kefir',
          'caldo', 'infusion', 'yogur bebible', 'chocolatada')) {
    return fmtCount(g / 200, 'vaso');
  }
  // Aceite / manteca / líquidos chicos — cucharada = 15 ml, cucharadita = 5 ml.
  if (isMl || has('aceite', 'oliva', 'ghee') || has('manteca', 'mantequilla')) {
    // Un ml genérico grande (>100) es una bebida, no un condimento → vaso.
    if (isMl && g > 100 && !has('aceite', 'oliva', 'ghee', 'manteca', 'mantequilla')) {
      return fmtCount(g / 200, 'vaso');
    }
    if (g < 7.5) return '1 cucharadita';
    return fmtCount(g / 15, 'cucharada');
  }
  // Frutos secos y semillas — puñado = 30 g (porción estándar).
  if (has('almendra', 'nuez', 'nueces', 'castana', 'avellana', 'pistacho', 'mani',
          'cacahuate', 'frutos secos', 'semilla', 'girasol', 'chia', 'lino', 'mix de')) {
    return fmtCount(g / 30, 'puñado');
  }
  // Proteína en polvo — scoop = 30 g.
  if (has('whey', 'proteina en polvo', 'caseina') || (has('proteina') && g <= 60)) {
    const scoops = Math.max(1, Math.round(g / 30));
    return scoops === 1 ? '1 scoop (1 medida)' : scoops + ' scoops';
  }
  if (has('atun')) {
    const n = g / 120;
    const frac = n - Math.floor(n);
    if (frac >= 0.75) return 'casi ' + Math.ceil(n) + ' latas';
    const nh = Math.round(n * 2) / 2;
    const whole = Math.floor(nh);
    if (nh - whole === 0.5) return whole >= 1 ? (whole + ' lata' + (whole > 1 ? 's' : '') + ' y media') : 'media lata';
    return whole + ' lata' + (whole > 1 ? 's' : '') + ' escurrida' + (whole > 1 ? 's' : '');
  }
  // Carnes y pescado — palma = 100 g COCIDO. Si el nombre dice "crudo/a",
  // se descuenta ~25 % de merma de cocción antes de convertir. Sin techo:
  // 300 g → "3 palmas" (antes colapsaba a "1 palma extra grande").
  if (has('pollo', 'pechuga', 'carne', 'nalga', 'bife', 'cerdo', 'lomo', 'pescado',
          'merluza', 'pavo', 'salmon', 'cuadril', 'cuadrada', 'peceto', 'asado',
          'bondiola', 'milanesa', 'tira', 'magra', 'roast', 'colita')) {
    const gCocido = has('crud') ? g * 0.75 : g;
    return fmtCount(gCocido / 100, 'palma');
  }
  // Granos. Avena en tazas secas (taza = 80 g). Arroz/fideos/quinoa: si vienen
  // "cocido" se miden directo (taza cocida ≈ 175 g); si vienen crudos se muestra
  // la taza cruda + su equivalente cocido con el ratio real de expansión.
  if (has('arroz', 'fideo', 'pasta', 'avena', 'quinoa', 'polenta', 'tallarin',
          'noqui', 'cuscus', 'couscous', 'trigo', 'mostacho', 'spaghetti', 'ravioli')) {
    if (has('avena')) return fmtCup(g / 80);
    const cocido = has('cocid', 'hervid', 'al dente');
    if (cocido) return fmtCup(g / 175);
    let ratio = 2.8, rawCup = 185;                 // arroz por defecto
    if (has('fideo', 'pasta', 'tallarin', 'noqui', 'mostacho', 'spaghetti', 'ravioli', 'cuscus', 'couscous')) { ratio = 2.4; rawCup = 100; }
    else if (has('quinoa')) { ratio = 2.6; rawCup = 170; }
    else if (has('polenta')) { ratio = 4; rawCup = 150; }
    const cruda = fmtCup(g / rawCup);
    const cocidaTaza = fmtCup((g * ratio) / 175);
    if (!cruda) return null;
    return cruda + ' en crudo (≈ ' + cocidaTaza + ' cocido)';
  }
  // Legumbres — taza cocida ≈ 190 g.
  if (has('lenteja', 'garbanzo', 'poroto', 'alubia', 'frijol', 'chaucha seca')) {
    return fmtCup(g / 190);
  }
  // Papa / batata — por tamaño real de verdulería, con múltiplos sin techo.
  if (has('papa', 'patata', 'batata', 'boniato') && !has('papaya')) {
    if (g < 110) return '1 chica';
    if (g <= 190) return '1 mediana';
    if (g <= 280) return '1 grande';
    const n = Math.max(2, Math.round(g / 160));
    return n + ' medianas';
  }
  if (has('lechuga', 'rucula', 'radicheta', 'escarola', 'hojas verdes', 'mix de hojas')) {
    return 'libre 🥗';
  }
  // Verduras — puño = 90 g (≈ 1 taza). Continuo, sin techo.
  if (has('brocoli', 'brecol', 'coliflor', 'calabaza', 'zapallo', 'zanahoria',
          'espinaca', 'morron', 'pimiento', 'berenjena', 'zucchini', 'zapallito',
          'repollo', 'remolacha', 'chaucha', 'cebolla', 'tomate', 'verdura')) {
    return fmtCount(g / 90, 'puño');
  }
  // Yogur / ricota / quesos untables — taza = 245 g. Se elimina "pote"
  // (ambiguo: 120-190 g según marca) a favor de la taza estándar.
  if (has('ricota', 'untable', 'yogur', 'yoghurt', 'queso blanco', 'queso crema',
          'cottage', 'requeson')) {
    return fmtCup(g / 245);
  }
  // Berries — puñado = 80 g. Continuo (140 g → "2 puñados", antes "1").
  if (has('frutilla', 'arandano', 'mora', 'frambuesa', 'frutos rojos', 'berries')) {
    return fmtCount(g / 80, 'puñado');
  }
  if (has('palta', 'aguacate')) {
    if (g <= 90) return 'media palta chica';
    if (g <= 160) return '1 palta';
    return nStr(g / 140) + ' paltas';
  }
  // Pan — rebanada = 30 g (unificado con UNIT_FOODS).
  if (has('pan') && !has('rallado')) {
    const n = Math.max(1, Math.round(g / 30));
    return n + ' rebanada' + (n > 1 ? 's' : '');
  }
  if (has('tostada')) {
    const per = has('arroz') ? 9 : 25;
    const n = Math.max(1, Math.round(g / per));
    return n + ' tostada' + (n > 1 ? 's' : '');
  }

  return null;
}

function renderFood(originalFood, comidaId, optIdx, foodIdx) {
  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  const swap = STATE.foodSwaps[key];
  const f = swap ? swap.current : originalFood;
  const isSwapped = !!swap;
  const cat = originalFood.category || inferFoodCategory(originalFood);
  const swappable = originalFood.swappable !== false && cat !== 'condimento';
  const porcion = porcionReferencia(f);
  const porcionId = `porcion_${comidaId}_${optIdx}_${foodIdx}`;
  const porcionPrefix = porcion && /^libre/.test(porcion) ? '' : '≈ ';

  return `

function renderMeal(c, idx) {
  const st = STATE.meals[c.id] || {selectedOpt:0};
  const optIdx = st.selectedOpt || 0;
  const opt = c.options[optIdx] || c.options[0];
  const displayFoods = opt.foods.map((f,fi) => getEffectiveFood(f, c.id, optIdx, fi));
  const tot = displayFoods.reduce((a,f) => ({
    kcal: a.kcal+(f.kcal||0), prot: a.prot+(f.prot||0),
    carb: a.carb+(f.carb||0), fat:  a.fat+(f.fat||0)
  }), {kcal:0,prot:0,carb:0,fat:0});
  const mealNum = idx !== undefined ? idx+1 : c.id.replace('c','');

  // Estado de tracking (comido/saltado/pendiente)
  const mark = STATE.comidasMarcadas[c.id];
  const estado = mark?.estado;
  const mealCls = 'meal' + (estado === 'comido' ? ' is-comido' : estado === 'saltado' ? ' is-saltado' : '');
  const badge = estado === 'comido'  ? ' <span class="meal-badge ok">✓</span>'
              : estado === 'saltado' ? ' <span class="meal-badge skip">✗</span>'
              : '';

  return `
  <div class="${mealCls}">
    <button class="meal-head" data-meal="${c.id}">
      <span class="meal-num">${mealNum}</span>
      <div class="meal-info">
        <div class="meal-name">${c.name}${badge}</div>
        <div class="meal-sub">opción ${opt.name} · ${opt.foods.length} alimentos</div>
      </div>
      <span class="meal-kcal">${Math.round(tot.kcal)}<small>kcal</small></span>
    </button>
    <div class="meal-track">
      <button class="track-btn track-yes${estado==='comido' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|comido"
              aria-label="Marcar como comido">✓ Comí</button>
      <button class="track-btn track-no${estado==='saltado' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|saltado"
              aria-label="Marcar como saltado">✗ Salté</button>
    </div>
    <div class="meal-body">
      <div class="opt-tabs">
        ${c.options.map((o,i) =>
          `<button class="opt-tab${i===optIdx?' is-active':''}" data-opt="${c.id}|${i}">Opción ${o.name}</button>`
        ).join('')}
      </div>
      ${estado === 'comido'
        ? `<div class="comi-parte-hint">🍽️ Destildá lo que <b>no</b> comiste — solo se cuenta lo tildado.</div>`
        : ''}
      <div class="foods">
        ${opt.foods.map((f,fi) => {
          const foodHtml = renderFood(f, c.id, optIdx, fi);
          if (estado !== 'comido') return foodHtml;
          const excl = (mark.foodsExcluidos || []).includes(fi);
          return `<div class="food-comi-row${excl ? ' is-excluido' : ''}">
            <button class="food-comi-check" data-food-comido="${c.id}|${fi}" role="checkbox" aria-checked="${excl ? 'false' : 'true'}" aria-label="${excl ? 'No comido' : 'Comido'}">${excl ? '' : '✓'}</button>
            <div class="food-comi-body">${foodHtml}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="meal-totals">
        <span><span class="lbl">TOTAL</span></span>
        <span><strong>${Math.round(tot.kcal)}</strong> kcal · <strong>${Math.round(tot.prot)}</strong>p / <strong>${Math.round(tot.carb)}</strong>c / <strong>${Math.round(tot.fat)}</strong>g</span>
      </div>
    </div>
  </div>`;
}

function bindDietEvents() {
  // Selector tipo-día (Formato B)
  $$('[data-tipodía]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    STATE.activeTipoDia = btn.getAttribute('data-tipodía');
    localStorage.setItem('mypump_tipo_dia', STATE.activeTipoDia);
    STATE.meals = buildMeals();
    renderDiet();
  }));
  // Expand/collapse meal (sin acciones hijas)
  $$('[data-meal]').forEach(btn => btn.addEventListener('click', e => {
    if (e.target.closest('[data-opt]') || e.target.closest('[data-swap]') || e.target.closest('[data-revert]') || e.target.closest('[data-comida-mark]')) return;
    renderDiet();
  }));
  // Toggle "✓ Comí" / "✗ Salté" — no expande el meal
  $$('[data-comida-mark]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, accion] = btn.getAttribute('data-comida-mark').split('|');
    const current = STATE.comidasMarcadas[comidaId]?.estado;
    const nuevo = current === accion ? null : accion; // toggle: re-tap desmarca
    toggleComidaEstado(comidaId, nuevo);
  }));

  // F10 — Comidas libres: foto → estimación editable; manual; borrar.
  const clFoto = document.getElementById('clFotoBtn');
  const clInput = document.getElementById('clFotoInput');
  if (clFoto && clInput) {
    clFoto.addEventListener('click', () => clInput.click());
    clInput.addEventListener('change', async () => {
      const file = clInput.files && clInput.files[0];
      if (!file) return;
      clFoto.disabled = true;
      const txtOrig = clFoto.textContent;
      clFoto.textContent = '📷 Analizando el plato… (~30s)';
      try {
        const est = await visionDesdeFoto(file, 'plato');
        openComidaLibreModal(est);
      } catch (e) {
        alert('No pudimos leer la foto (' + (e.message || 'error') + '). Podés cargarla a mano.');
      } finally {
        clFoto.disabled = false;
        clFoto.textContent = txtOrig;
        clInput.value = '';
      }
    });
  }
  const clManual = document.getElementById('clManualBtn');
  if (clManual) clManual.addEventListener('click', () => openComidaLibreModal(null));
  $$('[data-cl-del]').forEach(btn => btn.addEventListener('click', () => {
    borrarComidaLibre(btn.getAttribute('data-cl-del'));
  }));
  // Consumo parcial: incluir/excluir un alimento de una comida marcada "comido"
  $$('[data-food-comido]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, foodIdx] = btn.getAttribute('data-food-comido').split('|');
    toggleFoodComido(comidaId, +foodIdx);
  }));
  // Cambio de opción
  $$('[data-opt]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [id, idx] = btn.getAttribute('data-opt').split('|');
    STATE.meals[id].selectedOpt = +idx;
    renderDiet();
  }));
  // Toggle referencia de porción casera (inline, sin re-render — tap mobile)
  $$('[data-porcion]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = 'porcion_' + btn.getAttribute('data-porcion').replace(/\|/g, '_');
    const ref = document.getElementById(id);
    if (!ref) return;
    const show = ref.hasAttribute('hidden');
    if (show) ref.removeAttribute('hidden'); else ref.setAttribute('hidden', '');
    btn.classList.toggle('is-active', show);
  }));
  // Abrir modal swap
  $$('[data-swap]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-swap').split('|');
    const plan = getActivePlan();
    const comida = plan.comidas.find(c => c.id === comidaId);
    if (!comida) return;
    const food = comida.options[+optIdx]?.foods[+foodIdx];
    if (!food) return;
    openSwapModal(food, comidaId, +optIdx, +foodIdx);
  }));
  // Revertir swap — local + backend
  $$('[data-revert]').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-revert').split('|');
    const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
    delete STATE.foodSwaps[key];
    persistSwaps();
    renderDiet();
    if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
      const res = await window.mypumpDB.deleteFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx);
      if (!res.success) console.warn('[swap] error borrando swap en backend:', res.error);
    }
  }));
}

// Hidrata foodSwaps + custom foods desde Supabase y re-renderiza la dieta.
// También migra los swaps de localStorage al backend la primera vez (one-shot).
async function hydrateSwapsAndCustomFoodsFromBackend() {
  try {
    // 0. Preferencias del cliente (restricciones alimentarias, ej: sin cerdo).
    //    El swap (app.js) lee window.MYPUMP_PREFS.excluir para esconder esos
    //    alimentos de las sugerencias. Invalidar el cache de sustitutos por las dudas.
    try {
      window.MYPUMP_PREFS = await window.mypumpDB.getClientePrefs(TOKEN);
    } catch (e) { window.MYPUMP_PREFS = { excluir: [], idioma: 'es' }; }
    if (typeof _swapCache !== 'undefined') { for (const k in _swapCache) delete _swapCache[k]; }

    // 1. Custom foods → agregar a MYPUMP_FOOD_DB
    const customs = await window.mypumpDB.getCustomFoods(TOKEN) || [];
    customs.forEach(cf => {
      const food = {
        name: cf.name,
        kcal: Number(cf.kcal),
        prot: Number(cf.prot),
        carb: Number(cf.carb),
        fat:  Number(cf.fat),
        unit: cf.unit,
        unitGrams: cf.unit_grams ? Number(cf.unit_grams) : undefined,
        category: cf.category,
        _isCustom: true,
      };
      const idx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === food.name.toLowerCase());
      if (idx >= 0) window.MYPUMP_FOOD_DB[idx] = food;
      else window.MYPUMP_FOOD_DB.push(food);
    });

    // 2. Food swaps remotos
    const remoteSwaps = await window.mypumpDB.getFoodSwaps(TOKEN, DIETA_ID) || [];

    if (remoteSwaps.length === 0 && Object.keys(STATE.foodSwaps).length > 0) {
      // Caso migración: hay swaps en localStorage pero ninguno en backend → subir los locales
      const promises = [];
      for (const [key, swap] of Object.entries(STATE.foodSwaps)) {
        if (!swap || !swap.current) continue;
        // key format: swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}
        const m = key.match(new RegExp(`^swap_${DIETA_ID}_(.+?)_(\\d+)_(\\d+)$`));
        if (!m) continue;
        const [, comidaId, optIdx, foodIdx] = m;
        promises.push(window.mypumpDB.saveFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx, swap.current));
      }
      await Promise.allSettled(promises);
    } else if (remoteSwaps.length > 0) {
      // F8 — MERGE (no reemplazo): el backend gana por key, pero un swap hecho
      // recién/offline que todavía está en el Outbox NO se pisa (antes el
      // reemplazo total lo "revertía" ante los ojos del cliente).
      const newSwaps = {};
      remoteSwaps.forEach(s => {
        const key = `swap_${DIETA_ID}_${s.comida_id}_${s.opt_idx}_${s.food_idx}`;
        newSwaps[key] = { original: null, current: s.food_data };
      });
      const pendientes = (typeof Outbox !== 'undefined' && Outbox.pendingKeys) ? Outbox.pendingKeys() : new Set();
      for (const key in STATE.foodSwaps) {
        if (pendientes.has(key)) newSwaps[key] = STATE.foodSwaps[key];   // local más nuevo, aún sin subir
      }
      STATE.foodSwaps = newSwaps;
      persistSwaps(); // mantener cache local sincronizado
    }

    // Si estamos en la escena de dieta, re-renderizar para reflejar swaps/custom foods
    if (STATE.scene === 'diet') renderDiet();
  } catch (e) {
    console.warn('[init] hydrate swaps/custom foods error:', e);
  }
}

function renderProgress() {
  const root = $('#scene-progress');
  if (!STATE.progressLoaded) {
    // Skeleton de carga (mejor que un texto plano en 3G).
    let sk = `<div class="prog-stats">${'<div class="prog-stat sk-box" style="height:52px"></div>'.repeat(2)}</div>`;
    sk += `<div class="prog-section-title sk-box" style="height:16px;width:40%"></div>`;
    sk += '<div class="exer-row sk-row"><div class="info"><div class="sk-box" style="height:14px;width:60%"></div><div class="sk-box" style="height:11px;width:35%;margin-top:6px"></div></div><div class="sk-box" style="height:36px;width:88px"></div></div>'.repeat(4);
    root.innerHTML = sk;
    loadProgressAndRender();
    return;
  }
  const pd = STATE.progressData;
  let html = `<div class="prog-stats">`;
  for (const s of pd.stats) {
    html += `<div class="prog-stat"><span class="lbl">${s.lbl}</span><span class="val">${s.val}<small>${s.suffix||''}</small></span>${s.delta?`<span class="delta${s.delta.startsWith('-')?' neg':''}">${ICONS.trend} ${s.delta}</span>`:''}</div>`;
  }
  html += `</div>`;
  if (pd.exercises.length) {
    // Agrupar por día (preserva el orden de la rutina)
    const byDia = {};
    for (const ex of pd.exercises) { (byDia[ex.dia] = byDia[ex.dia] || []).push(ex); }
    for (const [dia, exs] of Object.entries(byDia)) {
      html += `<div class="prog-section-title"><span>${dia}</span><span class="meta">máx por sesión</span></div>`;
      for (const ex of exs) {
        html += `
        <button class="exer-row" data-detail="${ex.id}">
          <div class="info">
            <div class="name">${ex.name}${ex.isPR ? ` <span class="pr-badge" title="¡Récord! Tu último tope superó todo lo anterior">🏆 PR</span>` : ''}</div>
            <div class="meta">Top: <strong>${ex.top}</strong></div>
          </div>
          ${sparkSVG(ex.series, 88, 36)}
          <div class="delta${ex.delta && ex.delta.startsWith('-') ? ' neg' : ''}">${ex.delta || '—'}</div>
        </button>`;
      }
    }
  } else {
    html += `<div class="prog-empty">Aún no hay historial registrado.<br>Empezá tu primera sesión para ver el progreso aquí.</div>`;
  }
  root.innerHTML = html;
  $$('[data-detail]').forEach(btn => btn.addEventListener('click', () => openDetail(btn.getAttribute('data-detail'))));
}

async function loadProgressAndRender() {
  // Recorrer TODOS los días de la rutina (no solo el día actual): el progreso
  // debe mostrar cada ejercicio que el cliente entrenó en cualquiera de sus días.
  const dias = DATA._dias || [DATA.dia];
  const allEx = [];
  const seen = new Set();
  for (const d of dias) {
    const diaNombre = (d.nombre || `Día ${getDayNum(d, dias)}`);
    for (const b of (d.bloques || [])) {
      for (const ex of (b.ejercicios || [])) {
        if (ex.tipo === 'calentamiento') continue;
        if (seen.has(ex.id)) continue;     // ids únicos por slot/día
        seen.add(ex.id);
        allEx.push({ id: ex.id, nombre: ex.nombre, dia: diaNombre });
      }
    }
  }

  const results = DEMO
    ? allEx.map(ex => ({ id: ex.id, name: ex.nombre, dia: ex.dia, rows: [] }))
    : await Promise.all(
    allEx.map(ex => window.mypumpDB.getHistoricoEjercicio(TOKEN, ex.id, 24)
      .then(rows => ({ id: ex.id, name: ex.nombre, dia: ex.dia, rows: rows || [] }))
      .catch(() => ({ id: ex.id, name: ex.nombre, dia: ex.dia, rows: [] }))
    )
  );
  // Cache into DATA
  for (const r of results) DATA.historico_por_ejercicio[r.id] = r.rows;

  const exercises = results
    .filter(r => r.rows.length > 0)
    .map(r => {
      // Group by date, take max weight
      const byDate = {};
      for (const row of r.rows) {
        const date = (row.registrado_en || '').split('T')[0];
        if (!date) continue;
        if (byDate[date] === undefined || row.peso_kg > byDate[date]) byDate[date] = row.peso_kg;
      }
      // Ordenar por FECHA ascendente (las filas vienen DESC del backend) y
      // quedarse con las 8 sesiones MÁS RECIENTES. Así series[0]=más vieja y
      // series[último]=más nueva → el delta y la sparkline van en el sentido real.
      const fechasAsc = Object.keys(byDate).sort();   // fechas ISO ordenan como string
      const series = fechasAsc
        .slice(-8)              // 8 más recientes (antes tomaba las 8 más viejas)
        .map(date => byDate[date]);
      if (!series.length) return null;
      const topVal = Math.max(...series);
      const first = series[0], last = series[series.length-1];
      const delta = (series.length > 1 && first > 0) ? ((last-first)/first*100).toFixed(1) : null;
      // PR (🏆): la sesión MÁS reciente marcó un récord absoluto — su peso tope
      // supera a TODAS las sesiones anteriores (todo el histórico, no solo el
      // window de 8). Requiere ≥2 sesiones para que "récord" tenga sentido.
      const allVals = fechasAsc.map(d => byDate[d]);
      const lastVal = allVals[allVals.length - 1];
      const isPR = allVals.length > 1 && lastVal > Math.max(...allVals.slice(0, -1));
      return {
        id: r.id,
        name: r.name,
        dia: r.dia,
        series,
        top: `${topVal}kg`,
        delta: delta ? `${delta > 0 ? '+' : ''}${delta}%` : null,
        best: `${topVal}kg`,
        isPR,
      };
    }).filter(Boolean);

  // Sesiones entrenadas = fechas distintas con registros
  const fechas = new Set();
  for (const r of results) for (const row of r.rows) {
    const dt = (row.registrado_en || '').split('T')[0];
    if (dt) fechas.add(dt);
  }

  STATE.progressData = {
    stats: [
      {lbl:'Ejercicios',  val: exercises.length, suffix:'', delta:null},
      {lbl:'Sesiones',    val: fechas.size,      suffix:'', delta:null},
    ],
    exercises,
  };
  STATE.progressLoaded = true;
  renderProgress();
}

function sparkSVG(series, w, h) {
  const pad = 2;
  const min = Math.min(...series), max = Math.max(...series);
  const range = (max-min) || 1;
  const xStep = (w-pad*2) / Math.max(series.length-1, 1);
  const pts = series.map((v,i) => [pad+i*xStep, h-pad - ((v-min)/range)*(h-pad*2)]);
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${path} L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const last = pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <path d="${area}" fill="var(--color-brand-subtle)"/>
    <path d="${path}" fill="none" stroke="var(--color-brand)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.4" fill="var(--color-brand)" stroke="var(--color-bg-primary)" stroke-width="1.2"/>
  </svg>`;
}

  const rawRows = DATA.historico_por_ejercicio[exId] || [];

function formatFechaLocal(isoDate) {
  // isoDate = 'YYYY-MM-DD'
  const [y, m, d] = isoDate.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

  const res = await window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, campo, valor);
  if (res.success && res.data && res.data.length > 0) {
    MYDAY = res.data[0];
    // Re-render solo las partes que cambiaron
    renderMyday();
    // Actualizar streak si fue un hábito que afecta streak
    if (['entrenamiento','comio_segun_plan','durmio_bien'].includes(campo)) {
      const streakData = await window.mypumpDB.getStreak(TOKEN);
      if (streakData) STREAK = streakData;
      renderMydayStreak();
    }
  }
}

function renderMydayStreak() {
  const el = $('#myday-streak');

  const n = STREAK?.streak || 0;

}

// Valor de un tipo en una fecha, prefiriendo apple_health > rook > manual.

    .sort((a, b) => (pref[a.fuente] ?? 9) - (pref[b.fuente] ?? 9));
  return rows.length ? Number(rows[0].valor) : null;
}

/* ---- PESO CORPORAL en Revisión — N1 ----
   El cliente carga su peso del día; el gráfico muestra 60 días con media móvil
   7d y la banda del rango objetivo semanal según (objetivo × perfil). La media
   que importa es la móvil de 7 días comparada con la de la semana anterior. */

// Normaliza el objetivo libre del Cerebro ("superavit", "Hipertrofia", "cutting"…)
function normObjetivo(raw) {
  const s = String(raw || '').toLowerCase();
  if (/defini|deficit|déficit|cut/.test(s)) return 'definicion';
  if (/volumen|superavit|superávit|hipertrofia|bulk|masa/.test(s)) return 'volumen';
  if (/manten/.test(s)) return 'mantenimiento';
  return 'volumen';   // default histórico del servicio
}

// Rango objetivo semanal en GRAMOS [min, max] según objetivo × perfil.
function rangoPesoSemanal() {
  const obj = (DATA && DATA.cliente && DATA.cliente.objetivo) || 'volumen';
  const farma = ((DATA && DATA.cliente && DATA.cliente.perfil) || 'natural') === 'farma';
  if (obj === 'definicion') return { min: -1000, max: -400, label: 'perder 400 g a 1 kg/sem' };
  if (obj === 'mantenimiento') return { min: -200, max: 200, label: 'mantener (±200 g/sem)' };
  return farma
    ? { min: 350, max: 500, label: 'ganar 350 a 500 g/sem' }
    : { min: 75,  max: 250, label: 'ganar 75 a 250 g/sem' };
}

// Serie de peso por fecha (prefiere carga manual sobre wearable) ordenada asc.
function _pesoSerie() {
  const porFecha = {};
  (STATE.salud || []).filter(r => r.tipo === 'peso_kg').forEach(r => {
    const prev = porFecha[r.fecha];
    if (!prev || (prev.fuente !== 'manual' && r.fuente === 'manual')) porFecha[r.fecha] = r;
  });
  return Object.values(porFecha)
    .map(r => ({ fecha: r.fecha, kg: Number(r.valor) }))
    .filter(p => p.kg > 0)
    .sort((a, b) => a.fecha < b.fecha ? -1 : 1);
}

// Media de los puntos cuya fecha cae en (fechaFin - dias, fechaFin].
function _pesoMedia(serie, fechaFin, dias) {
  const fin = new Date(fechaFin + 'T00:00:00');
  const ini = new Date(fin); ini.setDate(ini.getDate() - dias);
  const vals = serie.filter(p => {
    const d = new Date(p.fecha + 'T00:00:00');
    return d > ini && d <= fin;
  }).map(p => p.kg);
  return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
}

// Gráfico SVG propio: puntos diarios tenues + línea de media móvil 7d.
function pesoChartSVG(serie, w, h) {
  const pad = 6;
  const media = serie.map(p => ({ fecha: p.fecha, kg: _pesoMedia(serie, p.fecha, 7) ?? p.kg }));
  const all = serie.map(p => p.kg).concat(media.map(p => p.kg));
  const min = Math.min(...all), max = Math.max(...all);
  const range = (max - min) || 1;
  const t0 = new Date(serie[0].fecha + 'T00:00:00').getTime();
  const t1 = new Date(serie[serie.length - 1].fecha + 'T00:00:00').getTime();
  const span = (t1 - t0) || 1;
  const X = f => pad + ((new Date(f + 'T00:00:00').getTime() - t0) / span) * (w - pad * 2);
  const Y = v => h - pad - ((v - min) / range) * (h - pad * 2);
  const dots = serie.map(p => `<circle cx="${X(p.fecha).toFixed(1)}" cy="${Y(p.kg).toFixed(1)}" r="1.8" fill="var(--color-text-muted)" opacity=".45"/>`).join('');
  const path = media.map((p, i) => `${i === 0 ? 'M' : 'L'}${X(p.fecha).toFixed(1)},${Y(p.kg).toFixed(1)}`).join(' ');
  const last = media[media.length - 1];
  return `<svg class="peso-chart" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    ${dots}
    <path d="${path}" fill="none" stroke="var(--color-brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(last.fecha)}" cy="${Y(last.kg)}" r="3" fill="var(--color-brand)" stroke="var(--color-bg-primary)" stroke-width="1.4"/>
  </svg>`;
}

function renderMydayPeso() {
  const el = document.getElementById('myday-peso');
  if (!el) return;
  const serie = _pesoSerie();
  const hoyVal = serie.find(p => p.fecha === TODAY_LOCAL);

  // Delta semanal: media 7d vs media de los 7 días anteriores (en gramos).
  const m7 = _pesoMedia(serie, TODAY_LOCAL, 7);
  const dPrev = new Date(TODAY_LOCAL + 'T00:00:00'); dPrev.setDate(dPrev.getDate() - 7);
  const fPrev = `${dPrev.getFullYear()}-${String(dPrev.getMonth()+1).padStart(2,'0')}-${String(dPrev.getDate()).padStart(2,'0')}`;
  const m7prev = _pesoMedia(serie, fPrev, 7);
  const deltaG = (m7 != null && m7prev != null) ? Math.round((m7 - m7prev) * 1000) : null;

  // El RANGO OBJETIVO no se muestra al cliente (lo interpreta Mati en su
  // dashboard — mostrarlo acá marea: el objetivo real a veces difiere).
  let estado = '';
  if (deltaG != null) {
    const signo = deltaG > 0 ? '+' : '';
    estado = `<div class="peso-estado">
      Esta semana: <strong>${signo}${Math.abs(deltaG) >= 1000 ? (deltaG/1000).toFixed(1).replace('.', ',') + ' kg' : deltaG + ' g'}</strong> vs la semana pasada
    </div>`;
  } else if (serie.length) {
    estado = `<div class="peso-estado">Cargá tu peso unos días más para ver la tendencia semanal.</div>`;
  }

  const fmtKg = v => v.toFixed(1).replace('.', ',');
  el.innerHTML = `
    <div class="myday-section">
      <div class="myday-section-hdr">
        <span class="myday-section-icon">⚖️</span>
        <span class="myday-section-title">Peso corporal</span>
        ${m7 != null ? `<span class="peso-media mono">media 7d: <strong>${fmtKg(m7)} kg</strong></span>` : ''}
      </div>
      <div class="myday-section-body">
        <div class="peso-input-row">
          <input type="text" inputmode="decimal" class="peso-input mono" id="pesoInput"
                 placeholder="${hoyVal ? '' : 'kg de hoy'}" value="${hoyVal ? fmtKg(hoyVal.kg) : ''}">
          <button class="peso-save btn-primary" id="pesoSave">${hoyVal ? 'Corregir' : 'Guardar'}</button>
        </div>
        <div class="peso-hint">En ayunas al despertar, siempre en la misma condición.</div>
        ${serie.length >= 2 ? pesoChartSVG(serie, 312, 110) : ''}
        ${estado}
      </div>
    </div>`;

  const input = document.getElementById('pesoInput');
  const btn = document.getElementById('pesoSave');
  const guardar = () => {
    const v = parseFloat(String(input.value).replace(',', '.'));
    if (!isFinite(v) || v < 30 || v > 300) {
      input.style.borderColor = 'var(--color-danger)';
      setTimeout(() => { input.style.borderColor = ''; }, 1200);
      return;
    }
    const valor = Math.round(v * 10) / 10;
    // Update optimista de STATE.salud (el Outbox garantiza la persistencia).
    STATE.salud = (STATE.salud || []).filter(r => !(r.tipo === 'peso_kg' && r.fecha === TODAY_LOCAL && r.fuente === 'manual'));
    STATE.salud.push({ fecha: TODAY_LOCAL, tipo: 'peso_kg', valor, fuente: 'manual' });
    Outbox.enqueue('peso', { fecha: TODAY_LOCAL, valor }, 'peso_' + TODAY_LOCAL);
    renderMydayPeso();
  };
  if (btn) btn.addEventListener('click', guardar);
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); guardar(); } });
}

/* ═══════ FOTOS DE PROGRESO (P2/P3) ═══════
   Se suben al servicio de la Mini (bucket privado). El Blob NO puede ir al
   Outbox (se serializa a localStorage con JSON.stringify y no sobrevive), asi
   que las fotos tienen su propia cola en una clave aparte: si revienta la
   cuota, no se corrompe la cola de series/peso/checks, que es data
   irrecuperable. */
const POSES = [
  { k: 'frente',  label: 'Frente'  },
  { k: 'perfil',  label: 'Perfil'  },
  { k: 'espalda', label: 'Espalda' },
];
const FOTOQ_KEY = () => `mypump_fotoq_${TOKEN}`;
const FOTOS_MAX_PENDIENTES = 3;
const FOTOS_MAX_INTENTOS = 8;   // solo cuenta errores DEL SERVER, no cortes de red

function _lunesISO(fechaISO) {
  const d = new Date(`${fechaISO}T00:00:00`);
  const dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  return d.toLocaleDateString('en-CA');
}

function _fotoqLeer() {
  try { return JSON.parse(localStorage.getItem(FOTOQ_KEY()) || '{}'); } catch { return {}; }
}
function _fotoqGuardar(q) {
  try { localStorage.setItem(FOTOQ_KEY(), JSON.stringify(q)); return true; }
  catch (_) { return false; }   // QuotaExceededError → el caller avisa
}

// Reduce a dataURL JPEG. 900px/0.7 alcanza para comparar fisico
// (1024/0.8 es para OCR de etiquetas). El re-encode por canvas ademas
// ELIMINA EL EXIF, o sea la ubicacion GPS no viaja.
//
// Las fotos de galeria vienen con orientacion EXIF (el iPhone guarda los
// pixeles apaisados + un flag "rotar 90"). Se decodifica con <img> a
// proposito: desde Safari 13.4 / Chrome 81 el navegador aplica esa
// orientacion solo, y drawImage recibe la imagen ya derecha. Se probo con
// createImageBitmap({imageOrientation:'from-image'}), que es mas explicito,
// pero ese diccionario de opciones recien existe en Safari 16.4: en un iPhone
// con iOS 15/16 se ignora en silencio y la foto sale de costado.
function _fotoAJpeg(file, maxPx = 900, calidad = 0.7) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (!w || !h) throw new Error('imagen vacia');
        const esc = Math.min(1, maxPx / Math.max(w, h));
        const c = document.createElement('canvas');
        c.width  = Math.max(1, Math.round(w * esc));
        c.height = Math.max(1, Math.round(h * esc));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const out = c.toDataURL('image/jpeg', calidad);
        // El server valida los magic bytes: si el canvas no pudo dar JPEG,
        // mejor fallar aca con un mensaje entendible que comerse un 400.
        if (!/^data:image\/jpeg;base64,/.test(out)) throw new Error('formato no soportado');
        resolve(out);
      } catch (e) { reject(e); }
      finally { URL.revokeObjectURL(url); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('no se pudo leer la imagen')); };
    img.src = url;
  });
}

const FOTOS_URL = () => (window.MYPUMP_CONFIG && window.MYPUMP_CONFIG.VISION_URL) || '';

async function _subirFoto(pose, dataUrl, fecha) {
  const base = FOTOS_URL();
  if (!base) return { ok: false, error: 'servicio no configurado' };
  try {
    const r = await fetch(base + '/progreso/upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, pose, fecha, imagen_base64: dataUrl }),
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok) return { ok: true, semana: j.semana_lunes };
    // 4xx (salvo 429) = la foto nunca va a entrar: no tiene sentido reintentarla
    // eternamente y dejar la cola trabada. 5xx / red = transitorio, se reintenta.
    const fatal = r.status >= 400 && r.status < 500 && r.status !== 429;
    return { ok: false, fatal, error: j.error || `HTTP ${r.status}` };
  } catch (e) { return { ok: false, fatal: false, red: true, error: 'sin conexión' }; }
}

// Drena la cola de fotos pendientes (se llama al cargar y al volver la red).
async function flushFotos() {
  const q = _fotoqLeer();
  const keys = Object.keys(q);
  if (!keys.length || !navigator.onLine) return;
  for (const k of keys) {
    const item = q[k];
    if (!item || !item.dataUrl) { delete q[k]; continue; }
    const res = await _subirFoto(item.pose, item.dataUrl, item.fecha);
    if (res.ok) { delete q[k]; _fotoqGuardar(q); continue; }
    // Un item RECHAZADO (4xx) se descarta: si no queda adelante en la cola y
    // bloquea para siempre a las que vienen atras.
    // Un fallo de RED no gasta intentos: si el server esta caido o el cliente
    // sin señal, la foto tiene que sobrevivir hasta que vuelva, no perderse.
    if (!res.red) item.intentos = (item.intentos || 0) + 1;
    if (res.fatal || item.intentos >= FOTOS_MAX_INTENTOS) { delete q[k]; _fotoqGuardar(q); continue; }
    _fotoqGuardar(q);
    break;   // sin conexión / server caido: se reintenta después
  }
  _fotoqGuardar(q);
  await loadFotos();
  STATE.fotosUrls = null;          // subio algo de la cola: refirmar
  if (STATE.scene === 'revision') renderMydayFotos();
}

async function loadFotos() {
  if (!TOKEN || (DATA && DATA._isDemo) || !window.mypumpDB.getFotosProgreso) return;
  try {
    const res = await window.mypumpDB.getFotosProgreso(TOKEN, null);
    STATE.fotos = Array.isArray(res) ? res : [];
  } catch (_) { STATE.fotos = STATE.fotos || []; }
}

// URLs firmadas (1h) — solo cuando el usuario abre la galeria.
/* Las fotos viven en un bucket PRIVADO: para mostrarlas hay que pedir URLs
   firmadas. Duran 1h, asi que se cachean 50min y se piden UNA vez, no por
   cada render. Sin esto el cliente subia una foto y no la veia nunca: el slot
   quedaba con un ✓ y la galeria estaba bajo llave hasta la semana 4. */
const FOTOS_URLS_TTL = 50 * 60 * 1000;

async function cargarFotosFirmadas(forzar) {
  const cache = STATE.fotosUrls;
  if (!forzar && cache && cache.exp > Date.now()) return cache.mapa;
  const fotos = await fotosFirmadas();
  if (!fotos.length) return (cache && cache.mapa) || null;
  const mapa = {};
  fotos.forEach(f => { mapa[`${f.semana_lunes}|${f.pose}`] = f.url; });
  STATE.fotosUrls = { mapa, exp: Date.now() + FOTOS_URLS_TTL };
  return mapa;
}

async function fotosFirmadas() {
  const base = FOTOS_URL();
  if (!base) return [];
  try {
    const r = await fetch(base + '/progreso/urls', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN }),
    });
    const j = await r.json().catch(() => ({}));
    return (r.ok && j.ok && Array.isArray(j.fotos)) ? j.fotos : [];
  } catch { return []; }
}

/* ═══════ RECORDATORIO SEMANAL (P4) ═══════
   Insiste TODOS los días hasta que completan (no solo el día del pedido) y
   desaparece solo al completarse. Badge en la tab Revisión + banner arriba en
   Entreno y Dieta. Reusa los patrones .tab-badge y .prog-banner. */
function _pendientesSemana() {
  const sem = _lunesISO(TODAY_LOCAL);
  const faltaCheck = !(STATE.checkin && STATE.checkin.energia);
  let faltanFotos = false;
  if (FOTOS_URL()) {
    const puestas = new Set((STATE.fotos || []).filter(f => f.semana_lunes === sem).map(f => f.pose));
    Object.values(_fotoqLeer()).forEach(p => { if (_lunesISO(p.fecha) === sem) puestas.add(p.pose); });
    faltanFotos = puestas.size < 3;
  }
  return { faltaCheck, faltanFotos, total: (faltaCheck ? 1 : 0) + (faltanFotos ? 1 : 0) };
}

function renderRecordatorio() {
  if (DATA && DATA._isDemo) return;
  const p = _pendientesSemana();

  const badge = document.getElementById('tabBadgeRevision');
  if (badge) {
    if (p.total > 0) { badge.textContent = p.total; badge.hidden = false; }
    else badge.hidden = true;
  }

  document.querySelectorAll('.recordatorio-semanal').forEach(el => el.remove());
  if (p.total === 0 || STATE.scene === 'revision') return;

  const texto = p.faltaCheck && p.faltanFotos ? 'Te faltan <b>tu check y tus fotos</b> de la semana'
              : p.faltaCheck ? 'Te falta <b>tu check de la semana</b>'
              : 'Te faltan <b>tus fotos de la semana</b>';
  const host = document.querySelector(`#scene-${STATE.scene} main, #scene-${STATE.scene}`);
  if (!host) return;
  const div = document.createElement('div');
  div.className = 'prog-banner recordatorio-semanal';
  div.innerHTML = `📋 ${texto} — entrá a <b>Revisión</b>.`;
  div.addEventListener('click', () => {
    const t = [...document.querySelectorAll('.tab')].find(x => x.dataset.scene === 'revision');
    if (t) t.click();
  });
  host.insertBefore(div, host.firstChild);
}

function renderMydayFotos() {
  const el = document.getElementById('myday-fotos');
  if (!el) return;
  if (!FOTOS_URL()) { el.innerHTML = ''; return; }   // servicio no configurado

  const semanaAct = _lunesISO(TODAY_LOCAL);
  const fotos = STATE.fotos || [];
  const pendientes = _fotoqLeer();
  const deEstaSemana = new Set(fotos.filter(f => f.semana_lunes === semanaAct).map(f => f.pose));
  Object.values(pendientes).forEach(p => { if (_lunesISO(p.fecha) === semanaAct) deEstaSemana.add(p.pose); });

  // Semanas con las 3 poses completas (para la serie y el comparador)
  const porSemana = {};
  fotos.forEach(f => { (porSemana[f.semana_lunes] = porSemana[f.semana_lunes] || new Set()).add(f.pose); });
  const semanas = Object.keys(porSemana).sort();
  const completas = semanas.filter(s => porSemana[s].size === 3);

  // Serie: semanas completas consecutivas hacia atrás desde la actual/última
  let serie = 0;
  for (let i = completas.length - 1; i >= 0; i--) {
    const esperada = new Date(`${completas[completas.length - 1]}T00:00:00`);
    esperada.setDate(esperada.getDate() - (completas.length - 1 - i) * 7);
    if (completas[i] === esperada.toLocaleDateString('en-CA')) serie++; else break;
  }

  // Miniatura de la foto de ESTA semana (si ya llegaron las URLs firmadas).
  const urls = (STATE.fotosUrls && STATE.fotosUrls.mapa) || {};
  const slots = POSES.map(p => {
    const lista = deEstaSemana.has(p.k);
    const subiendo = Object.values(pendientes).some(x => x.pose === p.k && _lunesISO(x.fecha) === semanaAct);
    const thumb = urls[`${semanaAct}|${p.k}`];
    return `<button class="fp-slot${lista ? ' is-done' : ''}${thumb ? ' has-thumb' : ''}" data-pose="${p.k}">
      ${thumb ? `<img class="fp-slot-img" src="${thumb}" alt="" loading="lazy">` : ''}
      ${thumb ? '' : `<span class="fp-slot-ico">${lista ? '✓' : '📷'}</span>`}
      <span class="fp-slot-lbl">${p.label}</span>
      ${subiendo ? '<span class="fp-slot-sub">subiendo…</span>' : ''}
    </button>`;
  }).join('');

  // Ver sus propias fotos NO se bloquea nunca: es de ellos y necesitan poder
  // chequear que la foto salio bien. Lo que espera a las 4 semanas es el
  // COMPARADOR antes/despues, que antes de eso compara ruido (luz, hora,
  // retencion de liquido), no cambios reales.
  const faltan = 4 - semanas.length;
  const comparador = semanas.length === 0
    ? `<div class="fp-bloqueado">Con la primera foto arranca tu historial.<br><small>Mismo lugar y misma luz cada semana: asi la comparacion muestra tu cambio y no el del ambiente.</small></div>`
    : `<button class="fp-vergaleria" id="fpVerGaleria">Ver mis fotos · ${semanas.length} semana${semanas.length === 1 ? '' : 's'}</button>` +
      (semanas.length < 4
        ? `<div class="fp-nota-comp">El comparador antes/después se abre en ${faltan} semana${faltan > 1 ? 's' : ''} más.</div>`
        : '');

  el.innerHTML = `
    <div class="myday-section">
      <div class="myday-section-hdr">
        <span class="myday-section-icon">📸</span>
        <span class="myday-section-title">Fotos de la semana</span>
        ${deEstaSemana.size === 3 ? '<span class="ck-saved">✓ completas</span>' : ''}
      </div>
      <div class="myday-section-body">
        <p class="fp-intro">Mismo lugar, misma luz, en ayunas. Las ve <b>solo Mati</b>: no se publican ni salen de la app.</p>
        <div class="fp-slots">${slots}</div>
        ${serie >= 2 ? `<div class="fp-serie">🔥 ${serie} semanas seguidas registradas</div>` : ''}
        ${comparador}
        <div class="fp-msg" id="fpMsg"></div>
      </div>
    </div>`;

  try { renderRecordatorio(); } catch (_) {}

  // Si hay fotos pero todavia no tenemos las URLs firmadas, pedirlas y
  // repintar. Va despues del innerHTML para no demorar el primer pintado.
  if (semanas.length && !(STATE.fotosUrls && STATE.fotosUrls.exp > Date.now()) && !STATE._firmando) {
    STATE._firmando = true;
    cargarFotosFirmadas().then(m => {
      STATE._firmando = false;
      if (m && STATE.scene === 'revision') renderMydayFotos();
    }).catch(() => { STATE._firmando = false; });
  }

  el.querySelectorAll('.fp-slot').forEach(b => b.addEventListener('click', () => _pedirFoto(b.dataset.pose)));
  const ver = document.getElementById('fpVerGaleria');
  if (ver) ver.addEventListener('click', abrirGaleriaFotos);
}

// Un input con capture= abre la camara y NO deja llegar al carrete; uno sin
// capture= abre el selector. Son dos inputs distintos a proposito: sacar el
// atributo en caliente no es confiable en iOS.
function _fpInput(origen) {
  const id = origen === 'galeria' ? 'fpInputGal' : 'fpInputCam';
  let inp = document.getElementById(id);
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'file';
    inp.id = id;
    inp.style.display = 'none';
    if (origen === 'galeria') {
      // .heic/.heif explicito: si no, iOS los muestra en gris en el carrete.
      inp.accept = 'image/*,.heic,.heif';
    } else {
      inp.accept = 'image/*';
      inp.setAttribute('capture', 'environment');
    }
    document.body.appendChild(inp);
  }
  return inp;
}

function _pedirFoto(pose) {
  const et = (POSES.find(p => p.k === pose) || {}).label || 'Foto';
  const ov = document.createElement('div');
  ov.className = 'fp-pick';
  ov.innerHTML = `
    <div class="fp-pick-card" role="dialog" aria-label="Elegir foto">
      <div class="fp-pick-tit">${et}</div>
      <button class="fp-pick-btn" data-origen="camara">📷 Sacar la foto ahora</button>
      <button class="fp-pick-btn" data-origen="galeria">🖼️ Elegir de la galería</button>
      <button class="fp-pick-btn is-cancel" data-origen="">Cancelar</button>
    </div>`;
  const cerrar = () => ov.remove();
  ov.addEventListener('click', (e) => {
    if (e.target === ov) return cerrar();
    const b = e.target.closest('.fp-pick-btn');
    if (!b) return;
    const origen = b.dataset.origen;
    cerrar();
    if (origen) _tomarFoto(pose, origen);
  });
  document.body.appendChild(ov);
}

async function _tomarFoto(pose, origen) {
  const inp = _fpInput(origen);
  inp.value = '';
  inp.onchange = async () => {
    const file = inp.files && inp.files[0];
    inp.value = '';                       // permite re-elegir el MISMO archivo
    if (!file) return;
    const msg = document.getElementById('fpMsg');
    const setMsg = (t, cls = '') => { if (msg) { msg.textContent = t; msg.className = 'fp-msg ' + cls; } };
    setMsg('Preparando la foto…');
    let dataUrl;
    try { dataUrl = await _fotoAJpeg(file); }
    catch { return setMsg('No se pudo leer esa foto. Probá con otra o sacala con la cámara.', 'is-err'); }

    // Encolar (para sobrevivir a cierres/red) y subir enseguida
    const q = _fotoqLeer();
    const key = `${_lunesISO(TODAY_LOCAL)}|${pose}`;
    if (Object.keys(q).length >= FOTOS_MAX_PENDIENTES && !q[key]) {
      setMsg('Hay fotos esperando subir. Probá cuando tengas señal.', 'is-err');
      return;
    }
    // El server corta la conexion si el body pasa los 3 MB, y eso llega al
    // front como 'sin conexion' → trabaria la cola. Se filtra antes de encolar.
    if (dataUrl.length > 2.4e6) return setMsg('Esa foto es demasiado pesada. Probá sacarla con la cámara.', 'is-err');
    q[key] = { pose, fecha: TODAY_LOCAL, dataUrl, intentos: 0 };
    const guardo = _fotoqGuardar(q);
    renderMydayFotos();
    setMsg('Subiendo…');

    const res = await _subirFoto(pose, dataUrl, TODAY_LOCAL);
    if (res.ok) {
      const q2 = _fotoqLeer(); delete q2[key]; _fotoqGuardar(q2);
      await loadFotos();
      STATE.fotosUrls = null;      // que se refirme y aparezca la miniatura
      renderMydayFotos();
      setMsg('Listo, guardada ✓', 'is-ok');
    } else if (res.fatal) {
      // La foto no va a entrar nunca: sacarla de la cola y decir por que.
      const q2 = _fotoqLeer(); delete q2[key]; _fotoqGuardar(q2);
      renderMydayFotos();
      setMsg(`No se pudo guardar: ${res.error}`, 'is-err');
    } else if (guardo) {
      renderMydayFotos();
      setMsg('Sin conexión: queda guardada y se sube sola.', 'is-warn');
    } else {
      renderMydayFotos();
      setMsg('No se pudo guardar. Probá de nuevo con señal.', 'is-err');
    }
  };
  inp.click();
}

async function abrirGaleriaFotos() {
  const msg = document.getElementById('fpMsg');
  if (msg) { msg.textContent = 'Cargando tus fotos…'; msg.className = 'fp-msg'; }
  const mapa = await cargarFotosFirmadas();
  if (msg) msg.textContent = '';
  if (!mapa) { if (msg) { msg.textContent = 'No se pudieron cargar las fotos ahora.'; msg.className = 'fp-msg is-err'; } return; }

  const porSemana = {};
  Object.keys(mapa).forEach(k => {
    const [sem, pose] = k.split('|');
    (porSemana[sem] = porSemana[sem] || {})[pose] = mapa[k];
  });
  const semanas = Object.keys(porSemana).sort();
  if (!semanas.length) return;
  const primera = semanas[0], ultima = semanas[semanas.length - 1];

  // El comparador antes/despues espera a las 4 semanas: antes compara luz,
  // hora y retencion de liquido, no cambios reales. La TIRA por semana no
  // espera nada: son sus fotos y tiene que poder verlas siempre.
  const hayComparador = semanas.length >= 4;

  let bloqueComp = '';
  if (hayComparador) {
    const serieP = _pesoSerie();
    const pesoEn = (sem) => {
      const cand = serieP.filter(p => p.fecha >= sem).sort((a, b) => a.fecha.localeCompare(b.fecha))[0];
      return cand ? cand.kg : null;
    };
    const p0 = pesoEn(primera), p1 = pesoEn(ultima);
    const semDif = Math.round((new Date(ultima) - new Date(primera)) / 6048e5);
    const dKg = (p0 != null && p1 != null) ? (p1 - p0) : null;
    const resumen = `${semDif} semana${semDif === 1 ? '' : 's'}` + (dKg != null ? ` · ${dKg > 0 ? '+' : ''}${dKg.toFixed(1).replace('.', ',')} kg` : '');
    const comparables = POSES.filter(p => porSemana[primera][p.k] && porSemana[ultima][p.k]);
    if (comparables.length) {
      bloqueComp = `
        <div class="fp-comp-tabs">
          ${comparables.map((p, n) => `<button class="fp-comp-tab${n === 0 ? ' is-on' : ''}" data-p="${p.k}">${p.label}</button>`).join('')}
        </div>
        <div class="fp-comp" id="fpComp"></div>
        <div class="fp-comp-meta">${resumen}</div>`;
    }
  } else {
    const faltan = 4 - semanas.length;
    bloqueComp = `<div class="fp-bloqueado">El comparador antes/después se abre en ${faltan} semana${faltan > 1 ? 's' : ''} más.<br><small>Antes de 4 semanas la comparación es ruido: cambia la luz, la hora y la retención de líquido, no vos.</small></div>`;
  }

  const tira = semanas.map((sem, i) => {
    const u = porSemana[sem].frente || Object.values(porSemana[sem])[0];
    const n = Object.keys(porSemana[sem]).length;
    return `<div class="fp-tira-item" data-sem="${sem}"><img src="${u}" loading="lazy" alt=""><span>Sem ${i + 1}${n < 3 ? ` · ${n}/3` : ''}</span></div>`;
  }).join('');

  const cont = document.getElementById('fpGaleria');
  cont.innerHTML = `
    <div class="fp-gal-hdr">
      <strong>Tus fotos</strong>
      <button class="fp-gal-close" id="fpGalClose">✕</button>
    </div>
    ${bloqueComp}
    <div class="fp-tira">${tira}</div>
    <div class="fp-sem" id="fpSem"></div>`;
  cont.classList.add('is-open');

  // Tocar una semana de la tira abre las 3 poses de esa semana.
  const verSemana = (sem) => {
    const idx = semanas.indexOf(sem);
    const fs = porSemana[sem];
    document.getElementById('fpSem').innerHTML = `
      <div class="fp-sem-tit">Semana ${idx + 1}</div>
      <div class="fp-sem-grid">
        ${POSES.filter(p => fs[p.k]).map(p =>
          `<figure><img src="${fs[p.k]}" alt="" loading="lazy"><figcaption>${p.label}</figcaption></figure>`).join('')}
      </div>`;
    cont.querySelectorAll('.fp-tira-item').forEach(x => x.classList.toggle('is-on', x.dataset.sem === sem));
  };
  cont.querySelectorAll('.fp-tira-item').forEach(x =>
    x.addEventListener('click', () => verSemana(x.dataset.sem)));
  verSemana(ultima);   // arranca mostrando la mas reciente

  if (hayComparador && document.getElementById('fpComp')) {
    const pintarComp = (pose) => {
      document.getElementById('fpComp').innerHTML = `
        <figure><img src="${porSemana[primera][pose]}" alt=""><figcaption>Semana 1</figcaption></figure>
        <figure><img src="${porSemana[ultima][pose]}" alt=""><figcaption>Semana ${semanas.length}</figcaption></figure>`;
    };
    const primerTab = cont.querySelector('.fp-comp-tab');
    if (primerTab) pintarComp(primerTab.dataset.p);
    cont.querySelectorAll('.fp-comp-tab').forEach(b => b.addEventListener('click', () => {
      cont.querySelectorAll('.fp-comp-tab').forEach(x => x.classList.remove('is-on'));
      b.classList.add('is-on'); pintarComp(b.dataset.p);
    }));
  }
  document.getElementById('fpGalClose').addEventListener('click', () => cont.classList.remove('is-open'));
}

async function loadCheckin() {
  if (!TOKEN || (DATA && DATA._isDemo) || !window.mypumpDB.getCheckinSemana) return;
  try {
    const res = await window.mypumpDB.getCheckinSemana(TOKEN, TODAY_LOCAL);
    STATE.checkin = (Array.isArray(res) && res[0]) ? res[0] : null;
  } catch (_) { STATE.checkin = null; }
  if (STATE.scene === 'revision') renderMydayCheckin();
  try { renderRecordatorio(); } catch (_) {}
}

function renderMydayCheckin() {
  const el = document.getElementById('myday-checkin');
  if (!el) return;
  const ck = STATE.checkinDraft || STATE.checkin || {};
  const yaGuardado = !!(STATE.checkin && STATE.checkin.energia);

  const escala = (m) => `
    <div class="ck-metric">
      <div class="ck-metric-top">
        <span class="ck-metric-lbl">${m.icon} ${m.label}</span>
        <span class="ck-metric-hint">${ck[m.k] ? '' : `${m.lo} → ${m.hi}`}</span>
      </div>
      <div class="ck-scale" data-k="${m.k}">
        ${[1,2,3,4,5].map(n => `<button class="ck-dot${ck[m.k] === n ? ' is-on' : ''}" data-k="${m.k}" data-v="${n}">${n}</button>`).join('')}
      </div>
    </div>`;

  el.innerHTML = `
    <div class="myday-section">
      <div class="myday-section-hdr">
        <span class="myday-section-icon">📝</span>
        <span class="myday-section-title">Check de la semana</span>
        ${yaGuardado ? '<span class="ck-saved">✓ enviado</span>' : ''}
      </div>
      <div class="myday-section-body">
        <p class="ck-intro">Contame en 10 segundos cómo venís. Mati lo ve antes de tu devolución.</p>
        ${CHECKIN_METRICAS.map(escala).join('')}
        <textarea class="ck-nota" id="ckNota" rows="2" placeholder="Algo que quieras contarme (opcional)">${(ck.nota || '').replace(/</g,'&lt;')}</textarea>
        <button class="ck-save btn-primary" id="ckSave">${yaGuardado ? 'Actualizar mi check' : 'Enviar mi check'}</button>
      </div>
    </div>`;

  // Selección de escala (guarda en un draft; no manda hasta "Enviar")
  el.querySelectorAll('.ck-dot').forEach(b => b.addEventListener('click', () => {
    STATE.checkinDraft = { ...(STATE.checkinDraft || STATE.checkin || {}), [b.dataset.k]: Number(b.dataset.v), nota: document.getElementById('ckNota')?.value || '' };
    renderMydayCheckin();
  }));
  const save = document.getElementById('ckSave');
  if (save) save.addEventListener('click', () => {
    const d = { ...(STATE.checkinDraft || STATE.checkin || {}), nota: document.getElementById('ckNota')?.value || '' };
    const faltan = CHECKIN_METRICAS.filter(m => !d[m.k]);
    if (faltan.length) {
      save.textContent = `Faltan: ${faltan.map(m => m.label).join(', ')}`;
      setTimeout(() => renderMydayCheckin(), 1600);
      return;
    }
    const datos = { energia: d.energia, descanso: d.descanso, hambre: d.hambre, adherencia: d.adherencia, nota: (d.nota || '').trim() };
    STATE.checkin = { ...datos };          // update optimista
    STATE.checkinDraft = null;
    Outbox.enqueue('checkin', { fecha: TODAY_LOCAL, datos }, 'checkin_' + TODAY_LOCAL);
    renderMydayCheckin();
    try { renderRecordatorio(); } catch (_) {}
  });
}

/* ══════════ ESCENA REVISIÓN (R) — lo SEMANAL ══════════
   Peso, check y fotos vivian dentro de Mi Día, mezclados con lo diario
   (habitos, agua, entrenamiento). Dos problemas: para el cliente era ruido,
   y como setHabito() re-arma el innerHTML ENTERO de Mi Día, cada vaso de agua
   destruia el DOM del check (perdiendo lo tipeado en la nota), el mensaje de
   "subiendo foto" y la galeria abierta. Separadas, el render diario no vuelve
   a tocar lo semanal.

   Las funciones y los ids siguen con el prefijo `myday` por historia: son ~18
   call sites en un script inline sin linter, y todas arrancan con
   `if (!el) return`, asi que un rename incompleto no rompe en build — rompe
   en silencio en el celular de un cliente. El rename va aparte, si va.

   A diferencia de Mi Día, esta escena NO espera a que cargue nada: las tres
   cards degradan bien vacias (escalas en blanco, input de peso, slots de
   fotos) y eso es justo lo que el cliente viene a usar. */
function renderRevision() {
  const root = $('#scene-revision');
  if (!root) return;

  root.innerHTML = `
    <!-- FOTOS DE PROGRESO — P2/P3.
         #fpGaleria tiene que vivir en la MISMA escena que el boton que la
         abre: si no, se abre dentro de un display:none y parece que el boton
         no hace nada. -->
    <div id="myday-fotos"></div>
    <div id="fpGaleria" class="fp-galeria"></div>

    <!-- CHECK SEMANAL — N8 -->
    <div id="myday-checkin"></div>

    <!-- PESO CORPORAL — N1 (ultimo: se lleva el aire sobre el tabbar) -->
    <div id="myday-peso" style="margin-bottom:var(--space-6)"></div>`;

  // Cada render bindea sus propios handlers.
  renderMydayFotos();
  renderMydayCheckin();
  renderMydayPeso();
}

  // Bind agua
  const aguaMinus = $('#aguaMinus');

  // Bind adherencia toggle
  const adhToggle = $('#adhToggle');
  if (adhToggle) {
    adhToggle.addEventListener('click', async () => {
      STATE.adhOpen = !STATE.adhOpen;
      adhToggle.classList.toggle('is-open', STATE.adhOpen);
      const content = $('#adhContent');

      } else {
