<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MyPump</title>

<!-- PWA — Add to Home Screen support -->
<link rel="manifest" href="/manifest.json?v=3">
<meta name="theme-color" content="#10b981">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyPump">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--color-bg-secondary);color:var(--color-text-primary);font-family:var(--font-sans);font-size:var(--font-size-base);line-height:var(--line-height-normal);-webkit-font-smoothing:antialiased}
body{min-height:100vh}
button{font:inherit;color:inherit}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

/* LOADING / ERROR */
#loadScreen,#errorScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);background:var(--color-bg-secondary);z-index:100;padding:calc(env(safe-area-inset-top) + var(--space-6)) var(--space-6) calc(env(safe-area-inset-bottom) + var(--space-6))}
.error-paste{display:flex;flex-direction:column;gap:var(--space-3);width:100%;max-width:340px;margin-top:var(--space-4)}
.error-paste-hint{font-size:13px;color:var(--color-text-muted);text-align:center;line-height:1.5}
.error-paste-input{width:100%;height:44px;padding:0 var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-primary);border-radius:var(--radius-md);font-size:14px;outline:none;color:var(--color-text-primary);font-family:var(--font-mono)}
.error-paste-input:focus{border-color:var(--color-brand);background:var(--color-bg-primary)}
.error-paste-btn{width:100%;height:44px;background:var(--color-brand);color:var(--color-on-brand);border:0;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.error-paste-btn:hover{background:var(--color-brand-hover)}
.error-paste-err{padding:var(--space-2) var(--space-3);background:color-mix(in oklab,#ef4444 10%,var(--color-bg-primary));border:1px solid #ef4444;border-radius:var(--radius-md);color:#ef4444;font-size:12px}
.spinner{width:36px;height:36px;border:3px solid var(--color-border);border-top-color:var(--color-brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:var(--font-size-sm);color:var(--color-text-muted);font-weight:500}
.error-icon{font-size:40px}
.error-title{font-size:var(--font-size-xl);font-weight:600;text-align:center}
.error-sub{font-size:var(--font-size-sm);color:var(--color-text-muted);text-align:center;max-width:280px;line-height:1.6}
.error-code{font-family:var(--font-mono);font-size:12px;color:var(--color-text-muted);padding:6px 12px;background:var(--color-bg-tertiary);border-radius:var(--radius-sm);border:1px solid var(--color-border)}

/* APP */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--color-bg-secondary);position:relative;padding-bottom:calc(72px + env(safe-area-inset-bottom))}

/* HEADER */
.hdr{position:sticky;top:0;z-index:30;background:color-mix(in oklab,var(--color-bg-primary) 92%,transparent);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--color-border);padding-top:env(safe-area-inset-top)}
.hdr-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4)}
.hdr-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.hdr-eyebrow{display:flex;align-items:center;gap:var(--space-2);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);font-weight:500}
.hdr-eyebrow .dot{width:4px;height:4px;border-radius:50%;background:var(--color-text-muted)}
.hdr-title{font-size:var(--font-size-lg);font-weight:600;letter-spacing:-.01em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:40px;height:40px;border:1px solid var(--color-border);background:var(--color-bg-primary);border-radius:var(--radius-md);color:var(--color-text-secondary);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
.icon-btn:hover{background:var(--color-bg-tertiary);color:var(--color-text-primary)}
.icon-btn svg{width:18px;height:18px}

/* DAY PICKER */
.day-picker{display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-3);overflow-x:auto;scrollbar-width:none}
.day-picker::-webkit-scrollbar{display:none}
.day-pill{flex:0 0 auto;padding:6px 14px;border:1px solid var(--color-border);background:var(--color-bg-primary);border-radius:var(--radius-md);font-family:var(--font-mono);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:60px}
.dp-n{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.65}
.dp-name{font-size:12px;font-weight:600;letter-spacing:.01em}
.day-pill.is-active{background:var(--color-text-primary);color:var(--color-bg-primary);border-color:var(--color-text-primary)}
.day-pill.is-active .dp-n{opacity:.7}
/* F1 — día completado: verde con ✓ */
.day-pill.is-done{background:color-mix(in oklab,var(--color-brand) 10%,var(--color-bg-primary));border-color:color-mix(in oklab,var(--color-brand) 50%,var(--color-border));color:var(--color-brand)}
.day-pill.is-done .dp-n{opacity:.8}
.day-pill.is-active.is-done{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.dp-check{position:absolute;top:2px;left:5px;font-size:10px;line-height:1;font-weight:800;color:var(--color-brand)}
.day-pill.is-active.is-done .dp-check{color:var(--color-on-brand)}

/* PROGRESS BAR */
.hdr-progress{padding:0 var(--space-4) var(--space-3);display:flex;align-items:center;gap:var(--space-3)}
.progress-track{flex:1;height:6px;background:var(--color-bg-tertiary);border-radius:var(--radius-full);overflow:hidden;border:1px solid var(--color-border)}
.progress-fill{height:100%;background:var(--color-brand);transition:width .25s}
.progress-count{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);font-weight:500}
.progress-count strong{color:var(--color-text-primary);font-weight:600}
.week-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:var(--color-bg-tertiary);border:1px solid var(--color-border);border-radius:var(--radius-full);font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);font-weight:500}

/* MAIN */
main{padding:var(--space-4)}
.scene{display:none}
.scene.is-active{display:block}

/* BLOCK */
.block{margin-bottom:var(--space-6)}
.block-header{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0 var(--space-3)}
.block-num{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);font-weight:600;letter-spacing:.04em;padding:2px 6px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg-primary)}
.block-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--color-text-primary)}
.block-meta{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-left:auto}
.block-list{display:flex;flex-direction:column;gap:var(--space-2)}

/* EXERCISE CARD */
.ex-card{background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ex-card.is-expanded{border-color:var(--color-border-strong);box-shadow:var(--shadow-md)}
.ex-card.is-completed{border-color:color-mix(in oklab,var(--color-brand) 50%,var(--color-border));background:color-mix(in oklab,var(--color-brand-subtle) 60%,var(--color-bg-primary))}
.ex-head{width:100%;display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-4);background:transparent;border:0;text-align:left;cursor:pointer}
.ex-status{flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--color-border-strong);background:var(--color-bg-primary);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);font-weight:600;margin-top:2px}
.ex-card.is-completed .ex-status{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.ex-card.is-expanded .ex-status{border-color:var(--color-text-primary);color:var(--color-text-primary)}
.ex-status svg{width:16px;height:16px}
.ex-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--space-2)}
.ex-name{font-size:var(--font-size-lg);font-weight:600;letter-spacing:-.01em;line-height:1.2}
.ex-card.is-completed .ex-name{color:var(--color-text-secondary)}
.ex-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg-secondary);font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);font-weight:500;white-space:nowrap}
.chip .lbl{color:var(--color-text-muted)}
.chip.warm{background:color-mix(in oklab,var(--color-warning) 8%,var(--color-bg-secondary));border-color:color-mix(in oklab,var(--color-warning) 25%,var(--color-border));color:var(--color-text-primary)}
.ex-historic{display:flex;align-items:center;gap:var(--space-2);font-size:12px;color:var(--color-text-muted);font-family:var(--font-mono);border-top:1px dashed var(--color-border);margin-top:2px;padding-top:var(--space-3)}
.ex-historic .lbl{text-transform:uppercase;letter-spacing:.06em;font-size:10px}
.ex-historic .val{color:var(--color-text-secondary)}
.ex-pip-row{display:inline-flex;gap:3px;align-items:center;margin-left:auto;flex:0 0 auto}
.pip{width:10px;height:10px;border-radius:3px;border:1.5px solid var(--color-border-strong);background:transparent}
.pip.done{background:var(--color-brand);border-color:var(--color-brand)}
.ex-chevron{color:var(--color-text-muted);transition:transform .2s;margin-top:4px;flex:0 0 auto}
.ex-card.is-expanded .ex-chevron{transform:rotate(180deg)}

/* EXPANDED PANEL */
.ex-panel{padding:0 var(--space-4) var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
.divider{height:1px;background:var(--color-border);margin:0 calc(-1 * var(--space-4))}
.sets-head,.set-row{display:grid;grid-template-columns:32px 1fr 1fr 60px 44px;gap:var(--space-2);align-items:center}
.sets-head{padding:var(--space-2) var(--space-1);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600}
.sets-list{display:flex;flex-direction:column;gap:var(--space-2)}
.set-num{font-family:var(--font-mono);font-size:16px;font-weight:600;text-align:center}
.set-row.is-confirmed .set-num{color:var(--color-text-secondary)}
.set-row.is-pending{opacity:.55}
.set-row.is-active .set-input,.set-row.is-active .rir-btn{box-shadow:0 0 0 2px color-mix(in oklab,var(--color-brand) 60%,transparent)}
.set-input{width:100%;height:48px;padding:0 var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--color-text-primary);text-align:center;font-variant-numeric:tabular-nums}
.set-input:focus{outline:none;border-color:var(--color-text-primary);background:var(--color-bg-primary);box-shadow:0 0 0 3px var(--color-brand-subtle)}
.set-input::placeholder{color:var(--color-text-muted);font-weight:400}
.set-row.is-confirmed .set-input{background:var(--color-brand-subtle);border-color:color-mix(in oklab,var(--color-brand) 40%,var(--color-border))}
.rir-btn{width:100%;height:48px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.rir-btn .lbl{color:var(--color-text-muted);font-size:10px}
.set-row.is-confirmed .rir-btn{background:var(--color-brand-subtle);border-color:color-mix(in oklab,var(--color-brand) 40%,var(--color-border))}
.set-sug-hint{margin:4px 0 8px;padding:8px 10px;border:1px dashed color-mix(in oklab,var(--color-brand) 45%,var(--color-border));background:var(--color-brand-subtle);border-radius:var(--radius-md);font-size:12px;color:var(--color-text-secondary);cursor:pointer;line-height:1.35;text-align:center}
.set-sug-hint b{color:var(--color-text-primary);font-family:var(--font-mono)}
.set-sug-hint:active{opacity:.7}
/* B4 — hint de calibración (informativo, no clickeable) */
.set-sug-hint.is-calib{cursor:default;border-color:color-mix(in oklab,var(--color-warning) 45%,var(--color-border));background:color-mix(in oklab,var(--color-warning) 8%,var(--color-bg-secondary))}
.set-sug-hint.is-calib:active{opacity:1}
/* Selector de nivel/variante (ej: rueda abdominal) — control segmentado */
.ex-variante{display:flex;align-items:center;gap:var(--space-3);margin:0 0 var(--space-3)}
.ex-variante-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);flex:0 0 auto}
.ex-variante-opts{display:flex;gap:6px;flex:1}
.ex-variante-op{flex:1;padding:8px 10px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:12px;font-weight:600;color:var(--color-text-secondary);cursor:pointer;line-height:1.2}
.ex-variante-op.is-active{background:var(--color-brand);color:var(--color-on-brand);border-color:var(--color-brand)}
.ex-variante-op:disabled{opacity:.5;cursor:default}
/* F5 — toggle "Fijar sustitución" en el modal de swap de ejercicio */
.swap-fijar{display:flex;align-items:flex-start;gap:10px;margin-top:var(--space-3);padding:10px 12px;border:1px dashed var(--color-border);border-radius:var(--radius-md);cursor:pointer;background:var(--color-bg-secondary)}
.swap-fijar input{margin-top:2px;accent-color:var(--color-brand)}
.swap-fijar span{display:flex;flex-direction:column;gap:2px}
.swap-fijar strong{font-size:13px;color:var(--color-text-primary)}
.swap-fijar small{font-size:11px;color:var(--color-text-muted);line-height:1.35}
.set-confirm{width:44px;height:48px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);color:var(--color-text-secondary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.set-confirm:hover{background:var(--color-text-primary);color:var(--color-bg-primary);border-color:var(--color-text-primary)}
.set-row.is-confirmed .set-confirm{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.set-confirm svg{width:18px;height:18px}
.set-row.is-confirmed .set-confirm.is-edit{background:transparent;border-color:transparent;color:var(--color-text-muted)}

/* EXERCISE IMAGES — mini thumbnail (colapsado) + grid grande (expandido) */
.ex-thumb{width:44px;height:44px;border-radius:var(--radius-md);object-fit:cover;flex:0 0 auto;background:var(--color-bg-tertiary);margin-top:2px}
.ex-images{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-2)}
.ex-img-card{margin:0;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;display:flex;flex-direction:column}
.ex-img-card img{width:100%;height:auto;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--color-bg-tertiary)}
.ex-img-card figcaption{padding:6px 8px;font-size:10px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.06em;text-align:center;background:var(--color-bg-primary);border-top:1px solid var(--color-border)}

/* Accordions */
.ex-extras{display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-2)}
.ex-extra-row{width:100%;display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3);background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-secondary);font-size:14px;cursor:pointer;text-align:left}
.ex-extra-row svg{width:16px;height:16px;flex:0 0 auto}
.ex-extra-row .label{flex:1}
.ex-extra-row .chev{transition:transform .15s}
.ex-extra-row.is-open .chev{transform:rotate(180deg)}
.ex-extra-row.is-note{background:color-mix(in oklab,var(--color-warning) 6%,var(--color-bg-secondary));border-color:color-mix(in oklab,var(--color-warning) 20%,var(--color-border))}
.ex-extra-content{padding:var(--space-3) var(--space-4);background:var(--color-bg-tertiary);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:14px;color:var(--color-text-secondary);line-height:1.6}
.ex-extra-content.video{aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-2);background-image:repeating-linear-gradient(45deg,var(--color-bg-tertiary) 0,var(--color-bg-tertiary) 8px,var(--color-border) 8px,var(--color-border) 9px);color:var(--color-text-muted);font-family:var(--font-mono);font-size:12px}
.ex-extra-content.video .play{width:56px;height:56px;border-radius:50%;background:var(--color-bg-primary);border:1px solid var(--color-border-strong);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md)}
.ex-extra-content.video iframe{width:100%;height:100%;border:0;border-radius:var(--radius-md)}

/* EXERCISE STATUS STATES */
.ex-card.is-completo{border-color:color-mix(in oklab,var(--color-brand) 50%,var(--color-border));background:color-mix(in oklab,var(--color-brand-subtle) 60%,var(--color-bg-primary))}
.ex-card.is-completo .ex-status{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.ex-card.is-completo .ex-name{color:var(--color-text-secondary)}
.ex-card.is-completo-sin-datos{border-color:color-mix(in oklab,var(--color-warning) 50%,var(--color-border));background:color-mix(in oklab,var(--color-warning) 6%,var(--color-bg-primary))}
.ex-card.is-completo-sin-datos .ex-status{background:var(--color-warning);border-color:var(--color-warning);color:#000}
.ex-card.is-completo-sin-datos .ex-name{color:var(--color-text-secondary)}
.ex-card.is-saltado{opacity:.6}
.ex-card.is-saltado .ex-status{background:var(--color-bg-tertiary);color:var(--color-text-muted)}
.ex-card.is-saltado .ex-name{color:var(--color-text-muted);text-decoration:line-through}

/* EXERCISE PANEL ACTIONS */
.ex-actions{display:flex;flex-direction:column;gap:var(--space-2)}
.mark-complete{width:100%;height:48px;background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);transition:background .15s,color .15s,border-color .15s}
.mark-complete.is-ready{background:color-mix(in oklab,var(--color-brand) 10%,var(--color-bg-primary));border-color:color-mix(in oklab,var(--color-brand) 40%,var(--color-border));color:var(--color-brand);font-weight:600}
.mark-complete.is-reopen{background:transparent;border-color:var(--color-border);color:var(--color-text-muted);font-size:13px}
.btn-finish-ex{width:100%;height:44px;background:transparent;color:var(--color-text-muted);border:1px dashed var(--color-border);border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2)}
.btn-finish-ex:hover{background:var(--color-bg-secondary);color:var(--color-text-secondary);border-color:var(--color-border-strong)}
.btn-secondary-outline{width:100%;height:48px;background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2)}
.btn-secondary-outline:hover{background:var(--color-bg-secondary);color:var(--color-text-primary)}
.ex-manual-badge{background:color-mix(in oklab,var(--color-warning) 15%,var(--color-bg-secondary));border-color:color-mix(in oklab,var(--color-warning) 30%,var(--color-border));color:var(--color-text-secondary);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;vertical-align:middle;margin-left:6px}
.week-advance-wrap{padding:var(--space-4) 0 var(--space-2);border-top:1px solid var(--color-border);margin-top:var(--space-4)}
.btn-week-advance{width:100%;height:44px;background:transparent;color:var(--color-text-muted);border:1px dashed var(--color-border);border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);letter-spacing:.01em}
.btn-week-advance:hover{background:var(--color-bg-secondary);color:var(--color-text-secondary);border-style:solid}

/* EARLY FINISH WARNING */
.early-finish-warning{background:color-mix(in oklab,var(--color-warning) 8%,var(--color-bg-secondary));border:1px solid color-mix(in oklab,var(--color-warning) 30%,var(--color-border));border-radius:var(--radius-md);padding:var(--space-3) var(--space-4)}
.ewarn-label{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:var(--space-2)}
.ewarn-list{margin:0;padding-left:var(--space-4);font-size:13px;color:var(--color-text-secondary);display:flex;flex-direction:column;gap:4px}

/* FINISH BANNER */
.finish-card{margin-top:var(--space-4);padding:var(--space-5);background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);display:flex;flex-direction:column;gap:var(--space-4)}
.finish-card .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--color-brand);font-weight:700}
.finish-card h2{margin:0;font-size:var(--font-size-2xl);font-weight:600;letter-spacing:-.02em;line-height:1.15}
.finish-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);padding:var(--space-3);background:var(--color-bg-secondary);border-radius:var(--radius-md);border:1px solid var(--color-border)}
.fs-cell{display:flex;flex-direction:column;gap:2px}
.fs-cell .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600}
.fs-cell .val{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--color-text-primary)}
.fs-cell .val small{font-size:11px;color:var(--color-text-muted);font-weight:400;margin-left:2px}
.btn-primary{width:100%;height:52px;background:var(--color-brand);color:var(--color-on-brand);border:0;border-radius:var(--radius-md);font-size:16px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2)}
.btn-primary:hover{background:var(--color-brand-hover)}
.btn-primary:disabled{background:var(--color-bg-tertiary);color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:not-allowed}
.btn-secondary{width:100%;height:48px;background:var(--color-bg-primary);color:var(--color-text-primary);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:14px;font-weight:500;cursor:pointer}

/* REST TIMER */
.rest-bar{position:fixed;left:var(--space-3);right:var(--space-3);margin-inline:auto;bottom:calc(72px + env(safe-area-inset-bottom) + var(--space-2));width:auto;max-width:448px;background:var(--color-text-primary);color:var(--color-bg-primary);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:var(--space-3);z-index:40;will-change:transform}
[data-theme="dark"] .rest-bar{background:#f5f5f5;color:#0a0a0a}
.rest-bar.is-done{background:var(--color-brand);color:var(--color-on-brand)}
.rest-time{font-family:var(--font-mono);font-size:28px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;min-width:80px}
.rest-meta{display:flex;flex-direction:column;gap:2px;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.7;flex:1;min-width:0}
.rest-meta .target{font-size:11px;opacity:1;text-transform:none;letter-spacing:0;font-weight:600}
.rest-actions{display:flex;gap:4px;flex:0 0 auto}
.rest-btn{height:36px;padding:0 var(--space-3);min-width:44px;background:rgba(255,255,255,.1);color:inherit;border:1px solid rgba(255,255,255,.18);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:12px;font-weight:600;cursor:pointer}
[data-theme="dark"] .rest-btn,.rest-bar.is-done .rest-btn{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.12)}
.rest-btn.skip{background:transparent;border-color:transparent;opacity:.7;padding:0 var(--space-2)}
.rest-progress{position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow:hidden;background:rgba(255,255,255,.08)}
.rest-progress-fill{height:100%;background:var(--color-brand);transition:width .3s linear}
.rest-bar.is-done .rest-progress-fill{background:var(--color-on-brand)}

/* TAB BAR */
.tabbar{position:fixed;left:0;right:0;bottom:0;margin-inline:auto;width:100%;max-width:480px;background:color-mix(in oklab,var(--color-bg-primary) 95%,transparent);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);border-top:1px solid var(--color-border);padding:var(--space-2) var(--space-3) calc(var(--space-2) + env(safe-area-inset-bottom));display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:2px;z-index:35;will-change:transform;-webkit-transform:translateZ(0);transform:translateZ(0)}
.tab{position:relative;background:transparent;border:0;padding:var(--space-2) 2px;border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--color-text-muted);font-size:10px;font-weight:500;letter-spacing:.02em;min-height:56px;white-space:nowrap}
/* Badge global de comentarios nuevos del coach (B3) */
.tab-badge{position:absolute;top:2px;right:calc(50% - 22px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--color-brand);color:var(--color-on-brand);font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--color-bg-primary)}
.tab-badge[hidden]{display:none}
.tab svg{width:20px;height:20px;stroke-width:1.7}
.tab.is-active{color:var(--color-text-primary)}
.tab.is-active .tab-dot{background:var(--color-brand)}
.tab-dot{width:18px;height:3px;border-radius:var(--radius-full);background:transparent;margin-top:-2px}

/* MI DÍA */
.myday-streak{background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5) var(--space-4);display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)}
.streak-left{display:flex;flex-direction:column;flex:1;gap:2px}
.streak-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-muted)}
.streak-num-row{display:flex;align-items:baseline;gap:var(--space-2)}
.streak-num{font-family:var(--font-mono);font-size:52px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--color-brand)}
.streak-dias{font-size:18px;font-weight:600;color:var(--color-text-secondary)}
.streak-sub{font-size:13px;color:var(--color-text-muted);margin-top:2px}
.streak-icon{font-size:44px;line-height:1;flex:0 0 auto}
.myday-date{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:var(--space-4);padding:0 var(--space-1)}
.myday-section{background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--space-3)}
.myday-section-hdr{padding:var(--space-3) var(--space-4) var(--space-2);display:flex;align-items:center;gap:var(--space-2)}
.myday-section-icon{font-size:16px}
.myday-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted)}
.myday-section-body{padding:0 var(--space-4) var(--space-4)}
.train-options{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2)}
.train-opt{height:56px;border:1.5px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:background .15s,border-color .15s,color .15s;color:var(--color-text-secondary)}
.train-opt .opt-icon{font-size:20px}
.train-opt.is-active.opt-entrene{background:color-mix(in oklab,var(--color-brand) 12%,var(--color-bg-primary));border-color:var(--color-brand);color:var(--color-brand)}
.train-opt.is-active.opt-descanso{background:color-mix(in oklab,#8b5cf6 10%,var(--color-bg-primary));border-color:#8b5cf6;color:#8b5cf6}
.train-opt.is-active.opt-falte{background:color-mix(in oklab,var(--color-warning) 12%,var(--color-bg-primary));border-color:var(--color-warning);color:var(--color-warning)}
.habito-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--color-border)}
.habito-row:last-child{border-bottom:0;padding-bottom:0}
.habito-row:first-child{padding-top:0}
.habito-info{flex:1;display:flex;flex-direction:column;gap:1px}
.habito-text{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.habito-sub{font-size:12px;color:var(--color-text-muted)}
.habito-btns{display:flex;gap:var(--space-2);flex:0 0 auto}
/* SALUD (wearables) card — C0 */
.salud-row{display:flex;gap:var(--space-4)}
.salud-metric{display:flex;flex-direction:column;gap:2px;flex:1}
.salud-num{font-family:var(--font-mono);font-size:30px;font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--color-brand)}
.salud-lbl{font-size:12px;color:var(--color-text-muted)}
.salud-sub{margin-top:var(--space-3);font-size:12px;color:var(--color-text-secondary)}
.salud-sub strong{font-family:var(--font-mono);color:var(--color-text-primary)}
.salud-connect-txt{font-size:13px;color:var(--color-text-secondary);line-height:1.4;margin:0 0 var(--space-3)}
.hb{width:42px;height:42px;border:1.5px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.hb.is-yes.is-active{background:color-mix(in oklab,var(--color-brand) 14%,var(--color-bg-primary));border-color:var(--color-brand)}
.hb.is-no.is-active{background:color-mix(in oklab,#ef4444 10%,var(--color-bg-primary));border-color:#ef4444}
.agua-counter{display:flex;align-items:center;justify-content:center;gap:var(--space-5);padding:var(--space-2) 0 0}
.agua-btn{width:52px;height:52px;border:1.5px solid var(--color-border);background:var(--color-bg-secondary);border-radius:50%;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .1s;color:var(--color-text-secondary)}
.agua-btn:active{background:var(--color-bg-tertiary)}
.agua-display{display:flex;flex-direction:column;align-items:center;gap:0}
.agua-num{font-family:var(--font-mono);font-size:44px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--color-text-primary)}
.agua-unit{font-size:11px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.agua-glasses{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:var(--space-3);min-height:28px}
.agua-glass{font-size:20px;line-height:1;transition:opacity .15s}
.agua-glass.empty{opacity:.2}
.adh-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);background:transparent;border:0;border-top:1px solid var(--color-border);text-align:left;cursor:pointer;font-size:13px;color:var(--color-text-secondary);font-weight:500;gap:var(--space-2)}
.adh-toggle .chev{transition:transform .2s;flex:0 0 auto;color:var(--color-text-muted)}
.adh-toggle.is-open .chev{transform:rotate(180deg)}
.adh-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 var(--space-4) var(--space-4)}
.adh-day{width:100%;aspect-ratio:1;border-radius:4px}
.adh-day.valido{background:var(--color-brand);opacity:.85}
.adh-day.parcial{background:color-mix(in oklab,var(--color-brand) 30%,var(--color-border))}
.adh-day.vacio{background:var(--color-bg-tertiary);border:1px solid var(--color-border)}
.adh-day.hoy{outline:2px solid var(--color-text-primary);outline-offset:1px}

/* DIETA */
.diet-hdr{padding:var(--space-4);background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
.diet-hdr-top{display:flex;align-items:flex-start;gap:var(--space-3)}
.kcal-ring{flex:0 0 auto;width:88px;height:88px;position:relative}
.kcal-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.kcal-ring .track{stroke:var(--color-bg-tertiary);fill:none;stroke-width:8}
.kcal-ring .fill{stroke:var(--color-brand);fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dasharray .4s}
.kcal-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.kcal-ring .center .num{font-family:var(--font-mono);font-size:18px;font-weight:600;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kcal-ring .center .lbl{font-family:var(--font-mono);font-size:9px;color:var(--color-text-muted);letter-spacing:.06em;text-transform:uppercase}
.diet-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.diet-info .eyebrow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600}
.diet-info h2{margin:0;font-size:var(--font-size-lg);font-weight:600;letter-spacing:-.01em}
.diet-info .target{font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary)}
.diet-info .target strong{color:var(--color-text-primary);font-weight:600}
.macros-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2)}
.macro{background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);display:flex;flex-direction:column;gap:2px}
.macro .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600}
.macro .val{font-family:var(--font-mono);font-size:14px;font-weight:600}
.macro .val small{font-size:10px;color:var(--color-text-muted);font-weight:400;margin-left:2px}
.macro .bar{height:3px;background:var(--color-bg-tertiary);border-radius:var(--radius-full);overflow:hidden;margin-top:2px}
.macro .bar span{display:block;height:100%;background:var(--color-text-primary);transition:width .3s}
.macro.p .bar span{background:#3b82f6}
.macro.c .bar span{background:#f59e0b}
.macro.f .bar span{background:#dc2626}

/* RING PROGRESS — fill animado del kcal-ring */
.kcal-ring .ring{stroke:var(--color-brand);fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .4s ease}

/* CONSUMIDO HOY — barra de progreso + macros consumidos */
.consumido-row{display:flex;flex-direction:column;gap:6px;padding-top:var(--space-3);border-top:1px solid var(--color-border)}
.consumido-hdr{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--color-text-muted)}
.consumido-lbl{font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.consumido-progreso{font-family:var(--font-mono)}
.consumido-bar{height:6px;background:var(--color-bg-tertiary);border-radius:var(--radius-full);overflow:hidden}
.consumido-bar-fill{height:100%;background:var(--color-brand);border-radius:var(--radius-full);transition:width .3s ease}
.consumido-macros{font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary)}

/* MEAL — variantes de estado tracking */
.meal{background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--space-3);transition:border-color .2s,opacity .2s}
.meal.is-comido{border-left:3px solid var(--color-brand)}
.meal.is-saltado{opacity:.55}
.meal.is-saltado .meal-name,.meal.is-saltado .meal-sub{text-decoration:line-through}
.meal-badge{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;line-height:1}
.meal-badge.ok{background:color-mix(in oklab,var(--color-brand) 14%,var(--color-bg-primary));color:var(--color-brand)}
.meal-badge.skip{background:var(--color-bg-tertiary);color:var(--color-text-muted)}

/* MEAL TRACK — botones ✓ Comí / ✗ Salté */
.meal-track{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 var(--space-4) var(--space-3)}
.track-btn{height:38px;border:1.5px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-secondary);transition:background .15s,border-color .15s}
.track-btn:active{transform:scale(.97)}
.track-btn.track-yes.is-active{background:color-mix(in oklab,var(--color-brand) 14%,var(--color-bg-primary));border-color:var(--color-brand);color:var(--color-brand)}
.track-btn.track-no.is-active{background:color-mix(in oklab,#ef4444 10%,var(--color-bg-primary));border-color:#ef4444;color:#ef4444}


.meal-head{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4);cursor:pointer;width:100%;text-align:left;background:transparent;border:0}
.meal-head .meal-num{flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--color-border-strong);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--color-text-muted)}
.meal-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.meal-name{font-size:var(--font-size-base);font-weight:600;letter-spacing:-.01em}
.meal-sub{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted)}
.meal-kcal{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--color-text-primary)}
.meal-kcal small{font-size:10px;color:var(--color-text-muted);font-weight:400;margin-left:2px}
.meal-body{padding:0 var(--space-4) var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
.opt-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md)}
.opt-tab{background:transparent;border:0;padding:var(--space-2);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--color-text-secondary);cursor:pointer}
.opt-tab.is-active{background:var(--color-bg-primary);color:var(--color-text-primary);box-shadow:var(--shadow-sm)}
.foods{display:flex;flex-direction:column;gap:var(--space-1)}
.food{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-2);border-bottom:1px solid var(--color-border)}
/* Consumo parcial: check por alimento cuando la comida está "comido" */
.comi-parte-hint{font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono);padding:2px var(--space-2) var(--space-2)}
.comi-parte-hint b{color:var(--color-text-secondary)}
.food-comi-row{display:flex;align-items:stretch;gap:var(--space-2)}
.food-comi-row .food-comi-body{flex:1;min-width:0}
.food-comi-check{flex:0 0 auto;align-self:center;width:24px;height:24px;border-radius:6px;border:1.5px solid var(--color-brand);background:var(--color-brand);color:var(--color-on-brand,#0a0a0a);font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.food-comi-row.is-excluido .food-comi-check{background:transparent;border-color:var(--color-border);color:transparent}
.food-comi-row.is-excluido .food-comi-body{opacity:.4}
.food-comi-row.is-excluido .food-name{text-decoration:line-through}
.food:last-child{border-bottom:0}
.food-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.food-name{font-size:14px;font-weight:500}
.food-qty{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted)}
.food-macros{display:flex;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);flex:0 0 auto;align-self:center}
.food-macros span strong{color:var(--color-text-secondary);font-weight:600}
.meal-totals{display:flex;justify-content:space-between;padding:var(--space-3);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:12px}
.meal-totals strong{color:var(--color-text-primary)}
.meal-totals .lbl{color:var(--color-text-muted);text-transform:uppercase;font-size:10px;letter-spacing:.06em;font-weight:600}

/* TIPO DÍA SELECTOR */
.tipo-dia-sel{display:flex;gap:4px;padding:4px;background:var(--color-bg-tertiary);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-4)}
.tipo-dia-btn{flex:1;height:36px;border:0;background:transparent;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--color-text-secondary);cursor:pointer;transition:background .15s,color .15s}
.tipo-dia-btn.is-active{background:var(--color-brand);color:var(--color-on-brand)}

/* FOOD SWAP */
.swap-btn{background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:2px 5px;font-size:11px;cursor:pointer;color:var(--color-text-muted);margin-left:4px;line-height:1}
.swap-btn:hover{background:var(--color-bg-tertiary);color:var(--color-text-primary)}
.swap-badge{font-size:11px;color:var(--color-brand);cursor:pointer;margin-left:4px;text-decoration:none}
.porcion-btn{background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:2px 5px;font-size:11px;cursor:pointer;color:var(--color-text-muted);margin-left:4px;line-height:1}
.porcion-btn:hover,.porcion-btn.is-active{background:var(--color-bg-tertiary);color:var(--color-text-primary)}
.porcion-ref{margin-top:3px;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono);line-height:1.3}
.porcion-ref[hidden]{display:none}
.swap-original{padding:var(--space-3);background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-3)}
.swap-original .sw-name{font-weight:600;font-size:15px}
.swap-original .sw-meta{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-top:2px}
.swap-subs-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600;padding:var(--space-2) 0}
.swap-list{display:flex;flex-direction:column;gap:var(--space-2);max-height:50vh;overflow-y:auto}
.swap-card{padding:var(--space-3);border:1.5px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;display:flex;align-items:center;gap:var(--space-3);background:var(--color-bg-secondary)}
.swap-card.is-selected{border-color:var(--color-brand);background:var(--color-brand-subtle)}
.swap-card-info{flex:1;min-width:0}
.swap-card-name{font-size:14px;font-weight:600}
.swap-card-qty{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-top:1px}
.swap-card-macros{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);margin-top:2px}
.swap-delta{font-family:var(--font-mono);font-size:11px;font-weight:700;min-width:44px;text-align:right;flex:0 0 auto}
.swap-delta.ok{color:#16a34a}
.swap-delta.warn{color:#f59e0b}
.swap-empty{padding:var(--space-6) var(--space-4);text-align:center;color:var(--color-text-muted);font-size:14px;line-height:1.6}
.swap-sheet{max-height:88vh;display:flex;flex-direction:column}
.swap-search-row{display:flex;align-items:center;gap:var(--space-2);margin:var(--space-2) 0}
.swap-search{flex:1;height:40px;padding:0 var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:14px;outline:none;transition:border-color .15s}
.swap-search:focus{border-color:var(--color-brand);background:var(--color-bg-primary)}
.swap-count{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);flex:0 0 auto;padding:0 var(--space-2)}
.swap-custom-badge{display:inline-block;margin-left:6px;padding:1px 6px;font-size:9px;font-weight:700;border-radius:var(--radius-sm);background:color-mix(in oklab,#8b5cf6 14%,var(--color-bg-primary));color:#8b5cf6;letter-spacing:.04em;text-transform:uppercase}
.btn-custom-food{width:100%;height:44px;background:transparent;color:var(--color-text-secondary);border:1px dashed var(--color-border);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;margin-top:var(--space-3);display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,color .15s,border-color .15s}
.btn-custom-food:hover{background:var(--color-bg-secondary);color:var(--color-text-primary);border-color:var(--color-border-strong);border-style:solid}
/* ── Sustitución de EJERCICIOS (espejo del food swap) ── */
.ex-swap-row{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-top:var(--space-3)}
.ex-swap-btn{flex:1 1 auto;min-height:40px;background:transparent;color:var(--color-text-secondary);border:1px dashed var(--color-border);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,color .15s,border-color .15s}
.ex-swap-btn:hover:not(:disabled){background:var(--color-bg-secondary);color:var(--color-text-primary);border-color:var(--color-border-strong);border-style:solid}
.ex-swap-btn:disabled{opacity:.45;cursor:not-allowed}
.ex-swap-revert{flex:0 0 auto;min-height:40px;padding:0 var(--space-3);background:var(--color-brand-subtle);color:var(--color-text-primary);border:1px solid var(--color-brand);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer}
.swap-ex-thumb{width:48px;height:48px;border-radius:var(--radius-md);object-fit:cover;flex:0 0 auto;background:var(--color-bg-tertiary)}
.swap-card-equip{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-top:2px}
/* ── Comentarios coach ↔ cliente ── */
.ex-comment-badge{display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:1px 7px;font-size:11px;font-weight:700;border-radius:999px;background:var(--color-brand);color:var(--color-on-brand);vertical-align:middle}
.dp-com-badge{position:absolute;top:4px;right:5px;font-size:10px;line-height:1}
.day-pill{position:relative}
.ex-comments{margin-top:var(--space-3);border-top:1px dashed var(--color-border);padding-top:var(--space-3)}
.ex-comments-title{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600;margin-bottom:var(--space-2)}
.ex-comments-list{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-2)}
.ex-com{padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:13px;line-height:1.45;max-width:88%}
.ex-com.is-coach{background:var(--color-brand-subtle);border:1px solid var(--color-brand);align-self:flex-start}
.ex-com.is-cliente{background:var(--color-bg-tertiary);border:1px solid var(--color-border);align-self:flex-end}
.ex-com-head{display:flex;justify-content:space-between;gap:var(--space-3);margin-bottom:2px}
.ex-com-autor{font-weight:700;font-size:11px;color:var(--color-text-secondary)}
.ex-com-fecha{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted)}
.ex-com-texto{color:var(--color-text-primary);white-space:pre-wrap;word-break:break-word}
.ex-com-empty{font-size:12px;color:var(--color-text-muted);padding:var(--space-2) 0;text-align:center}
.ex-comment-form{display:flex;gap:var(--space-2);align-items:flex-end}
.ex-comment-input{flex:1;min-height:40px;resize:vertical;padding:var(--space-2) var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:13px;font-family:inherit;color:var(--color-text-primary);outline:none;transition:border-color .15s}
.ex-comment-input:focus{border-color:var(--color-brand);background:var(--color-bg-primary)}
.ex-comment-send{flex:0 0 auto;height:40px;padding:0 var(--space-4);background:var(--color-brand);color:var(--color-on-brand);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer}
.ex-comment-send:disabled{opacity:.6;cursor:default}
/* ── Nota automática de progresión ── */
.prog-banner{background:var(--color-brand-subtle);border:1px solid var(--color-brand);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);margin-bottom:var(--space-3);font-size:13px;line-height:1.4;color:var(--color-text-primary)}
/* F3 — Start + cronómetro de sesión */
.session-start{display:flex;align-items:center;gap:var(--space-3);width:100%;padding:var(--space-3) var(--space-4);margin-bottom:var(--space-3);background:var(--color-brand);color:var(--color-on-brand);border:0;border-radius:var(--radius-md);cursor:pointer;text-align:left}
.session-start:disabled{opacity:.6}
.session-start .ss-icon{font-size:18px;flex:0 0 auto}
.session-start .ss-txt{display:flex;flex-direction:column;gap:2px}
.session-start .ss-txt strong{font-size:15px}
.session-start .ss-txt small{font-size:11px;opacity:.85;line-height:1.3}
.session-crono{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);margin-bottom:var(--space-3);background:var(--color-bg-primary);border:1px solid color-mix(in oklab,var(--color-brand) 40%,var(--color-border));border-radius:var(--radius-md);font-family:var(--font-mono)}
.session-crono .sc-dot{width:8px;height:8px;border-radius:50%;background:var(--color-brand);animation:sc-pulse 1.6s ease infinite}
.session-crono .sc-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--color-brand)}
.session-crono .sc-time{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--color-text-primary)}
.session-crono .sc-hint{margin-left:auto;font-size:10px;color:var(--color-text-muted)}
@keyframes sc-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.prog-banner.is-calibracion{background:var(--color-bg-tertiary);border-color:var(--color-border)}
.ex-prog-nota{display:flex;flex-direction:column;gap:2px;background:var(--color-brand-subtle);border:1px solid var(--color-brand);border-left-width:3px;border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);margin-bottom:var(--space-3)}
.ex-prog-nota.is-mantener,.ex-prog-nota.is-calibracion{background:var(--color-bg-tertiary);border-color:var(--color-border);border-left-color:var(--color-text-muted)}
.ex-prog-nota-lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;color:var(--color-text-secondary)}
.ex-prog-nota-txt{font-size:13px;line-height:1.45;color:var(--color-text-primary)}
.finish-cerrado-msg{text-align:center;font-size:14px;font-weight:600;color:var(--color-brand);padding:var(--space-2) 0}
/* ── Dato de la sesión anterior (MEJORA 3) ── */
.ex-prev-sesion{display:flex;align-items:baseline;gap:6px;margin-top:var(--space-1)}
.ex-prev-sesion .lbl{font-size:11px;color:var(--color-text-muted);font-weight:500}
.ex-prev-sesion .val{font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary);font-weight:600}

/* CUSTOM FOOD MODAL */
.custom-food-sheet{max-width:440px}
.cf-hint{font-size:12px;color:var(--color-text-muted);margin-bottom:var(--space-3);line-height:1.5}
.cf-form{display:flex;flex-direction:column;gap:var(--space-3)}
.cf-field{display:flex;flex-direction:column;gap:4px;flex:1}
.cf-field>span{font-size:11px;color:var(--color-text-muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.cf-field input,.cf-field select{height:40px;padding:0 var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:14px;outline:none;font-family:inherit;color:var(--color-text-primary)}
.cf-field input:focus,.cf-field select:focus{border-color:var(--color-brand);background:var(--color-bg-primary)}
.cf-hint{font-size:11px;color:var(--color-text-muted);font-weight:400;letter-spacing:0;text-transform:none;line-height:1.3;margin-top:2px}
/* F7 — escanear etiqueta */
.cf-scan-btn{display:block;width:100%;margin:var(--space-3) 0;padding:10px 12px;border:1px dashed color-mix(in oklab,var(--color-brand) 50%,var(--color-border));background:var(--color-brand-subtle);border-radius:var(--radius-md);font-size:13px;color:var(--color-text-primary);cursor:pointer;text-align:left;line-height:1.35}
.cf-scan-btn small{display:block;color:var(--color-text-muted);font-size:11px}
.cf-scan-btn:disabled{opacity:.6}
.cf-scan-status{margin:0 0 var(--space-3);padding:8px 10px;border-radius:var(--radius-md);background:var(--color-bg-secondary);border:1px solid var(--color-border);font-size:12px;line-height:1.4;color:var(--color-text-secondary)}
/* F8 — avisos del modal de sustitución */
.swap-aviso{margin:var(--space-2) 0;padding:8px 10px;border-radius:var(--radius-md);background:color-mix(in oklab,var(--color-warning) 8%,var(--color-bg-secondary));border:1px solid color-mix(in oklab,var(--color-warning) 30%,var(--color-border));font-size:12px;line-height:1.45;color:var(--color-text-secondary)}
/* F10 — comidas libres */
.comidas-libres{margin-top:var(--space-4);padding:var(--space-3) var(--space-4);border:1px dashed var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-primary)}
.cl-title{font-size:13px;font-weight:700;color:var(--color-text-primary);margin-bottom:var(--space-2)}
.cl-sub{font-size:11px;font-weight:500;color:var(--color-text-muted);margin-left:4px}
.cl-item{display:flex;align-items:center;gap:var(--space-3);padding:8px 0;border-bottom:1px solid var(--color-border)}
.cl-item:last-of-type{border-bottom:0}
.cl-info{flex:1;min-width:0}
.cl-desc{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.cl-hora{font-size:11px;font-weight:500;color:var(--color-text-muted);font-family:var(--font-mono);margin-left:4px}
.cl-macros{font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.cl-est{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);border-radius:999px;padding:0 5px;margin-left:4px}
.cl-del{flex:0 0 auto;width:26px;height:26px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:50%;color:var(--color-text-muted);cursor:pointer;font-size:12px;line-height:1}
.cl-actions{display:flex;gap:8px;margin-top:var(--space-2)}
.cl-actions .btn-custom-food{margin-top:0;flex:1}
.cl-detalle{margin:0 0 var(--space-2);font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.cf-macros-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2)}
.cf-unit-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}
.cf-err{padding:var(--space-2) var(--space-3);background:color-mix(in oklab,#ef4444 10%,var(--color-bg-primary));border:1px solid #ef4444;border-radius:var(--radius-md);color:#ef4444;font-size:12px;margin-top:var(--space-2)}

/* PROGRESO */
.prog-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-2);margin-bottom:var(--space-4)}
.prog-stat{padding:var(--space-3) var(--space-4);background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;flex-direction:column;gap:2px}
.prog-stat .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600}
.prog-stat .val{font-family:var(--font-mono);font-size:22px;font-weight:600;letter-spacing:-.02em}
.prog-stat .val small{font-size:12px;color:var(--color-text-muted);font-weight:400;margin-left:2px}
.prog-stat .delta{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--color-success);display:inline-flex;align-items:center;gap:2px}
.prog-stat .delta.neg{color:var(--color-danger)}
.prog-section-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--color-text-primary);padding:var(--space-2) 0 var(--space-3);display:flex;align-items:baseline;justify-content:space-between}
.prog-section-title .meta{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);font-weight:500;text-transform:none;letter-spacing:0}
.exer-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-2);width:100%;cursor:pointer;text-align:left}
.exer-row .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.exer-row .name{font-size:14px;font-weight:600;letter-spacing:-.01em}
.exer-row .meta{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted)}
.exer-row .meta strong{color:var(--color-text-primary);font-weight:600}
.exer-row .spark{flex:0 0 auto;width:88px;height:36px}
.exer-row .delta{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--color-success);min-width:40px;text-align:right}
.exer-row .delta.neg{color:var(--color-danger)}
.prog-empty{padding:var(--space-8) var(--space-4);text-align:center;color:var(--color-text-muted);font-size:14px}
/* B5 — PR badge + skeleton de carga de Progreso */
.pr-badge{display:inline-block;margin-left:6px;padding:1px 7px;font-size:10px;font-weight:800;border-radius:999px;background:color-mix(in oklab,var(--color-warning) 20%,var(--color-bg-primary));color:var(--color-warning);letter-spacing:.03em;vertical-align:middle}
.sk-box{background:linear-gradient(90deg,var(--color-bg-secondary) 25%,color-mix(in oklab,var(--color-bg-secondary) 60%,var(--color-border)) 37%,var(--color-bg-secondary) 63%);background-size:400% 100%;animation:sk-shimmer 1.4s ease infinite;border-radius:var(--radius-md)}
.sk-row{pointer-events:none}
@keyframes sk-shimmer{0%{background-position:100% 0}100%{background-position:0 0}}

/* MODALS */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:480px;max-height:85vh;background:var(--color-bg-primary);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);overflow:auto;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:var(--color-border-strong);border-radius:var(--radius-full);margin:0 auto var(--space-2)}
.modal-title{font-size:var(--font-size-lg);font-weight:600;letter-spacing:-.01em}
.modal-text{font-size:14px;color:var(--color-text-secondary)}
.session-textarea{width:100%;min-height:96px;padding:var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);resize:vertical}
.detail-chart{height:160px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3)}
.detail-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
.detail-table th{text-align:left;padding:var(--space-2) var(--space-1);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);font-weight:600;border-bottom:1px solid var(--color-border)}
.detail-table td{padding:var(--space-2) var(--space-1);border-bottom:1px solid var(--color-border)}
.detail-table tr:last-child td{border-bottom:0}
.rir-sheet{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--space-2);padding:var(--space-2) 0}
.rir-opt{height:56px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:18px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rir-opt:hover{background:var(--color-bg-tertiary)}
.rir-opt.is-selected{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.rir-legend{font-size:11px;color:var(--color-text-muted);text-align:center;font-family:var(--font-mono)}

.error-demo-btn{display:block;width:100%;margin-top:12px;background:transparent;border:0;color:var(--color-text-muted);font-size:13px;text-decoration:underline;cursor:pointer;font-family:inherit}
.error-demo-btn:hover{color:var(--color-text-secondary)}
/* DEMO BANNER */
.demo-banner{margin:var(--space-4) 0 0;padding:var(--space-3) var(--space-4);background:color-mix(in oklab,var(--color-warning) 8%,var(--color-bg-secondary));border:1px solid color-mix(in oklab,var(--color-warning) 30%,var(--color-border));border-radius:var(--radius-md);font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.demo-banner strong{color:var(--color-text-primary)}

/* SAVE TOAST — feedback discreto del estado de guardado (Outbox) */
#save-toast{position:fixed;left:50%;bottom:calc(72px + env(safe-area-inset-bottom,0));transform:translateX(-50%) translateY(8px);z-index:60;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:600;font-family:var(--font-mono);box-shadow:0 4px 16px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
#save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#save-toast[data-state="saving"]{background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border)}
#save-toast[data-state="saved"]{background:color-mix(in oklab,var(--color-success,#10b981) 14%,var(--color-bg-secondary));color:var(--color-success,#10b981);border:1px solid color-mix(in oklab,var(--color-success,#10b981) 40%,var(--color-border))}
#save-toast[data-state="offline"]{background:color-mix(in oklab,var(--color-warning) 14%,var(--color-bg-secondary));color:var(--color-warning);border:1px solid color-mix(in oklab,var(--color-warning) 40%,var(--color-border))}

/* OFFLINE BANNER — barra superior cuando no hay conexión (R3) */
#offline-banner{position:fixed;top:0;left:0;right:0;z-index:70;padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top,0));background:var(--color-warning);color:#1a1a1a;font-size:12px;font-weight:600;font-family:var(--font-mono);text-align:center;line-height:1.35;transform:translateY(-100%);transition:transform .25s}
#offline-banner.show{transform:translateY(0)}

/* El atributo [hidden] siempre oculta, sin importar especificidad de otras reglas */
[hidden]{display:none!important}

/* Red de seguridad: ningún SVG inline debe crecer más allá de su contenedor */
svg{max-width:100%;max-height:100%}
button svg:not([width]),a svg:not([width]){width:1em;height:1em}

/* PWA — Banner "Agregar a pantalla de inicio" */
.a2hs-banner{
  position:fixed;
  left:50%;
  bottom:calc(72px + env(safe-area-inset-bottom) + var(--space-3));
  transform:translate(-50%, 200%);
  width:calc(100% - var(--space-6));
  max-width:448px;
  background:var(--color-bg-primary);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-4);
  display:flex;
  align-items:center;
  gap:var(--space-3);
  box-shadow:var(--shadow-lg);
  z-index:60;
  opacity:0;
  transition:transform .35s cubic-bezier(.2,.8,.3,1.2), opacity .25s ease;
}
.a2hs-banner.is-open{transform:translate(-50%, 0);opacity:1}
.a2hs-close{
  position:absolute;
  top:6px;right:8px;
  width:24px;height:24px;
  background:transparent;border:0;color:var(--color-text-muted);
  font-size:20px;line-height:1;cursor:pointer;padding:0;
}
.a2hs-close:hover{color:var(--color-text-primary)}
.a2hs-icon{flex:0 0 auto;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.a2hs-icon svg{display:block;width:44px;height:44px}
.a2hs-body{flex:1;min-width:0;padding-right:var(--space-4)}
.a2hs-title{font-size:14px;font-weight:600;color:var(--color-text-primary);letter-spacing:-.01em;margin-bottom:3px}
.a2hs-text{font-size:12px;color:var(--color-text-secondary);line-height:1.45;word-wrap:break-word}
.a2hs-text strong{color:var(--color-text-primary);font-weight:600;white-space:nowrap}
.a2hs-share-icon{width:13px;height:13px;color:#0a84ff;flex:0 0 auto;display:inline-block;vertical-align:-2px;margin:0 1px}
.a2hs-install{
  flex:0 0 auto;
  background:var(--color-brand);
  color:var(--color-on-brand);
  border:0;
  border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-4);
  font-size:13px;font-weight:600;
  cursor:pointer;
  white-space:nowrap;
  transition:background .15s;
}
.a2hs-install:active{transform:scale(.97)}
.a2hs-install:hover{background:var(--color-brand-hover)}

/* ═══════════════════════════════════════════════════════════════
   DESIGN v2 — pulido visual (append-only: solo overrides, cero
   cambios de estructura/JS). Identidad Pump: lima #b8f060 + negro,
   estética de instrumento de rendimiento. Titulares en Archivo,
   números en JetBrains Mono, glow lima como firma en los momentos
   de logro (serie confirmada, día completado, descanso terminado).
   ═══════════════════════════════════════════════════════════════ */

/* ── Tipografía display para titulares ── */
.hdr-title,.ex-name,.finish-card h2,.diet-info h2,.error-title,.meal-name,.streak-dias{font-family:"Archivo",var(--font-sans)}
.hdr-title{font-weight:800;letter-spacing:-.028em}
.ex-name{font-weight:700;letter-spacing:-.022em}
.finish-card h2{font-weight:800;letter-spacing:-.03em}
.diet-info h2{font-weight:700;letter-spacing:-.02em}

/* ── Atmósfera: halo lima sutil arriba del todo ── */
body{background-image:radial-gradient(130% 52% at 50% -14%,color-mix(in oklab,var(--color-brand) 9%,transparent),transparent 62%)}
[data-theme="dark"] body{background-image:radial-gradient(130% 48% at 50% -16%,rgba(184,240,96,.08),transparent 60%)}
.app{background:transparent}

/* ── Profundidad: sombras en dos capas ── */
.ex-card,.meal,.myday-section,.myday-streak,.diet-hdr,.finish-card,.prog-stat{box-shadow:0 1px 1px rgba(10,10,10,.025),0 1px 3px rgba(10,10,10,.03)}
[data-theme="dark"] .ex-card,[data-theme="dark"] .meal,[data-theme="dark"] .myday-section,[data-theme="dark"] .myday-streak,[data-theme="dark"] .diet-hdr,[data-theme="dark"] .finish-card,[data-theme="dark"] .prog-stat{box-shadow:0 1px 2px rgba(0,0,0,.35)}
.ex-card{transition:border-color .2s,box-shadow .25s,transform .2s,background .2s}
.ex-card.is-expanded{box-shadow:0 2px 4px rgba(10,10,10,.04),0 12px 32px rgba(10,10,10,.09)}
[data-theme="dark"] .ex-card.is-expanded{box-shadow:0 2px 6px rgba(0,0,0,.4),0 14px 36px rgba(0,0,0,.5)}
@media (hover:hover){.ex-card:not(.is-expanded):hover{border-color:var(--color-border-strong);transform:translateY(-1px)}}

/* ── Header: marca de agua de energía ── */
.week-pill{background:color-mix(in oklab,var(--color-brand) 14%,var(--color-bg-primary));border-color:color-mix(in oklab,var(--color-brand) 32%,var(--color-border));color:var(--color-text-primary);font-weight:600}

/* ── Day pills: pastillas full-round con estados con carácter ── */
.day-pill{position:relative;border-radius:var(--radius-full);padding:7px 16px;transition:background .2s,color .2s,border-color .2s,box-shadow .2s,transform .15s}
.day-pill:active{transform:scale(.955)}
.day-pill.is-active{box-shadow:0 3px 10px rgba(10,10,10,.16)}
[data-theme="dark"] .day-pill.is-active{box-shadow:0 3px 12px rgba(0,0,0,.55)}
.day-pill.is-done{background:linear-gradient(180deg,color-mix(in oklab,var(--color-brand) 17%,var(--color-bg-primary)),color-mix(in oklab,var(--color-brand) 8%,var(--color-bg-primary)))}
.day-pill.is-active.is-done{background:linear-gradient(180deg,#c8f97c,#abe354);box-shadow:0 3px 14px color-mix(in oklab,var(--color-brand) 50%,transparent)}
.dp-check{top:3px;left:7px}

/* ── Barra de progreso del día: energía visible ── */
.progress-track{border:0;height:7px;background:color-mix(in oklab,var(--color-text-primary) 8%,transparent)}
.progress-fill{background:linear-gradient(90deg,color-mix(in oklab,var(--color-brand) 72%,#e8ffb8),var(--color-brand));box-shadow:0 0 10px color-mix(in oklab,var(--color-brand) 55%,transparent);border-radius:var(--radius-full);transition:width .5s cubic-bezier(.22,.9,.32,1)}

/* ── Botones primarios: gradiente lima + sombra de color + press ── */
.btn-primary,.session-start,.error-paste-btn{background:linear-gradient(180deg,#c8f97c,#addf55);box-shadow:0 1px 2px rgba(10,10,10,.08),0 6px 20px color-mix(in oklab,var(--color-brand) 35%,transparent);transition:transform .15s,box-shadow .2s,filter .2s}
.btn-primary:hover,.session-start:hover,.error-paste-btn:hover{background:linear-gradient(180deg,#c8f97c,#a5d94c);filter:saturate(1.06)}
.btn-primary:active,.session-start:active,.error-paste-btn:active{transform:scale(.977)}
.btn-primary:disabled{background:var(--color-bg-tertiary);box-shadow:none;transform:none}
.session-start{border-radius:var(--radius-lg)}
.ex-comment-send:active,.track-btn:active,.opt-tab:active{transform:scale(.96)}

/* ── Celebración: pop al confirmar ── */
@keyframes v2-pop{0%{transform:scale(.5)}62%{transform:scale(1.14)}100%{transform:scale(1)}}
.ex-card.is-completo .ex-status,.ex-card.is-completed .ex-status{animation:v2-pop .32s cubic-bezier(.2,.8,.3,1.15)}
.set-row.is-confirmed .set-confirm:not(.is-edit){animation:v2-pop .26s cubic-bezier(.2,.8,.3,1.15)}
.pip{transition:background .2s,border-color .2s}
.pip.done{animation:v2-pop .26s cubic-bezier(.2,.8,.3,1.15)}
.hb.is-yes.is-active,.track-btn.track-yes.is-active{animation:v2-pop .24s cubic-bezier(.2,.8,.3,1.15)}

/* ── Inputs de series: foco lima decidido ── */
.set-input:focus{border-color:color-mix(in oklab,var(--color-brand) 65%,var(--color-text-primary));box-shadow:0 0 0 3px color-mix(in oklab,var(--color-brand) 28%,transparent)}
.set-input,.rir-btn,.set-confirm{transition:background .15s,border-color .15s,box-shadow .15s,transform .12s}
.set-confirm:active{transform:scale(.93)}

/* ── Tab bar: indicador vivo ── */
.tab{transition:color .2s}
.tab svg{transition:transform .2s cubic-bezier(.2,.8,.3,1.15)}
.tab:active svg{transform:scale(.88)}
.tab.is-active svg{transform:translateY(-1px)}
.tab-dot{width:5px;transition:width .3s cubic-bezier(.22,.9,.32,1),background .2s}
.tab.is-active .tab-dot{width:22px;box-shadow:0 0 8px color-mix(in oklab,var(--color-brand) 60%,transparent)}
.tab-badge{box-shadow:0 0 0 2px var(--color-bg-primary),0 2px 8px color-mix(in oklab,var(--color-brand) 45%,transparent)}

/* ── Rest bar: presencia y festejo al terminar ── */
.rest-bar{box-shadow:0 14px 36px rgba(0,0,0,.30),0 2px 10px rgba(0,0,0,.14)}
.rest-bar.is-done{background:linear-gradient(180deg,#c8f97c,#addf55);box-shadow:0 14px 40px color-mix(in oklab,var(--color-brand) 45%,transparent),0 2px 10px rgba(0,0,0,.12)}
@keyframes v2-breathe{50%{transform:scale(1.012)}}
.rest-bar.is-done{animation:v2-breathe 1.3s ease-in-out infinite}

/* ── Anillo de kcal y números héroe: glow de firma ── */
.kcal-ring .fill,.kcal-ring .ring{filter:drop-shadow(0 0 5px color-mix(in oklab,var(--color-brand) 55%,transparent))}
.streak-num{text-shadow:0 0 22px color-mix(in oklab,var(--color-brand) 40%,transparent)}
.salud-num{text-shadow:0 0 16px color-mix(in oklab,var(--color-brand) 30%,transparent)}
.rest-time{font-weight:700}

/* ── Toques táctiles en controles de Mi Día ── */
.hb,.train-opt,.agua-btn,.ex-variante-op,.icon-btn{transition:background .15s,border-color .15s,color .15s,transform .12s}
.hb:active,.train-opt:active,.ex-variante-op:active{transform:scale(.94)}
.agua-btn:active{transform:scale(.9)}
.icon-btn:active{transform:scale(.92)}

/* ── Cronómetro de sesión: pulso con glow ── */
.session-crono .sc-dot{box-shadow:0 0 8px color-mix(in oklab,var(--color-brand) 70%,transparent)}
.session-crono .sc-time{font-weight:700}

/* ── Comida marcada: acento más rico ── */
.meal.is-comido{border-left-color:var(--color-brand);background:linear-gradient(90deg,color-mix(in oklab,var(--color-brand) 5%,var(--color-bg-primary)),var(--color-bg-primary) 40%)}

/* ── Scrollbar discreta en desktop ── */
@media (hover:hover){
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--color-border-strong);border-radius:99px;border:3px solid var(--color-bg-secondary)}
  ::-webkit-scrollbar-track{background:transparent}
}

/* ── Card Peso corporal (N1) ── */
.peso-media{margin-left:auto;font-size:11px;color:var(--color-text-muted)}
.peso-media strong{color:var(--color-text-primary)}
.peso-input-row{display:flex;gap:var(--space-2)}
.peso-input{flex:1;height:48px;padding:0 var(--space-3);border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:18px;font-weight:600;color:var(--color-text-primary);text-align:center;font-variant-numeric:tabular-nums;outline:none;transition:border-color .15s,box-shadow .15s}
.peso-input:focus{border-color:color-mix(in oklab,var(--color-brand) 65%,var(--color-text-primary));box-shadow:0 0 0 3px color-mix(in oklab,var(--color-brand) 28%,transparent);background:var(--color-bg-primary)}
.peso-save{width:auto;flex:0 0 auto;height:48px;padding:0 var(--space-5);font-size:14px}
.peso-hint{font-size:11px;color:var(--color-text-muted);margin-top:var(--space-2)}
.peso-chart{width:100%;height:auto;margin-top:var(--space-3);display:block}
.peso-estado{margin-top:var(--space-2);font-size:13px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.peso-estado.ok strong{color:var(--color-success)}
.peso-estado.warn strong{color:var(--color-warning)}
.peso-objetivo{margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px dashed var(--color-border);font-size:12px;color:var(--color-text-muted)}
.peso-objetivo strong{color:var(--color-text-secondary)}

/* ── Fotos de progreso (P2/P3) ── */
.fp-intro{font-size:12px;color:var(--color-text-muted);margin:0 0 var(--space-3);line-height:1.45}
.fp-intro b{color:var(--color-text-secondary)}
.fp-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fp-slot{position:relative;min-height:88px;border:1.5px dashed var(--color-border-strong);background:var(--color-bg-secondary);border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--color-text-secondary);transition:background .15s,border-color .15s,transform .1s}
.fp-slot:active{transform:scale(.96)}
.fp-slot.is-done{border-style:solid;border-color:var(--color-brand);background:color-mix(in oklab,var(--color-brand) 12%,var(--color-bg-primary));color:var(--color-brand)}
.fp-slot-ico{font-size:20px;line-height:1}
.fp-slot-lbl{font-size:12px;font-weight:600}
.fp-slot-sub{font-size:9px;color:var(--color-text-muted);font-family:var(--font-mono)}
.fp-slot.has-thumb{border-style:solid;padding:0;overflow:hidden;justify-content:flex-end;min-height:124px}
.fp-slot-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:calc(var(--radius-md) - 2px)}
.fp-slot.has-thumb .fp-slot-lbl{position:relative;z-index:1;width:100%;padding:14px 4px 5px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);background:linear-gradient(transparent,rgba(0,0,0,.65))}
.fp-slot.has-thumb .fp-slot-sub{position:relative;z-index:1;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.fp-nota-comp{margin-top:var(--space-2);font-size:11px;color:var(--color-text-muted);text-align:center}
.fp-serie{margin-top:var(--space-3);font-size:13px;font-weight:600;color:var(--color-brand)}
.fp-bloqueado{margin-top:var(--space-3);padding:var(--space-3);border:1px dashed var(--color-border);border-radius:var(--radius-md);font-size:12px;color:var(--color-text-secondary);line-height:1.45;text-align:center}
.fp-bloqueado small{color:var(--color-text-muted);font-size:11px}
.fp-vergaleria{width:100%;margin-top:var(--space-3);height:44px;border:1px solid color-mix(in oklab,var(--color-brand) 45%,var(--color-border));background:color-mix(in oklab,var(--color-brand) 8%,var(--color-bg-primary));color:var(--color-text-primary);border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer}
.fp-vergaleria:active{transform:scale(.98)}
.fp-msg{margin-top:var(--space-2);font-size:12px;color:var(--color-text-muted);min-height:16px}
.fp-msg.is-ok{color:var(--color-brand);font-weight:600}
.fp-msg.is-warn{color:var(--color-warning)}
.fp-msg.is-err{color:var(--color-danger)}
/* elegir origen: camara o galeria (capture= fuerza camara y esconde el carrete) */
.fp-pick{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5)}
.fp-pick-card{width:100%;max-width:420px;background:var(--color-bg-primary);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:var(--space-4);padding-bottom:calc(var(--space-4) + env(safe-area-inset-bottom));box-shadow:var(--shadow-md)}
.fp-pick-tit{font-size:15px;font-weight:700;margin-bottom:var(--space-3);color:var(--color-text-primary)}
.fp-pick-btn{width:100%;height:52px;margin-bottom:8px;border:1px solid var(--color-border-strong);background:var(--color-bg-secondary);color:var(--color-text-primary);border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;padding:0 var(--space-4)}
.fp-pick-btn:active{transform:scale(.98)}
.fp-pick-btn.is-cancel{background:transparent;border-color:transparent;color:var(--color-text-muted);height:44px;font-weight:500;justify-content:center;margin-bottom:0}
/* galeria */
.fp-galeria{display:none}
.fp-galeria.is-open{display:block;background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-3);box-shadow:var(--shadow-md)}
.fp-gal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);font-size:15px}
.fp-gal-close{background:transparent;border:0;font-size:18px;color:var(--color-text-muted);cursor:pointer;padding:4px 8px}
.fp-comp-tabs{display:flex;gap:6px;margin-bottom:var(--space-3)}
.fp-comp-tab{flex:1;height:32px;border:1px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-size:12px;font-weight:600;color:var(--color-text-secondary);cursor:pointer}
.fp-comp-tab.is-on{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-on-brand)}
.fp-comp{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fp-comp figure{margin:0}
.fp-comp img{width:100%;border-radius:var(--radius-md);display:block;background:var(--color-bg-tertiary)}
.fp-comp figcaption{margin-top:4px;font-size:11px;color:var(--color-text-muted);text-align:center;font-family:var(--font-mono)}
.fp-comp-meta{margin-top:var(--space-2);text-align:center;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--color-text-primary)}
