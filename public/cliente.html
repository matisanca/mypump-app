/* ---- REST TIMER ----
 * Timer wall-clock (basado en Date.now() vs setInterval decremental) para
 * resistir el throttling que hace el navegador cuando la pestaña va a
 * background. Si el usuario sale a otra app/tab y vuelve, el remaining se
 * recalcula contra wall-clock — no se atrasa.
 *
 * Feedback al terminar:
 *   - 3 beeps generados con Web Audio API (oscilador, sin assets)
 *   - Vibración reforzada (patrón largo)
 *   - Notification del sistema si la pestaña está hidden (best-effort)
 *
 * Limitaciones conocidas:
 *   - Si el cliente CIERRA la pestaña: imposible notificar sin Service
 *     Worker + PWA full. Fuera de scope MVP.
 *   - iOS Safari suspende AudioContext si la pestaña queda background >30s.
 *     El beep puede no sonar al volver. La vibración sí dispara.
 *   - Sin persistencia entre recargas (descansos son cortos, raro reload).
 */

let _audioCtx       = null;
let _audioUnlocked  = false;
let _notifAsked     = false;

function unlockAudio() {
  if (_audioUnlocked) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    _audioCtx = new AC();
    // Tocar un buffer silencioso para "desbloquear" iOS Safari
    const b = _audioCtx.createBuffer(1, 1, 22050);
    const src = _audioCtx.createBufferSource();
    src.buffer = b; src.connect(_audioCtx.destination); src.start(0);
    _audioUnlocked = true;
  } catch(e) { /* sin audio, fallback a vibración */ }
}

function playRestDoneBeeps() {
  if (!_audioCtx) return;
  try {
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const now = _audioCtx.currentTime;
    [0, 0.22, 0.44].forEach(offset => {
      const osc  = _audioCtx.createOscillator();
      const gain = _audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      // Envelope rápido attack (10ms) + decay corto (140ms)
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.35, now + offset + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.14);
      osc.connect(gain); gain.connect(_audioCtx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.15);
    });
  } catch(e) {}
}

function fireRestDone() {
  // 1. Beep audio
  playRestDoneBeeps();
  // 2. Vibración reforzada (patrón más largo que el anterior)
  try { navigator.vibrate && navigator.vibrate([400,150,400,150,400]); } catch(e){}
  // 3. Notificación del sistema solo si la pestaña no está visible
  if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
    try {
      const n = new Notification('Descanso completo', {
        body: 'Volvé a la app y arrancá la próxima serie.',
        tag: 'mypump-rest',
        renotify: true,
      });
      setTimeout(() => { try { n.close(); } catch(e){} }, 8000);
      n.onclick = () => { window.focus(); n.close(); };
    } catch(e) {}
  }
}

function maybeAskNotifPermission() {
  if (_notifAsked) return;
  _notifAsked = true;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  try { Notification.requestPermission(); } catch(e) {}
}

function startRest(seconds) {
  stopRest();
  const now = Date.now();
  STATE.rest = {
    endsAt:       now + seconds * 1000,
    target:       seconds,
    intervalId:   null,
    doneFired:    false,
    autoCloseAt:  now + (seconds + 2) * 1000,
  };
  const bar = $('#restBar');
  bar.hidden = false;
  bar.classList.remove('is-done');
  updateRestUI();
  // Pedir permiso de notification la primera vez (no blocking)
  maybeAskNotifPermission();
  // Tick a 250ms: UI más fluida y, ante throttling, latencia ≤250ms para disparar "done"
  STATE.rest.intervalId = setInterval(restTick, 250);
}

function restTick() {
  if (!STATE.rest) return;
  const now = Date.now();
  // Dispara "done" la primera vez que cruzamos el endsAt
  if (now >= STATE.rest.endsAt && !STATE.rest.doneFired) {
    STATE.rest.doneFired = true;
    $('#restBar').classList.add('is-done');
    fireRestDone();
  }
  // Cerrar 2s después de done
  if (now >= STATE.rest.autoCloseAt) { stopRest(); return; }
  updateRestUI();
}

function stopRest() {
  if (STATE.rest && STATE.rest.intervalId) clearInterval(STATE.rest.intervalId);
  STATE.rest = null;
  $('#restBar').hidden = true;
  $('#restBar').classList.remove('is-done');
}

function updateRestUI() {
  if (!STATE.rest) return;
  const remainingSec = Math.max(0, Math.ceil((STATE.rest.endsAt - Date.now()) / 1000));
  $('#restTime').textContent = fmtTime(remainingSec);
  $('#restTarget').textContent = `/ ${fmtTime(STATE.rest.target)} objetivo`;
  const pct = Math.max(0, Math.min(100, ((STATE.rest.target - remainingSec) / STATE.rest.target) * 100));
  $('#restProgFill').style.width = pct + '%';
}

$$('[data-rest]').forEach(btn => btn.addEventListener('click', () => {
  const v = btn.getAttribute('data-rest');
  if (!STATE.rest) return;
  if (v === 'skip') { stopRest(); return; }
  const deltaSec = parseInt(v);
  STATE.rest.endsAt      += deltaSec * 1000;
  STATE.rest.autoCloseAt += deltaSec * 1000;
  if (deltaSec > 0) STATE.rest.target += deltaSec;
  // Si estábamos en done y sumamos tiempo → salir de done y refire al llegar
  if (STATE.rest.endsAt > Date.now()) {
    STATE.rest.doneFired = false;
    $('#restBar').classList.remove('is-done');
  }
  updateRestUI();
}));

// Al volver foreground, forzar un tick para recalcular contra wall-clock
// (compensa el throttling de setInterval cuando la pestaña estuvo background).
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && STATE.rest) restTick();
});

/* ---- DIET SCENE ---- */
/* ---- DIET TRACKING (marcar qué comí + macros consumidos) ----
 * Una marca por (cliente, fecha, comida_id). Si no hay fila → pendiente.
 * Estado: 'comido' | 'saltado'. La marca guarda la opción A/B/C elegida
 * AL MOMENTO de marcar, así si el cliente cambia el tab a otra opción
 * después, el cálculo de macros consumidos mantiene la opción real.
 */
async function loadComidasMarcadas() {
  if (!TOKEN || (DATA && DATA._isDemo)) {
    STATE.comidasMarcadas = {};
    STATE.comidasLoaded = true;
    if (STATE.scene === 'diet') renderDiet();
    return;
  }
  try {
    const rows = await window.mypumpDB.getComidasMarcadas(TOKEN, TODAY_LOCAL);
    const map = {};
    (rows || []).forEach(r => {
      map[r.comida_id] = {
        opcion:     r.opcion_elegida,
        estado:     r.estado,
        marcada_en: r.marcada_en,
      };
    });
    STATE.comidasMarcadas = map;
    STATE.comidasLoaded = true;
    if (STATE.scene === 'diet') renderDiet();
  } catch(e) {
    console.error('[Diet] error cargando comidas marcadas:', e);
    STATE.comidasMarcadas = {};
    STATE.comidasLoaded = true;
  }
}

async function toggleComidaEstado(comidaId, nuevoEstado) {
  // nuevoEstado: 'comido' | 'saltado' | null (null = desmarcar)
  const plan = getActivePlan();
  const comida = plan.comidas.find(c => c.id === comidaId);
  if (!comida) return;
  const optIdx = STATE.meals[comidaId]?.selectedOpt || 0;
  const opcionNombre = comida.options[optIdx]?.name || 'A';

  // Optimistic update
  const prev = STATE.comidasMarcadas[comidaId];
  if (nuevoEstado === null) delete STATE.comidasMarcadas[comidaId];
  else STATE.comidasMarcadas[comidaId] = { opcion: opcionNombre, estado: nuevoEstado };
  renderDiet();

  // Modo demo: solo memoria, no backend
  if (!TOKEN || (DATA && DATA._isDemo)) return;

  let res;
  if (nuevoEstado === null) {
    res = await window.mypumpDB.desmarcarComida(TOKEN, TODAY_LOCAL, comidaId);
  } else {
    res = await window.mypumpDB.marcarComida(TOKEN, TODAY_LOCAL, comidaId, opcionNombre, nuevoEstado);
  }
  if (!res.success) {
    // Rollback
    if (prev) STATE.comidasMarcadas[comidaId] = prev;
    else delete STATE.comidasMarcadas[comidaId];
    renderDiet();
    console.error('[Diet] error marcando comida:', res.error);
  }
}

function calcularConsumido() {
  const plan = getActivePlan();
  const tot = { kcal: 0, prot: 0, carb: 0, fat: 0 };
  let nComidas = 0, nComidasMarcadas = 0;
  for (const c of plan.comidas) {
    nComidas++;
    const mark = STATE.comidasMarcadas[c.id];
    if (!mark || mark.estado !== 'comido') continue;
    nComidasMarcadas++;
    // Usar la opción guardada en la marca (no la actualmente seleccionada en UI)
    const optIdx = c.options.findIndex(o => o.name === mark.opcion);
    const opt = c.options[optIdx >= 0 ? optIdx : 0];
    const idxFinal = optIdx >= 0 ? optIdx : 0;
    // Aplicar swaps con getEffectiveFood (respeta sustituciones del cliente)
    const foods = opt.foods.map((f, fi) => getEffectiveFood(f, c.id, idxFinal, fi));
    for (const f of foods) {
      tot.kcal += f.kcal || 0;
      tot.prot += f.prot || 0;
      tot.carb += f.carb || 0;
      tot.fat  += f.fat  || 0;
    }
  }
  return { ...tot, nComidas, nComidasMarcadas };
}

function renderDiet() {
  const root = $('#scene-diet');
  const plan = getActivePlan();
  const tg = plan.macros_target;

  let tipoDiaHtml = '';
  if (DIET.tipos_dia && DIET.tipos_dia.length > 1) {
    const activeId = STATE.activeTipoDia || DIET.tipos_dia[0].id;
    tipoDiaHtml = `<div class="tipo-dia-sel">${
      DIET.tipos_dia.map(t =>
        `<button class="tipo-dia-btn${t.id===activeId?' is-active':''}" data-tipodía="${t.id}">${t.nombre}</button>`
      ).join('')
    }</div>`;
  }

  // Calcular consumido y porcentaje del ring de kcal
  const consumido = calcularConsumido();
  const pctKcal = tg.kcal > 0 ? Math.min(100, (consumido.kcal / tg.kcal) * 100) : 0;
  // Ring SVG: circunferencia = 2 * PI * r (r=36) ≈ 226.19
  const RING_CIRC = 226.19;
  const ringOffset = RING_CIRC * (1 - pctKcal / 100);

  root.innerHTML = `
  ${tipoDiaHtml}
  <div class="diet-hdr">
    <div class="diet-hdr-top">
      <div class="kcal-ring">
        <svg viewBox="0 0 88 88">
          <circle class="track" cx="44" cy="44" r="36"/>
          <circle class="ring" cx="44" cy="44" r="36"
                  stroke-dasharray="${RING_CIRC.toFixed(2)}"
                  stroke-dashoffset="${ringOffset.toFixed(2)}"/>
        </svg>
        <div class="center"><span class="num">${Math.round(consumido.kcal).toLocaleString('es-AR')}</span><span class="lbl">/${tg.kcal}</span></div>
      </div>
      <div class="diet-info">
        <div class="eyebrow">DIETA · SEM ${DATA.rutina.semana_actual}/${DATA.rutina.semanas_total}</div>
        <h2>${tg.kcal} kcal objetivo</h2>
        <div class="target"><strong>${tg.prot}g</strong> prot · <strong>${tg.carb}g</strong> carb · <strong>${tg.fat}g</strong> gra</div>
      </div>
    </div>
    <div class="macros-row">
      ${renderMacroTarget('p','Proteína',tg.prot,'g')}
      ${renderMacroTarget('c','Carbs',tg.carb,'g')}
      ${renderMacroTarget('f','Grasa',tg.fat,'g')}
    </div>
    <div class="consumido-row">
      <div class="consumido-hdr">
        <span class="consumido-lbl">Consumido hoy</span>
        <span class="consumido-progreso">${consumido.nComidasMarcadas}/${consumido.nComidas} comidas</span>
      </div>
      <div class="consumido-bar">
        <div class="consumido-bar-fill" style="width:${pctKcal.toFixed(1)}%"></div>
      </div>
      <div class="consumido-macros">
        <strong>${Math.round(consumido.kcal)}</strong> / ${tg.kcal} kcal ·
        <strong>${Math.round(consumido.prot)}</strong>p ·
        <strong>${Math.round(consumido.carb)}</strong>c ·
        <strong>${Math.round(consumido.fat)}</strong>g
      </div>
    </div>
  </div>
  ${plan.comidas.map((c,i) => renderMeal(c,i)).join('')}`;
  bindDietEvents();
}

function renderMacroTarget(cls, label, target, unit) {
  return `
    <div class="macro ${cls}">
      <span class="lbl">${label}</span>
      <span class="val">${target}<small>${unit}</small></span>
    </div>`;
}

function renderFood(originalFood, comidaId, optIdx, foodIdx) {
  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  const swap = STATE.foodSwaps[key];
  const f = swap ? swap.current : originalFood;
  const isSwapped = !!swap;
  const cat = originalFood.category || inferFoodCategory(originalFood);
  const swappable = originalFood.swappable !== false && cat !== 'condimento';

  return `
  <div class="food">
    <div class="food-info">
      <div class="food-name">${f.name}${isSwapped
        ? ` <span class="swap-badge" data-revert="${comidaId}|${optIdx}|${foodIdx}" title="Toca para volver al original">↔</span>`
        : ''}</div>
      <div class="food-qty">${f.qty} ${f.unit} · ${f.kcal} kcal</div>
    </div>
    <div class="food-macros">
      <span><strong>${f.prot}</strong>p</span>
      <span><strong>${f.carb}</strong>c</span>
      <span><strong>${f.fat}</strong>g</span>
      ${swappable
        ? `<button class="swap-btn" data-swap="${comidaId}|${optIdx}|${foodIdx}" title="Sustituir">↔</button>`
        : ''}
    </div>
  </div>`;
}

function renderMeal(c, idx) {
  const st = STATE.meals[c.id] || {selectedOpt:0};
  const optIdx = st.selectedOpt || 0;
  const opt = c.options[optIdx] || c.options[0];
  const displayFoods = opt.foods.map((f,fi) => getEffectiveFood(f, c.id, optIdx, fi));
  const tot = displayFoods.reduce((a,f) => ({
    kcal: a.kcal+(f.kcal||0), prot: a.prot+(f.prot||0),
    carb: a.carb+(f.carb||0), fat:  a.fat+(f.fat||0)
  }), {kcal:0,prot:0,carb:0,fat:0});
  const mealNum = idx !== undefined ? idx+1 : c.id.replace('c','');

  // Estado de tracking (comido/saltado/pendiente)
  const mark = STATE.comidasMarcadas[c.id];
  const estado = mark?.estado;
  const mealCls = 'meal' + (estado === 'comido' ? ' is-comido' : estado === 'saltado' ? ' is-saltado' : '');
  const badge = estado === 'comido'  ? ' <span class="meal-badge ok">✓</span>'
              : estado === 'saltado' ? ' <span class="meal-badge skip">✗</span>'
              : '';

  return `
  <div class="${mealCls}">
    <button class="meal-head" data-meal="${c.id}">
      <span class="meal-num">${mealNum}</span>
      <div class="meal-info">
        <div class="meal-name">${c.name}${badge}</div>
        <div class="meal-sub">opción ${opt.name} · ${opt.foods.length} alimentos</div>
      </div>
      <span class="meal-kcal">${Math.round(tot.kcal)}<small>kcal</small></span>
    </button>
    <div class="meal-track">
      <button class="track-btn track-yes${estado==='comido' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|comido"
              aria-label="Marcar como comido">✓ Comí</button>
      <button class="track-btn track-no${estado==='saltado' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|saltado"
              aria-label="Marcar como saltado">✗ Salté</button>
    </div>
    <div class="meal-body">
      <div class="opt-tabs">
        ${c.options.map((o,i) =>
          `<button class="opt-tab${i===optIdx?' is-active':''}" data-opt="${c.id}|${i}">Opción ${o.name}</button>`
        ).join('')}
      </div>
      <div class="foods">
        ${opt.foods.map((f,fi) => renderFood(f, c.id, optIdx, fi)).join('')}
      </div>
      <div class="meal-totals">
        <span><span class="lbl">TOTAL</span></span>
        <span><strong>${Math.round(tot.kcal)}</strong> kcal · <strong>${Math.round(tot.prot)}</strong>p / <strong>${Math.round(tot.carb)}</strong>c / <strong>${Math.round(tot.fat)}</strong>g</span>
      </div>
    </div>
  </div>`;
}

function bindDietEvents() {
  // Selector tipo-día (Formato B)
  $$('[data-tipodía]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    STATE.activeTipoDia = btn.getAttribute('data-tipodía');
    localStorage.setItem('mypump_tipo_dia', STATE.activeTipoDia);
    STATE.meals = buildMeals();
    renderDiet();
  }));
  // Expand/collapse meal (sin acciones hijas)
  $$('[data-meal]').forEach(btn => btn.addEventListener('click', e => {
    if (e.target.closest('[data-opt]') || e.target.closest('[data-swap]') || e.target.closest('[data-revert]') || e.target.closest('[data-comida-mark]')) return;
    renderDiet();
  }));
  // Toggle "✓ Comí" / "✗ Salté" — no expande el meal
  $$('[data-comida-mark]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, accion] = btn.getAttribute('data-comida-mark').split('|');
    const current = STATE.comidasMarcadas[comidaId]?.estado;
    const nuevo = current === accion ? null : accion; // toggle: re-tap desmarca
    toggleComidaEstado(comidaId, nuevo);
  }));
  // Cambio de opción
  $$('[data-opt]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [id, idx] = btn.getAttribute('data-opt').split('|');
    STATE.meals[id].selectedOpt = +idx;
    renderDiet();
  }));
  // Abrir modal swap
  $$('[data-swap]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-swap').split('|');
    const plan = getActivePlan();
    const comida = plan.comidas.find(c => c.id === comidaId);
    if (!comida) return;
    const food = comida.options[+optIdx]?.foods[+foodIdx];
    if (!food) return;
    openSwapModal(food, comidaId, +optIdx, +foodIdx);
  }));
  // Revertir swap — local + backend
  $$('[data-revert]').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-revert').split('|');
    const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
    delete STATE.foodSwaps[key];
    persistSwaps();
    renderDiet();
    if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
      const res = await window.mypumpDB.deleteFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx);
      if (!res.success) console.warn('[swap] error borrando swap en backend:', res.error);
    }
  }));
}

// Hidrata foodSwaps + custom foods desde Supabase y re-renderiza la dieta.
// También migra los swaps de localStorage al backend la primera vez (one-shot).
async function hydrateSwapsAndCustomFoodsFromBackend() {
  try {
    // 1. Custom foods → agregar a MYPUMP_FOOD_DB
    const customs = await window.mypumpDB.getCustomFoods(TOKEN) || [];
    customs.forEach(cf => {
      const food = {
        name: cf.name,
        kcal: Number(cf.kcal),
        prot: Number(cf.prot),
        carb: Number(cf.carb),
        fat:  Number(cf.fat),
        unit: cf.unit,
        unitGrams: cf.unit_grams ? Number(cf.unit_grams) : undefined,
        category: cf.category,
        _isCustom: true,
      };
      const idx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === food.name.toLowerCase());
      if (idx >= 0) window.MYPUMP_FOOD_DB[idx] = food;
      else window.MYPUMP_FOOD_DB.push(food);
    });

    // 2. Food swaps remotos
    const remoteSwaps = await window.mypumpDB.getFoodSwaps(TOKEN, DIETA_ID) || [];

    if (remoteSwaps.length === 0 && Object.keys(STATE.foodSwaps).length > 0) {
      // Caso migración: hay swaps en localStorage pero ninguno en backend → subir los locales
      const promises = [];
      for (const [key, swap] of Object.entries(STATE.foodSwaps)) {
        if (!swap || !swap.current) continue;
        // key format: swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}
        const m = key.match(new RegExp(`^swap_${DIETA_ID}_(.+?)_(\\d+)_(\\d+)$`));
        if (!m) continue;
        const [, comidaId, optIdx, foodIdx] = m;
        promises.push(window.mypumpDB.saveFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx, swap.current));
      }
      await Promise.allSettled(promises);
    } else if (remoteSwaps.length > 0) {
      // Backend es la fuente de verdad — sobrescribir STATE.foodSwaps
      const newSwaps = {};
      remoteSwaps.forEach(s => {
        const key = `swap_${DIETA_ID}_${s.comida_id}_${s.opt_idx}_${s.food_idx}`;
        newSwaps[key] = { original: null, current: s.food_data };
      });
      STATE.foodSwaps = newSwaps;
      persistSwaps(); // mantener cache local sincronizado
    }

    // Si estamos en la escena de dieta, re-renderizar para reflejar swaps/custom foods
    if (STATE.scene === 'diet') renderDiet();
  } catch (e) {
    console.warn('[init] hydrate swaps/custom foods error:', e);
  }
}

async function loadProgressAndRender() {
  const allEx = DATA.dia.bloques.flatMap(b => b.ejercicios).filter(ex => ex.tipo !== 'calentamiento');
  const results = await Promise.all(
    allEx.map(ex => window.mypumpDB.getHistoricoEjercicio(TOKEN, ex.id, 24)
      .then(rows => ({id:ex.id, name:ex.nombre, rows: rows || []}))
    )
  );
  // Cache into DATA
  for (const r of results) DATA.historico_por_ejercicio[r.id] = r.rows;

  const exercises = results
    .filter(r => r.rows.length > 0)
    .map(r => {
      // Group by date, take max weight
      const byDate = {};
      for (const row of r.rows) {
        const date = (row.registrado_en || '').split('T')[0];
        if (!date) continue;
        if (byDate[date] === undefined || row.peso_kg > byDate[date]) byDate[date] = row.peso_kg;
      }
      const series = Object.values(byDate).slice(-8);
      if (!series.length) return null;
      const topVal = Math.max(...series);
      const first = series[0], last = series[series.length-1];
      const delta = (series.length > 1 && first > 0) ? ((last-first)/first*100).toFixed(1) : null;
      return {
        id: r.id,
        name: r.name,
        series,
        top: `${topVal}kg`,
        delta: delta ? `${delta > 0 ? '+' : ''}${delta}%` : null,
        best: `${topVal}kg`,
      };
    }).filter(Boolean);

  STATE.progressData = {
    stats: [
      {lbl:'Ejercicios hoy', val: DATA.dia.bloques.flatMap(b=>b.ejercicios).length, suffix:'', delta:null},
      {lbl:'Con historial',  val: exercises.length, suffix:'', delta:null},
    ],
    exercises,
  };
  STATE.progressLoaded = true;
  renderProgress();
}

function sparkSVG(series, w, h) {
  const pad = 2;
  const min = Math.min(...series), max = Math.max(...series);
  const range = (max-min) || 1;
  const xStep = (w-pad*2) / Math.max(series.length-1, 1);
  const pts = series.map((v,i) => [pad+i*xStep, h-pad - ((v-min)/range)*(h-pad*2)]);
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${path} L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const last = pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <path d="${area}" fill="var(--color-brand-subtle)"/>
    <path d="${path}" fill="none" stroke="var(--color-brand)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.4" fill="var(--color-brand)" stroke="var(--color-bg-primary)" stroke-width="1.2"/>
  </svg>`;
}

function formatFechaLocal(isoDate) {
  // isoDate = 'YYYY-MM-DD'
  const [y, m, d] = isoDate.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

async function loadMyday() {
  if (!TOKEN) return;
  try {
    const [habitos, streak] = await Promise.all([
      window.mypumpDB.getHabitosDia(TOKEN, TODAY_LOCAL),
      window.mypumpDB.getStreak(TOKEN),
    ]);
    MYDAY  = habitos;
    STREAK = streak;
    STATE.mydayLoaded = true;
    // Si el tab ya está abierto, re-renderizar ahora que tenemos datos
    if (STATE.scene === 'myday') renderMyday();
  } catch(e) {
    console.error('[Mi Día] error cargando hábitos:', e);
    MYDAY  = null;
    STREAK = { streak: 0, ultimo_dia_valido: null };
    STATE.mydayLoaded = true;
    if (STATE.scene === 'myday') renderMyday();
  }
}

async function setHabito(campo, valor) {
  if (!TOKEN) return;
  const res = await window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, campo, valor);
  if (res.success && res.data && res.data.length > 0) {
    MYDAY = res.data[0];
    // Re-render solo las partes que cambiaron
    renderMyday();
    // Actualizar streak si fue un hábito que afecta streak
    if (['entrenamiento','comio_segun_plan','durmio_bien'].includes(campo)) {
      const streakData = await window.mypumpDB.getStreak(TOKEN);
      if (streakData) STREAK = streakData;
      renderMydayStreak();
    }
  }
}

function renderAguaGlasses(n) {
  let html = '';
  for (let i = 0; i < 12; i++) {
    html += `<span class="agua-glass${i < n ? '' : ' empty'}">💧</span>`;
  }
  return html;
}

let _aguaTimer = null;
function cambiarAgua(delta) {
  const current = MYDAY?.vasos_agua ?? 0;
  const next = Math.max(0, Math.min(12, current + delta));
  if (next === current) return;

  // Actualizar UI inmediatamente (optimistic)
  if (MYDAY) MYDAY.vasos_agua = next;
  else MYDAY = { vasos_agua: next };
  const numEl = $('#aguaNum');
  const glassEl = $('#aguaGlasses');
  if (numEl) numEl.textContent = next;
  if (glassEl) glassEl.innerHTML = renderAguaGlasses(next);

  // Debounce: guardar al servidor 600ms después del último clic
  clearTimeout(_aguaTimer);
  _aguaTimer = setTimeout(() => {
    window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, 'vasos_agua', String(next)).then(res => {
      if (res.success && res.data?.length > 0) MYDAY = res.data[0];
    });
  }, 600);
}

function renderAdhGrid(rows) {
  if (!rows || rows.length === 0) {
    return `<div style="padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:13px">Sin datos aún</div>`;
  }
  // rows ordenados más reciente primero (desde la RPC)
  // Necesitamos reversed para mostrar cronológicamente de izq a der
  const sorted = [...rows].reverse(); // más antiguo primero
  let html = '<div class="adh-grid">';
  sorted.forEach(row => {
    const isHoy = row.fecha === TODAY_LOCAL;
    let cls = 'adh-day vacio';
    if (row.es_valido) cls = 'adh-day valido';
    else if (row.entrenamiento || row.comio_segun_plan != null || row.durmio_bien != null) cls = 'adh-day parcial';
    if (isHoy) cls += ' hoy';
    const label = new Date(row.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    html += `<div class="${cls}" title="${label}"></div>`;
  });
  html += '</div>';
  // Leyenda
  const validos = rows.filter(r => r.es_valido).length;
  html += `<div style="padding:0 var(--space-4) var(--space-4);display:flex;gap:var(--space-3);font-size:12px;color:var(--color-text-muted);align-items:center">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-brand);display:inline-block;opacity:.85"></span> Día cumplido</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-bg-tertiary);border:1px solid var(--color-border);display:inline-block"></span> Sin datos</span>
    <span style="margin-left:auto;font-weight:600;color:var(--color-text-secondary)">${validos}/30</span>
  </div>`;
  return html;
}

/* ---- INIT ---- */
async function init() {
  // Apply saved theme
  const savedTheme = localStorage.getItem('mypump-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.body.setAttribute('data-theme', savedTheme);

  if (!TOKEN) { showError('no-token'); return; }

  showLoading();
  window.mypumpDB.init();

  const info = await window.mypumpDB.getClienteInfo(TOKEN);
  if (!info) {
    // Distinguir: token inválido (sin error) vs servicio caído (error de red/cuota/server)
    const lastErr = window.mypumpDB._lastError;
    if (lastErr) {
      // Hubo un error de servicio (402 cuota, 503 server, network down, etc.)
      // NO mostrar "Acceso revocado" — el token podría estar perfecto.
      console.error('[init] Service error:', lastErr);
      showError('service-down', TOKEN.slice(0,8)+'…');
    } else {
      // Sin error pero info=null → el token realmente no existe o está revocado
      showError('invalid', TOKEN.slice(0,8)+'…');
    }
    return;
  }

  const [rutina, dieta] = await Promise.all([
    window.mypumpDB.getRutinaActiva(TOKEN),
    window.mypumpDB.getDietaActiva(TOKEN),
  ]);

  // Build DATA
  if (rutina && rutina.estructura && rutina.estructura.dias) {
    RUTINA_ID = rutina.id;
    const est = rutina.estructura;
    const dia = getSuggestedDay(est.dias, rutina.id);
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil },
      rutina: {
        nombre_plan: est.nombre_plan || 'Mi plan',
        split: est.split || est.perfil?.split || '',
        semana_actual: rutina.semana_actual || 1,
        semanas_total: est.semanas_total || 1,
      },
      dia,
      historico_por_ejercicio: {},
      _dias: est.dias,
      _isDemo: false,
    };
    persistLastDay(dia.id, rutina.id); // persiste el día sugerido como punto de partida
  } else {
    // Demo fallback
    const dia = getSuggestedDay(SAMPLE_RUTINA.dias, 'demo');
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil },
      rutina: { ...SAMPLE_RUTINA, semana_actual: 1 },
      dia,
      historico_por_ejercicio: {},
      _dias: SAMPLE_RUTINA.dias,
      _isDemo: true,
    };
  }

  if (dieta && dieta.estructura && (dieta.estructura.comidas || dieta.estructura.tipos_dia)) {
    DIETA_ID = dieta.id;
    DIET = dieta.estructura;
  } else {
    DIET = SAMPLE_DIET;
  }

  // Restaurar tipo-día seleccionado (Formato B)
  if (DIET.tipos_dia && DIET.tipos_dia.length) {
    const savedTipo = localStorage.getItem('mypump_tipo_dia');
    STATE.activeTipoDia = (DIET.tipos_dia.find(t => t.id === savedTipo) || DIET.tipos_dia[0]).id;
  }

  STATE.meals = buildMeals();

  // Cargar swaps persistidos del localStorage (fast path; sirve como cache de lectura)
  STATE.foodSwaps = JSON.parse(
    localStorage.getItem(`mypump_food_swaps_${DIETA_ID||'demo'}`) || '{}'
  );

  // Hidratar foodSwaps + custom foods desde Supabase (multi-device + truth of source)
  // Es paralelo y no bloqueante; re-renderiza la dieta cuando termina.
  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    hydrateSwapsAndCustomFoodsFromBackend();
  }

  STATE.session = buildSession();

  // Intentar restaurar sesión activa del día — primero localStorage, después server.
  // Esto permite reconectar con la sesión real aunque localStorage esté vacío
  // (cambio de dispositivo, modo incógnito, cache limpio, retroceso manual de semana).
  if (RUTINA_ID) {
    const sesionKey = `mypump_sesion_${TOKEN}_${DATA.dia.id}`;
    const savedSesionId = localStorage.getItem(sesionKey);
    const savedSemana   = parseInt(localStorage.getItem(`${sesionKey}_semana`) || '0', 10);
    const semanaActual  = DATA.rutina.semana_actual || 1;

    if (savedSesionId && savedSemana === semanaActual) {
      // La sesión local es de la semana actual — recuperar
      _sesionId       = savedSesionId;
      _sesionIniciada = true;
      await loadExerciseStates();
      await loadRegistrosCarga();
    } else {
      // No hay sesión local válida — preguntar al server si hay una existente
      if (savedSesionId && savedSemana !== semanaActual) {
        // Limpiar localStorage stale antes del fallback al server
        localStorage.removeItem(sesionKey);
        localStorage.removeItem(`${sesionKey}_semana`);
      }
      try {
        const remote = await window.mypumpDB.getSesionDia(TOKEN, DATA.dia.id, semanaActual);
        if (remote && remote.id) {
          _sesionId       = remote.id;
          _sesionIniciada = true;
          // Re-poblar localStorage para que las próximas cargas sean instantáneas
          localStorage.setItem(sesionKey, remote.id);
          localStorage.setItem(`${sesionKey}_semana`, semanaActual);
          await loadExerciseStates();
          await loadRegistrosCarga();
        }
      } catch(e) {
        console.warn('[init] error consultando sesión remota:', e);
      }
    }
  }

  // Update header initial state
  $('#hdrWeek').textContent = DATA.rutina.semana_actual;
  $('#hdrWeekTotal').textContent = DATA.rutina.semanas_total;
  updateDayHeader();

  showApp();
  renderDayPicker();
  renderTrain();
  renderDiet();
  // Mi Día y Progress cargan de forma lazy cuando se abre el tab
  loadMyday(); // inicia en background; cuando termina, STATE.mydayLoaded = true
  // Tracking de comidas del día — en background, re-renderiza si la scene es 'diet'
  loadComidasMarcadas();
}

/* ---- SWAP MODAL ---- */
let _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
const _swapCache = {};

function openSwapModal(food, comidaId, optIdx, foodIdx) {
  _swapState = { comidaId, optIdx, foodIdx, original:food, selected:null, query:'' };
  const cat = food.category || inferFoodCategory(food);

  if (cat === 'condimento') {
    $('#modalHost').innerHTML = `
    <div class="modal-back" id="swapModalBack">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Sin sustitutos</div>
        <div class="swap-empty">Este alimento no se puede sustituir.</div>
        <button class="btn-secondary" onclick="closeSwapModal()">Cerrar</button>
      </div>
    </div>`;
    $('#swapModalBack').addEventListener('click', e => { if(e.target===e.currentTarget) closeSwapModal(); });
    return;
  }

  // Cache de sustitutos (recalcula si se agregó un custom food después)
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  if (!_swapCache[cacheKey]) {
    _swapCache[cacheKey] = window.MyPump
      ? window.MyPump.foodSwap.findSubstitutes(food)
      : [];
  }

  renderSwapModal();
}

function renderSwapModal() {
  const { original: food, query } = _swapState;
  const cat = food.category || inferFoodCategory(food);
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  const allSubs = _swapCache[cacheKey] || [];

  // Filtro por query (búsqueda libre por nombre)
  const subs = query
    ? allSubs.filter(s => s.name.toLowerCase().includes(query.toLowerCase().trim()))
    : allSubs;

  const subsHtml = subs.length === 0
    ? `<div class="swap-empty">${query
        ? `Sin resultados para "${query}". Probá crear tu alimento personalizado.`
        : 'No hay sustitutos equivalentes disponibles dentro del rango de macros.'}</div>`
    : `<div class="swap-list">${subs.map((s) => {
        // Encontrar el índice original en allSubs para que selectSwapCard funcione tras filtros
        const origIdx = allSubs.indexOf(s);
        const origKcal = food.kcal;
        const kcalDiff = origKcal > 0 ? Math.round((s.kcal - origKcal) / origKcal * 100) : 0;
        const sign = kcalDiff > 0 ? '+' : '';
        const dCls = Math.abs(kcalDiff) <= 5 ? 'ok' : 'warn';
        const customBadge = s._isCustom ? '<span class="swap-custom-badge">★ Personalizado</span>' : '';
        return `<div class="swap-card${origIdx===_swapState.selected?' is-selected':''}" data-sub="${origIdx}" onclick="selectSwapCard(this,${origIdx})">
          <div class="swap-card-info">
            <div class="swap-card-name">${s.name}${customBadge}</div>
            <div class="swap-card-qty">${s.qty} ${s.unit}</div>
            <div class="swap-card-macros">${s.kcal} kcal · ${s.prot}p / ${s.carb}c / ${s.fat}g</div>
          </div>
          <span class="swap-delta ${dCls}">${sign}${kcalDiff}%</span>
        </div>`;
      }).join('')}</div>`;

  $('#modalHost').innerHTML = `
  <div class="modal-back" id="swapModalBack">
    <div class="modal-sheet swap-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Sustituir alimento</div>
      <div class="swap-original">
        <div class="sw-name">${food.name}</div>
        <div class="sw-meta">${food.qty} ${food.unit} · ${food.kcal} kcal · ${food.prot}p / ${food.carb}c / ${food.fat}g</div>
      </div>
      <div class="swap-search-row">
        <input type="text" id="swapSearch" class="swap-search" placeholder="Buscar alimento..." value="${query.replace(/"/g,'&quot;')}" />
        <span class="swap-count">${subs.length}/${allSubs.length}</span>
      </div>
      <div class="swap-subs-title">Equivalentes — categoría: ${cat}</div>
      ${subsHtml}
      <button class="btn-custom-food" onclick="openCustomFoodModal()">
        + Crear alimento personalizado
      </button>
      <div style="display:flex;gap:8px;margin-top:var(--space-3)">
        <button class="btn-secondary" style="flex:1" onclick="closeSwapModal()">Cancelar</button>
        <button class="btn-primary" style="flex:2" id="swapConfirmBtn" ${_swapState.selected===null?'disabled':''} onclick="confirmSwap()">Sustituir</button>
      </div>
    </div>
  </div>`;
  $('#swapModalBack').addEventListener('click', e => { if(e.target===e.currentTarget) closeSwapModal(); });
  // Bind del search input — re-render con el filtro
  const search = $('#swapSearch');
  if (search) {
    search.addEventListener('input', e => {
      _swapState.query = e.target.value;
      // Solo re-renderizar la lista, no todo el modal, para no perder el foco
      _swapRenderListOnly();
    });
    // Auto-focus solo si ya había query (evita el teclado pop al abrir)
    if (query) { search.focus(); search.setSelectionRange(query.length, query.length); }
  }
}

// Re-render parcial solo de la lista de sustitutos (evita perder el foco del input)
function _swapRenderListOnly() {
  const { original: food, query } = _swapState;
  const cat = food.category || inferFoodCategory(food);
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  const allSubs = _swapCache[cacheKey] || [];
  const subs = query
    ? allSubs.filter(s => s.name.toLowerCase().includes(query.toLowerCase().trim()))
    : allSubs;

  const listEl = $('.swap-list, .swap-empty');
  if (!listEl) return;
  const newEl = document.createElement('div');
  newEl.innerHTML = subs.length === 0
    ? `<div class="swap-empty">${query ? `Sin resultados para "${query}". Probá crear tu alimento personalizado.` : 'Sin sustitutos disponibles.'}</div>`
    : `<div class="swap-list">${subs.map(s => {
        const origIdx = allSubs.indexOf(s);
        const origKcal = food.kcal;
        const kcalDiff = origKcal > 0 ? Math.round((s.kcal - origKcal) / origKcal * 100) : 0;
        const sign = kcalDiff > 0 ? '+' : '';
        const dCls = Math.abs(kcalDiff) <= 5 ? 'ok' : 'warn';
        const customBadge = s._isCustom ? '<span class="swap-custom-badge">★ Personalizado</span>' : '';
        return `<div class="swap-card${origIdx===_swapState.selected?' is-selected':''}" data-sub="${origIdx}" onclick="selectSwapCard(this,${origIdx})">
          <div class="swap-card-info">
            <div class="swap-card-name">${s.name}${customBadge}</div>
            <div class="swap-card-qty">${s.qty} ${s.unit}</div>
            <div class="swap-card-macros">${s.kcal} kcal · ${s.prot}p / ${s.carb}c / ${s.fat}g</div>
          </div>
          <span class="swap-delta ${dCls}">${sign}${kcalDiff}%</span>
        </div>`;
      }).join('')}</div>`;
  listEl.replaceWith(newEl.firstElementChild);
  const countEl = $('.swap-count');
  if (countEl) countEl.textContent = `${subs.length}/${allSubs.length}`;
}

function selectSwapCard(el, idx) {
  $$('.swap-card').forEach(c => c.classList.remove('is-selected'));
  el.classList.add('is-selected');
  _swapState.selected = idx;
  const btn = $('#swapConfirmBtn');
  if (btn) btn.disabled = false;
}

function closeSwapModal() {
  $('#modalHost').innerHTML = '';
  _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
}

async function confirmSwap() {
  if (_swapState.selected === null) return;
  const { comidaId, optIdx, foodIdx, original } = _swapState;
  const cat = original.category || inferFoodCategory(original);
  const cacheKey = `${original.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  const subs = _swapCache[cacheKey] || [];
  const sub = subs[_swapState.selected];
  if (!sub) return;

  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  STATE.foodSwaps[key] = { original, current: sub };
  persistSwaps();
  closeSwapModal();
  renderDiet();

  // Persistir en backend (paralelo, no bloqueante). Demo mode: solo local.
  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    const res = await window.mypumpDB.saveFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx, sub);
    if (!res.success) console.warn('[swap] error guardando swap en backend:', res.error);
  }
}

async function saveCustomFood() {
  const name = $('#cfName').value.trim();
  const kcal = parseFloat($('#cfKcal').value);
  const prot = parseFloat($('#cfProt').value);
  const carb = parseFloat($('#cfCarb').value);
  const fat  = parseFloat($('#cfFat').value);
  const unit = $('#cfUnit').value;
  const unitGramsRaw = $('#cfUnitGrams') ? $('#cfUnitGrams').value : '';
  const unitGrams = (unit === 'g' || unit === 'ml') ? null : parseFloat(unitGramsRaw);
  const category = $('#cfCategory').value;

  const errEl = $('#cfErr');
  function showErr(msg) { if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } }

  if (!name) { showErr('El nombre es obligatorio.'); return; }
  if (!(kcal >= 0) || !(prot >= 0) || !(carb >= 0) || !(fat >= 0)) {
    showErr('Los macros deben ser números válidos (≥ 0).'); return;
  }
  if (unit !== 'g' && unit !== 'ml' && (!unitGrams || unitGrams <= 0)) {
    showErr(`Para "${unit}" tenés que indicar gramos por unidad.`); return;
  }

  const foodData = {
    name, kcal, prot, carb, fat, unit,
    unitGrams: unitGrams || undefined,
    category,
  };

  // Demo / sin token: agregar solo en memoria
  if (!TOKEN || (DATA && DATA._isDemo)) {
    const localFood = { ...foodData, _isCustom: true };
    if (!window.MYPUMP_FOOD_DB.find(f => f.name.toLowerCase() === name.toLowerCase())) {
      window.MYPUMP_FOOD_DB.push(localFood);
    }
    _invalidateSwapCache();
    closeCustomFoodModal();
    return;
  }

  // Backend
  const res = await window.mypumpDB.createCustomFood(TOKEN, foodData);
  if (!res.success) {
    showErr(res.error || 'No se pudo crear el alimento. Probá de nuevo.');
    return;
  }
  // Agregar a la DB local para que aparezca en los sustitutos
  const created = res.data && res.data[0];
  if (created) {
    const localFood = {
      name: created.name,
      kcal: Number(created.kcal),
      prot: Number(created.prot),
      carb: Number(created.carb),
      fat:  Number(created.fat),
      unit: created.unit,
      unitGrams: created.unit_grams ? Number(created.unit_grams) : undefined,
      category: created.category,
      _isCustom: true,
    };
    const existingIdx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === localFood.name.toLowerCase());
    if (existingIdx >= 0) window.MYPUMP_FOOD_DB[existingIdx] = localFood;
    else window.MYPUMP_FOOD_DB.push(localFood);
  }
  _invalidateSwapCache();
  closeCustomFoodModal();
}

function _invalidateSwapCache() {
  for (const k of Object.keys(_swapCache)) delete _swapCache[k];
}

/* ---- PWA: AGREGAR A PANTALLA DE INICIO ----
 * Detecta plataforma (Android Chrome vs iOS Safari) y muestra un prompt
 * para instalar la app como PWA. Una vez instalada (display: standalone)
 * o dismissed, no vuelve a aparecer (persiste en localStorage).
 *
 * Android Chrome: usa el evento beforeinstallprompt → prompt nativo.
 * iOS Safari: NO tiene API de instalación, muestra instrucciones manuales
 * (Compartir → Agregar a pantalla de inicio).
 */
(function setupA2HS() {
  // Si ya está corriendo como PWA instalada, no hacer nada
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  if (isStandalone) return;

  // Si el usuario ya respondió (instalado o dismissed), no volver a mostrar
  const A2HS_KEY = 'mypump_a2hs_v1';
  const stored = localStorage.getItem(A2HS_KEY);
  if (stored === 'installed' || stored === 'dismissed') return;

  // Detección de plataforma
  const ua = navigator.userAgent || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/i.test(ua);
  const isSafariIOS = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);

  let deferredPrompt = null;

  // Android Chrome: capturar el evento para disparar el prompt nativo on-demand
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar nuestro banner; el click llama deferredPrompt.prompt()
    setTimeout(showA2HSBanner, 1500);
  });

  // Si ya está instalada (Chrome dispara 'appinstalled')
  window.addEventListener('appinstalled', () => {
    localStorage.setItem(A2HS_KEY, 'installed');
    closeA2HSBanner();

  // En iOS, no hay beforeinstallprompt — mostrar banner manual después del load
  if (isSafariIOS) {
    // Esperar a que la app cargue completamente para no interrumpir

              <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275"/>
              <line x1="256" y1="282" x2="256" y2="405"/>
              <line x1="200" y1="312" x2="312" y2="312"/>
              <line x1="195" y1="348" x2="317" y2="348"/>
              <line x1="190" y1="385" x2="322" y2="385"/>
            </g>
          </svg>
        </div>
        <div class="a2hs-body">
          <div class="a2hs-title">Instalá MyPump como app</div>
          <div class="a2hs-text">Tenela en tu inicio y abrila como una app, sin el navegador.</div>
        </div>
        <button class="a2hs-install" id="a2hsInstall">Instalar</button>`;
    }

    document.body.appendChild(banner);
    // Animación de entrada
    requestAnimationFrame(() => banner.classList.add('is-open'));

    // Eventos
    document.getElementById('a2hsClose').addEventListener('click', () => {
      localStorage.setItem(A2HS_KEY, 'dismissed');
      closeA2HSBanner();
    });

    const installBtn = document.getElementById('a2hsInstall');
    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) { closeA2HSBanner(); return; }
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') localStorage.setItem(A2HS_KEY, 'installed');
        else localStorage.setItem(A2HS_KEY, 'dismissed');
        deferredPrompt = null;
        closeA2HSBanner();
      });
    }
  }

  function closeA2HSBanner() {
    const b = document.getElementById('a2hsBanner');
    if (!b) return;
    b.classList.remove('is-open');
    setTimeout(() => b.remove(), 250);
  }
})();

init();
</script>
</body>
</html>
