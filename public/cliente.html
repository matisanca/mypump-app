.fp-tira{display:flex;gap:8px;overflow-x:auto;margin-top:var(--space-4);padding-bottom:4px;scrollbar-width:none}
.fp-tira::-webkit-scrollbar{display:none}
.fp-tira-item{flex:0 0 auto;width:72px;text-align:center}
.fp-tira-item img{width:72px;height:96px;object-fit:cover;border-radius:var(--radius-sm);display:block;background:var(--color-bg-tertiary)}
.fp-tira-item span{display:block;margin-top:3px;font-size:10px;color:var(--color-text-muted);font-family:var(--font-mono)}
.fp-tira-item{cursor:pointer;opacity:.55;transition:opacity .15s}
.fp-tira-item.is-on{opacity:1}
.fp-tira-item.is-on img{outline:2px solid var(--color-brand);outline-offset:1px}
.fp-tira-item.is-on span{color:var(--color-brand);font-weight:700}
.fp-sem{margin-top:var(--space-4)}
.fp-sem-tit{font-size:12px;font-weight:700;color:var(--color-text-secondary);margin-bottom:var(--space-2);letter-spacing:.02em}
.fp-sem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fp-sem-grid figure{margin:0}
.fp-sem-grid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:var(--radius-sm);display:block;background:var(--color-bg-tertiary)}
.fp-sem-grid figcaption{margin-top:3px;font-size:10px;color:var(--color-text-muted);text-align:center}

/* ── Check semanal (N8) ── */
.ck-saved{margin-left:auto;font-size:11px;font-weight:700;color:var(--color-brand);letter-spacing:.02em}
.ck-intro{font-size:12px;color:var(--color-text-muted);margin:0 0 var(--space-3);line-height:1.4}
.ck-metric{margin-bottom:var(--space-3)}
.ck-metric-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.ck-metric-lbl{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.ck-metric-hint{font-size:10px;color:var(--color-text-muted);letter-spacing:.02em}
.ck-scale{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ck-dot{height:40px;border:1.5px solid var(--color-border);background:var(--color-bg-secondary);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--color-text-secondary);cursor:pointer;transition:background .12s,border-color .12s,color .12s,transform .1s}

 *  1. Query string ?t=TOKEN (cuando el cliente entra por el link del coach)

 *  3. localStorage 'mypump_token' (caso PWA "Agregar a inicio" en iOS:
 *     iOS guarda la URL canónica sin query params, así que cuando el
 *     cliente abre la app desde el ícono de inicio NO tiene ?t= en la URL.
 *     Persistimos el token en localStorage la primera vez y lo
 *     recuperamos en aperturas subsecuentes.)
 *

 */

const DEMO = new URLSearchParams(window.location.search).get('demo') === '1';

const TOKEN = (function() {
  const TOKEN_KEY = 'mypump_token';
  function isValidToken(t) {
    return typeof t === 'string' && /^[a-zA-Z0-9_-]{16,64}$/.test(t);
  }

  // Prioridad 1: query string ?t=xxx
  var params = new URLSearchParams(window.location.search);
  var fromQuery = params.get('t');
  if (isValidToken(fromQuery)) {
    try { localStorage.setItem(TOKEN_KEY, fromQuery); } catch(e) {}
    return fromQuery;
  }

  // Prioridad 2: pathname /TOKEN (dev local con npx serve)
  var fromPath = window.location.pathname.split('/').filter(Boolean)[0];
  if (fromPath && fromPath !== 'cliente.html' && fromPath !== 'cliente' && isValidToken(fromPath)) {
    try { localStorage.setItem(TOKEN_KEY, fromPath); } catch(e) {}
    return fromPath;
  }

  // Prioridad 3: localStorage (caso PWA en iOS donde la URL pierde el ?t=)
  try {
    var fromStorage = localStorage.getItem(TOKEN_KEY);
    if (isValidToken(fromStorage)) return fromStorage;
  } catch(e) {}

  return '';

/* ---- HELPERS ---- */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function fmtTime(s) {
  const m = Math.floor(Math.max(0,s)/60);
  const sec = Math.max(0,s)%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// Mejor marca histórica del ejercicio (set más pesado registrado) = récord a
// superar. Sirve de referencia/motivación en las semanas de progresión.
function lastSessionStr(exId) {
  const h = (DATA.historico_por_ejercicio[exId] || []);
  if (!h.length) return null;
  const top = h.reduce((a,b) => (b.peso_kg||0) > (a.peso_kg||0) ? b : a, h[0]);
  const reps = top.reps_realizadas || top.reps;
  const rir  = (top.rir_real != null) ? ` · RIR ${top.rir_real}` : '';
  // F4 — si el récord tiene variante (agarre/nivel en notas), mostrarla.
  const varTag = top.notas ? ` (${top.notas})` : '';
  return `${top.peso_kg}kg × ${reps}${rir}${varTag}`;
}

// Variante activa del ejercicio (F4): la elegida en el picker, o null si el
// ejercicio no tiene variantes. También devuelve si es la opción default.
function _varianteActiva(exId) {
  const s = STATE.session[exId];
  if (!s || !s.variante) return { v: null, esDefault: false };
  const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
  const ops = ex ? getVariantesEj(ex) : null;
  return { v: s.variante, esDefault: !!(ops && ops[0] === s.variante) };
}

// Registro de referencia = la MISMA serie en la última sesión de este ejercicio,
// FILTRADO por variante cuando el ejercicio la tiene (F4): el sugerido de
// "Soga" sale del histórico de Soga, nunca del de Barra. Los registros viejos
// sin variante (notas null, pre-feature) cuentan solo para la opción DEFAULT.
function _ultimaSerieRef(exId, idx, variante, esDefault) {
  let h = DATA.historico_por_ejercicio[exId] || [];
  if (variante) {
    h = h.filter(r => r.notas === variante || (esDefault && r.notas == null));
  }
  if (!h.length) return null;
  const dayOf = iso => (iso || '').split('T')[0];
  const lastDay = dayOf(h[0].registrado_en);
  const lastSets = h.filter(r => dayOf(r.registrado_en) === lastDay);
  return lastSets.find(r => r.serie_numero === idx+1) || lastSets[0] || null;
}
// Peso que hiciste la última vez en esta serie (para el default gris + one-tap).
// Un histórico con peso 0 en un ejercicio QUE PIDE kg no sirve como sugerido
// (registros viejos de cuando el ejercicio se trataba como "sin peso").
function suggestedKg(exId, idx) {
  const { v, esDefault } = _varianteActiva(exId);
  const ref = _ultimaSerieRef(exId, idx, v, esDefault);
  if (!ref || ref.peso_kg == null) return '';
  if (Number(ref.peso_kg) <= 0) {
    const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
    if (ex && !exNoKg(ex)) return '';
  }
  return String(ref.peso_kg);
}

// Peso HEREDABLE dentro de la sesión de hoy: la serie confirmada más cercana
// de este ejercicio con kg > 0. Es el patrón de toda app de gym: cargás el kg
// una vez y las series siguientes lo arrastran (fix del reporte "no me deja
// confirmar los últimos casilleros" — tipeaba reps y no repetía el kg).
function kgHeredable(exId, idx) {
  const sets = (STATE.session[exId] && STATE.session[exId].sets) || [];
  for (let i = idx - 1; i >= 0; i--) {
    if (sets[i] && sets[i].confirmed && parseFloat(sets[i].kg) > 0) return String(sets[i].kg);
  }
  for (let i = 0; i < sets.length; i++) {
    if (i !== idx && sets[i] && sets[i].confirmed && parseFloat(sets[i].kg) > 0) return String(sets[i].kg);
  }
  return '';
}
// Reps que hiciste la última vez en esta serie (default gris + one-tap).
function suggestedReps(exId, idx) {
  const { v, esDefault } = _varianteActiva(exId);
  const ref = _ultimaSerieRef(exId, idx, v, esDefault);
  const r = ref ? (ref.reps_realizadas != null ? ref.reps_realizadas : ref.reps) : null;
  return r != null ? String(r) : '';
}

// Dato de la SESIÓN ANTERIOR (la última vez que se hizo el ejercicio, excluyendo
// la de hoy): serie tope (más pesada) + nº de series + cuándo. Para que el cliente
// sepa qué superar. Devuelve {val, rel} o null.
function prevSessionStr(exId) {
  const h = DATA.historico_por_ejercicio[exId] || [];
  if (!h.length) return null;
  // Fecha local en formato ISO real (YYYY-MM-DD, mes +1 y con zero-pad). El
  // formato viejo "2026-6-13" no es ISO y new Date() lo parsea indefinido en
  // Safari/iOS → diasAtras=NaN → nunca mostraba "ayer". Ahora es determinístico.
  const dayStr = (iso) => {
    const d = new Date(iso);
    if (isNaN(d)) return '';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const hoy = dayStr(new Date().toISOString());
  // Rows ya vienen ordenadas por fecha DESC. La sesión anterior = el día más
  // reciente que NO sea hoy.
  const prev = h.filter(r => dayStr(r.registrado_en) !== hoy);
  if (!prev.length) return null;
  const sesionDay = dayStr(prev[0].registrado_en);
  const sets = prev.filter(r => dayStr(r.registrado_en) === sesionDay);
  const top = sets.reduce((a, b) => ((b.peso_kg||0) > (a.peso_kg||0) ? b : a), sets[0]);
  // Relativo legible
  const diasAtras = Math.round((new Date(hoy) - new Date(sesionDay)) / 86400000);
  let rel;
  if (diasAtras <= 1) rel = 'ayer';
  else if (diasAtras < 7) rel = `hace ${diasAtras} días`;
  else if (diasAtras < 14) rel = 'la semana pasada';
  else { const d = new Date(prev[0].registrado_en); rel = d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' }); }
  const reps = top.reps_realizadas != null ? top.reps_realizadas : top.reps;
  const nSeries = sets.length;
  // F4 — mostrar la variante (agarre/nivel) del set tope, si la tiene.
  const varTag = top.notas ? ` (${top.notas})` : '';
  return { val: `${top.peso_kg}kg × ${reps}${varTag}${nSeries > 1 ? ` · ${nSeries} series` : ''}`, rel };
}

/* ---- PROGRESION HELPER ---- */
/**
 * Lee series/reps/rir de la semana actual del ejercicio.
 * Soporta dos formatos:
 *   - Formato Cerebro: progresion[] con un entry por semana
 *   - Formato seed legacy: campos directos series/reps/rir_objetivo
 */
function getProgresionActual(ej, semana) {
  if (Array.isArray(ej.progresion) && ej.progresion.length > 0) {
    const idx = Math.max(0, Math.min((semana || 1) - 1, ej.progresion.length - 1));
    const p = ej.progresion[idx];
    return {
      series: p.series ?? null,
      reps:   p.reps   ?? null,
      rir:    p.rir    ?? null,
    };
  }
  return {
    series: ej.series       ?? null,
    reps:   ej.reps         ?? null,
    rir:    ej.rir_objetivo ?? ej.rir ?? null,
  };
}

/* Nota automática de progresión: explica el cambio de la semana actual vs la
 * anterior siguiendo la lógica de sobrecarga progresiva. Solo lógica de frontend
 * (la progresión ya viene en la estructura). Devuelve {texto, cambia, calibracion}
 * o null si no hay datos de progresión.
 */
function computeProgresionNota(ej, semanaActual) {
  if (!Array.isArray(ej.progresion) || ej.progresion.length === 0) return null;
  const sem = semanaActual || 1;
  // Límite superior de un valor que puede venir como rango ("8-10") o número.
  const upper = (v) => {
    const nums = String(v == null ? '' : v).match(/\d+/g);
    return (nums && nums.length) ? Math.max(...nums.map(Number)) : null;
  };
  const byWeek = (s) => ej.progresion.find(p => p.semana === s)
                     || ej.progresion[Math.max(0, Math.min(s - 1, ej.progresion.length - 1))];

  const cur = byWeek(sem);
  if (!cur) return null;

  const _CALIBRACION = 'Semana de calibración: buscá el fallo muscular, no te guardes reps. Las reps son una guía (±2-3): si apuntás a 12 y te salen 9 o 14, perfecto. La idea es encontrar tu peso real llegando cerca del fallo.';

  const prev = (sem > 1) ? (ej.progresion.find(p => p.semana === sem - 1) || ej.progresion[sem - 2]) : null;
  if (!prev) {
    return { texto: _CALIBRACION, cambia: false, calibracion: true };
  }

  const curReps   = upper(cur.reps),   prevReps   = upper(prev.reps);
  const curSeries = upper(cur.series), prevSeries = upper(prev.series);
  const curRir    = upper(cur.rir),    prevRir    = upper(prev.rir);

  const repsDown   = curReps   != null && prevReps   != null && curReps   <  prevReps;
  const repsUp     = curReps   != null && prevReps   != null && curReps   >  prevReps;
  const repsSame   = curReps   != null && prevReps   != null && curReps   === prevReps;
  const seriesUp   = curSeries != null && prevSeries != null && curSeries >  prevSeries;
  const seriesSame = curSeries != null && prevSeries != null && curSeries === prevSeries;
  const rirDown    = curRir    != null && prevRir    != null && curRir    <  prevRir;

  const parts = [];
  if      (repsDown && seriesSame) parts.push(`Esta semana bajan las reps (de ${prev.reps} a ${cur.reps}). Subí la carga: apuntá a más kilos que la semana pasada, manteniendo buena técnica.`);
  else if (repsDown && seriesUp)   parts.push(`Más series y menos reps: subí un poco la carga y sumá volumen.`);
  else if (seriesUp && repsSame)   parts.push(`Sumamos una serie: mismo peso, más volumen total esta semana.`);
  else if (repsUp && seriesSame)   parts.push(`Suben las reps con el mismo peso. Si las completás sobrado, subí la carga la próxima.`);

  if (rirDown) parts.push(`Bajamos el RIR: acercate más al fallo en cada serie.`);

  const cambia = parts.length > 0;
  if (!cambia) {
    if (repsSame && seriesSame) parts.push(`Mantené el peso de la semana pasada e intentá superar tus reps, siempre cerca del fallo. Si te sobra, subí la carga.`);
    else parts.push(`Seguí la pauta de esta semana (${cur.series ?? '—'}×${cur.reps ?? '—'}) y trabajá cerca del fallo; si te sobra, subí la carga.`);
  }
  return { texto: parts.join(' '), cambia, calibracion: false };
}

/* ---- DAY HELPERS ---- */
// Extrae el nombre corto de un día de entrenamiento (agnóstico al calendario).
// "TIRÓN A — ANCHO" → "Tirón" · "Empuje A" → "Empuje" · "FULLBODY" → "Fullbody"
function getDayShortName(diaNombre) {
  if (!diaNombre) return '';
  const first = diaNombre.split(/[\s–—\-\/]/)[0].trim();
  return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
}

// Devuelve el número del día dentro de la rutina (1-based).
// Usa dia.n si está disponible; si no, la posición en el array.
function getDayNum(dia, allDias) {
  if (dia.n != null) return dia.n;
  const idx = (allDias || []).findIndex(d => d.id === dia.id);
  return idx >= 0 ? idx + 1 : 1;
}

// Elige el día a mostrar al abrir la app — sin usar el calendario real.
// Orden de prioridad: último día visualizado (localStorage) → primer día.
function getSuggestedDay(dias, rutinaId) {
  const key = `mypump_dia_visualizado_${rutinaId || 'demo'}`;
  const lastId = localStorage.getItem(key);
  if (lastId) {
    const last = dias.find(d => d.id === lastId);
    if (last) return last;
  }
  return dias[0];
}

// Idéntica a food-db.js inferCategory (keyword-first, fallback heurístico).
// La mantenemos duplicada porque a) food-db.js corre antes y aplica la categoría
// al MYPUMP_FOOD_DB; b) los foods publicados por Cerebro NO traen category, y
// findSubstitutes/openSwapModal acá necesitan inferirla sobre el food del cliente.
function inferFoodCategory(food) {
  const name = (food.name || '').toLowerCase();
  if (/\b(carne|asado|bife|lomo|paleta|matambre|vacío|vacio|costill|nalga|cuadril|cuadrada|entraña|entrana|hígado|higado|cerdo|lechón|lechon|bondiola|jam[óo]n|salame|chorizo|longaniza|morcilla|salchicha|panceta|tocino|pollo|pavo|pato|pechuga|muslo|alita|pescado|salm[óo]n|merluza|atún|atun|sardin|trucha|lenguado|langostino|camar[óo]n|camaron|mejill[óo]n|mejillon|calamar|pulpo|kani|surimi|huevo|clara de huevo|tofu|tempeh|seit[áa]n|seitan|prote[íi]na (whey|de soja|vegetal)|pavita|cordero|cabrito|conejo|vísc|visc|chinchulín|riñón|rinon|mondongo|carpaccio|carne picada|hamburguesa)/.test(name)
      && !/leche|yogur|queso/.test(name)) return 'proteina';
  if (/\b(leche(?! de coco)|yogur|yoghurt|kéfir|kefir|requesón|cottage|cuajada|nata|burrata|mozzarella|mozarella|provolone|provoleta|parmesano|reggianito|queso|cheddar|gouda|gruyere|brie|camembert|gorgonzola|fontina|sardo|tybo|port salut|ricotta|crema de leche|caf[ée] con leche|leche de soja|cacao con leche|chocolatada)\b/.test(name))
    return 'lacteo';
  if (/\b(aceite|manteca|mantequilla|margarina|mayonesa|crema (?!de leche)|nuez|nueces|almendra|cacahuet|cacahuete|man[íi] |\bmaní$|pistacho|avellana|castaña|piñ[óo]n|semilla|ch[íi]a|lin(o|aza)|s[ée]samo|sesamo|chía|coco rallado|leche de coco|aceitun|olivas|palta|aguacate|tahini|mantequilla de maní|mantequilla de almendras|ghee|sebo)\b/.test(name))
    return 'grasa';
  if (!/polenta|harina|copos? de ma[íi]z|corn flakes|trigo (sarraceno|burgol)|helado|tarta|torta|kuchen|pie|mermelada|jugo|néctar|nectar|licuado|smoothie|jarabe|sirope/.test(name) && (
      /\b(manzana|banan|pl[áa]tano|naranja|mandarin|kiwi|fres|frutilla|uva|pera|durazno|melocot[óo]n|ciruela|mel[óo]n|melon|sand[íi]a|pomelo|mango|anan[áa]|piña|pina|ar[áa]ndano|arandano|cereza|lim[óo]n|limon|papaya|mam[óo]n|maracuy[áa]|higo|frambuesa|mora|d[áa]til|datil|grosella|granada|guayaba|caqui|chirimoya|tuna|n[íi]spero|nispero|carambola|pitaya|lychee|rambut[áa]n|fruta de la pasi[óo]n|coco fresco)\w*/.test(name) ||
      /\b(zanahoria|calabaza|zapallit|zucchini|tomate|pepino|lechug|r[úu]cula|rucula|apio|repollo|berenjena|morr[óo]n|morron|pimiento|cebolla|chauch|arveja|guisante|remolach|champiñ[óo]n|champinon|hongo|esp[áa]rrago|esparrago|alcauci|alcachof|palmito|ma[íi]z|choclo|puerro|acelga|radicheta|endivia|escarola|espinac|br[óo]coli|brocoli|coliflor|kale|repollito|rabanit|r[áa]bano|nabo|hinojo|jalapeñ|jalapeno|chile(?! con carne)|aj[íi] (picante|verde|rojo|amarillo)|pimentón fresco|jengibre fresco|cúrcuma fresca|verduras? salteadas|wok de verduras|ensalada (?!cesar|c[ée]sar))\w*/.test(name) ||
      /^ajo$|^ajos$|^cabeza de ajo/.test(name)
    )) return 'fruta_verdura';
  if (/\b(papa(?! frita)|patata(?! frita)|batata|camote|boniato|yuca|mandioca|cassava|tap[íi]oca|tapioca|polenta|plátano macho|platano macho)\b/.test(name))
    return 'carbohidrato';
  if (/\b(lenteja|garbanzo|frijol|poroto|jud[íi]a blanca|judia blanca|alubia|haba|soja cocida|soya|edamame|chícharo|chicharo)\b/.test(name))
    return 'carbohidrato';
  if (/\b(arroz|pasta|fideo|spaguett|spaghet|tallarines|ravioli|ñoqui|gnocch|pan(?! con|cake)|pancake|hotcake|tostada|harina|avena|cuscus|cousc[óo]us|quinoa|cebada|bulgur|trigo (sarraceno)?|cereal|granola|galleta|tortilla(?! española)|bollillo|telera|pita|wrap|arepa|crouton|chocolate|miel|az[úu]car|edulcorante|mermelada|dulce de leche|alfajor|barrita|snack|cracker|chip|salsa de tomate|kétchup|ketchup|panqueque|waffle|donut|crep|brownie|muffin|budín|budin|bizcoch|torta|magdalena|barra cereal|gomitas|caramelo|chuche)\b/.test(name))
    return 'carbohidrato';
  if (/\b(mostaza|vinagre|sal\b|pimienta|albahaca|comino|perejil|orégano|oregano|romero|tomillo|laurel|nuez moscada|p[áa]prika|cilantro|hierba|condimento|caldo cubo|sazonador|chimichurri|salsa picante|tabasco|sriracha)\b/.test(name))
    return 'condimento';
  // Fallback heurístico
  const total = (food.prot||0) + (food.carb||0) + (food.fat||0);
  if (total === 0) return 'condimento';
  const pPct = food.prot/total, cPct = food.carb/total, fPct = food.fat/total;
  if (pPct > 0.5) return 'proteina';
  if (cPct > 0.5) return 'carbohidrato';
  if (fPct > 0.5) return 'grasa';
  if (food.prot > 0 && food.carb > 0 && fPct < 0.3) return 'lacteo';
  if (cPct > 0.4) return 'fruta_verdura';
  return 'mixto';
}

/* ---- EXERCISE SWAP HELPERS (espejo de food swap) ----
 * El swap de ejercicio es VISUAL / por-sesión: reemplaza el ejercicio mostrado
 * para esta sesión sin tocar la estructura publicada. Persiste en localStorage
 * (mypump_exercise_swaps_<RUTINA_ID>). Se revierte con ↔ (data-revert-ex).
 * El histórico/progresión del slot se preservan: el ejercicio_id NO cambia,
 * solo el ejercicio_nombre que se snapshotea al registrar la carga.
 */
// Devuelve el ejercicio "efectivo" (con sustituto aplicado) preservando id/tipo/
// descanso/progresión del slot original; solo override de nombre + imágenes.
// Conserva refs al original (_orig*) para resolver/ofrecer sustitutos y revertir.
function getEffectiveEx(ex) {
  const sw = STATE.exerciseSwaps[ex.id];
  let eff;
  if (sw) {
    eff = { ...ex, nombre: sw.current.nombre, images: sw.current.images, _isSwapped: true, _swapSlug: sw.current.slug, _swapFijado: !!sw.fijado };
  } else {
    eff = { ...ex };
    // Si la rutina NO trae foto (ejercicio creado en NutriPlan sin match), la
    // derivamos del catálogo resolviendo el nombre ES → slug. Así toda la base
    // queda "macheada" sin republicar, fuente única de verdad = catálogo.
    if (!(eff.images && eff.images.eccentric) && window.MyPump?.exerciseSwap) {
      const entry = window.MyPump.exerciseSwap._resolve(ex);
      if (entry && entry.image_eccentric) {
        eff.images = {
          eccentric:  entry.image_eccentric,
          concentric: entry.image_concentric,
          _matched_slug: entry.slug_en,
        };
      }
    }
  }
  eff._origNombre = ex.nombre;
  eff._origImages = ex.images || null;
  eff._origSlug   = ex.images?._matched_slug || ex.catalogo_slug || eff.images?._matched_slug || null;
  return eff;
}

function persistExerciseSwaps() {
  localStorage.setItem(`mypump_exercise_swaps_${RUTINA_ID||'demo'}`, JSON.stringify(STATE.exerciseSwaps));
}

// F5 — Los swaps NO fijados valen solo por la sesión de su día: se descartan
// cuando cambió la semana o cuando ese día ya quedó finalizado. Los FIJADOS
// persisten hasta que el cliente los revierta. Corre en el bootstrap, al traer
// los días completados y al finalizar el día.
function pruneExerciseSwaps() {
  if (!DATA || !DATA.rutina) return;
  const semanaActual = DATA.rutina.semana_actual || 1;
  let cambio = false;
  for (const exId in STATE.exerciseSwaps) {
    const s = STATE.exerciseSwaps[exId];
    if (!s || s.fijado) continue;
    const otraSemana  = s.semana != null && s.semana !== semanaActual;
    const diaCerrado  = (s.diaId && STATE.diasCompletados.has(s.diaId))
                     || (s.diaId === (DATA.dia && DATA.dia.id) && _diaFinalizado);
    if (otraSemana || diaCerrado) { delete STATE.exerciseSwaps[exId]; cambio = true; }
  }
  if (cambio) persistExerciseSwaps();
}

/* ---- COMENTARIOS (coach ↔ cliente) ----
 * Tabla aparte (mypump_comentarios) keyeada por (cliente_id, referencia_id);
 * sobrevive a la republicación de la rutina. Se cargan todos en el bootstrap
 * (loadComentarios) y se indexan por 'ambito|referencia_id' para los badges.
 */
const _comKey = (ambito, refId) => `${ambito}|${refId || ''}`;

function rebuildComentarioIndexes(rows) {
  const byRef = {}, unread = {};
  for (const c of (rows || [])) {
    const k = _comKey(c.ambito, c.referencia_id);
    (byRef[k] = byRef[k] || []).push(c);
    if (c.autor === 'coach' && !c.leido_por_cliente) unread[k] = (unread[k] || 0) + 1;
  }
  STATE.comentariosByRef = byRef;
  STATE.comentariosUnread = unread;
  updateGlobalCommentBadge();
}

// B3 — Badge global de comentarios nuevos del coach en el tab Entreno, para que
// el cliente se entere aunque esté en otra pestaña.
function totalUnreadComentarios() {
  let n = 0;
  for (const k in STATE.comentariosUnread) n += STATE.comentariosUnread[k] || 0;
  return n;
}
function updateGlobalCommentBadge() {
  const el = document.getElementById('tabBadgeTrain');
  if (!el) return;
  const n = totalUnreadComentarios();
  if (n > 0) { el.textContent = n > 9 ? '9+' : String(n); el.hidden = false; }
  else { el.hidden = true; }
}

function getComentariosFor(ambito, refId) {
  return STATE.comentariosByRef[_comKey(ambito, refId)] || [];
}
function getUnreadFor(ambito, refId) {
  return STATE.comentariosUnread[_comKey(ambito, refId)] || 0;
}
// No leídos del coach para todos los ejercicios de un día (badge del selector).
function getUnreadDia(dia) {
  let n = 0;
  for (const b of (dia.bloques || [])) for (const e of (b.ejercicios || [])) {
    n += getUnreadFor('ejercicio', e.id);
  }
  return n;
}

async function loadComentarios() {
  if (!TOKEN || (DATA && DATA._isDemo) || !window.mypumpDB || !window.mypumpDB.getComentarios) return;
  const rows = await window.mypumpDB.getComentarios(TOKEN);
  rebuildComentarioIndexes(rows || []);
  if (STATE.scene === 'train' && typeof renderTrain === 'function') renderTrain();
}

// Envía un comentario del cliente anclado a un ejercicio y re-renderiza.
async function enviarComentarioEjercicio(exId, exNombre, contenido) {
  contenido = (contenido || '').trim();
  if (!contenido || !TOKEN || (DATA && DATA._isDemo)) return;
  const res = await window.mypumpDB.agregarComentario(TOKEN, 'ejercicio', exId, exNombre, contenido);
  if (!res || !res.success) { alert('No se pudo enviar el comentario. Probá de nuevo.'); return; }
  await loadComentarios();
}

// Marca como leídos los comentarios del coach de un ejercicio (al expandir).
async function marcarLeidosEjercicio(exId) {
  if (getUnreadFor('ejercicio', exId) === 0) return;
  // Optimista: limpiar local para que el badge desaparezca ya
  const k = _comKey('ejercicio', exId);
  STATE.comentariosUnread[k] = 0;
  for (const c of (STATE.comentariosByRef[k] || [])) if (c.autor === 'coach') c.leido_por_cliente = true;
  updateGlobalCommentBadge();
  if (TOKEN && !(DATA && DATA._isDemo)) {
    await window.mypumpDB.marcarLeidos(TOKEN, 'ejercicio', exId);
  }
}

function fmtComentarioFecha(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' }) + ' · ' +
           d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  } catch (_) { return ''; }
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Lista de sustitutos del ejercicio (resuelve SIEMPRE sobre el original).
// Cacheado por slug/nombre del original — se invalida al recargar el catálogo.
function exGetSubs(ex) {
  if (!window.MyPump || !window.MyPump.exerciseSwap) return [];
  if (ex.tipo === 'calentamiento' || ex.tipo === 'cardio') return [];
  const orig = { nombre: ex._origNombre || ex.nombre, images: ex._origImages || ex.images, catalogo_slug: ex._origSlug || ex.images?._matched_slug || null };
  const entry = window.MyPump.exerciseSwap._resolve(orig);
  const key = entry ? entry.slug_en : `n:${(orig.nombre||'').toLowerCase()}`;
  if (!_exSwapCache[key]) _exSwapCache[key] = window.MyPump.exerciseSwap.findSubstitutes(orig);
  return _exSwapCache[key];
}

/* ---- CATÁLOGO DE EJERCICIOS EN MEMORIA (calcado de MYPUMP_FOOD_DB) ----
 * window.MYPUMP_EJERCICIO_DB se hidrata: 1) sincrónico desde localStorage
 * (fast path), 2) async desde Supabase (fuente de verdad), re-render al llegar.
 */
const _EJ_CAT_CACHE_KEY = 'mypump_ejercicio_catalogo_v1';

function hydrateEjercicioDBFromCache() {
  try {
    const raw = localStorage.getItem(_EJ_CAT_CACHE_KEY);
    if (raw) window.MYPUMP_EJERCICIO_DB = JSON.parse(raw);
  } catch (_) { /* cache corrupto → se rehidrata del backend */ }
}

async function loadEjercicioCatalogo() {
  if (!window.mypumpDB || !window.mypumpDB.getCatalogoEjercicios) return;
  const rows = await window.mypumpDB.getCatalogoEjercicios();
  if (rows && rows.length) {
    window.MYPUMP_EJERCICIO_DB = rows;
    try { localStorage.setItem(_EJ_CAT_CACHE_KEY, JSON.stringify(rows)); } catch (_) {}
    // Invalidar cache de sustitutos y re-render si estamos en entrenamiento
    Object.keys(_exSwapCache).forEach(k => delete _exSwapCache[k]);
    if (STATE.scene === 'train' && typeof renderTrain === 'function') renderTrain();
  }
}

/* ---- EXERCISE STATUS HELPERS ---- */
// Devuelve el estado actual del ejercicio (del STATE unificado)
function getExStatus(exId) {
  return STATE.session[exId]?.status || STATE.exerciseStates[exId] || 'pendiente';
}

// Actualiza el estado en STATE y dispara persistencia a Supabase (fire-and-forget)
function setExStatus(exId, newStatus, marcadoManualmente = false) {
  STATE.exerciseStates[exId] = newStatus;
  if (STATE.session[exId]) STATE.session[exId].status = newStatus;
  writeExerciseStatus(exId, newStatus, marcadoManualmente); // fire-and-forget
}

// Determina si todos los ejercicios del día están en estado terminal
function checkIfDayCompleted() {
  const terminalStates = new Set(['completo','completo_sin_datos','saltado']);
  const allEx = DATA.dia.bloques.flatMap(b => b.ejercicios);
  return allEx.every(ex => terminalStates.has(getExStatus(ex.id)));
}

// Encola el estado del ejercicio (Outbox: reintenta si falla la red).
function writeExerciseStatus(exId, status, marcadoManualmente = false) {
  if (!RUTINA_ID) return;   // demo mode — no writes
  const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
  const seriesObjetivo = ex ? (getProgresionActual(ex, DATA.rutina.semana_actual).series ?? 0) : 0;
  Outbox.enqueue('estado', {
    sesionId: _sesionId || null, semana: DATA.rutina.semana_actual || 1,
    diaId: DATA.dia.id, exId, seriesObjetivo, status, manual: marcadoManualmente,
  }, `estado_${DATA.dia.id}_${exId}`);
}

// Carga los estados de ejercicios desde Supabase (recuperación de sesión)
async function loadExerciseStates() {
  if (!RUTINA_ID || !_sesionId) return;
  const rows = await window.mypumpDB.getEjerciciosEstado(TOKEN, _sesionId);
  if (!rows || !rows.length) return;
  for (const row of rows) {
    STATE.exerciseStates[row.ejercicio_id] = row.status;
    STATE.exerciseMeta[row.ejercicio_id] = {
      series_completadas:   row.series_completadas   || 0,
      marcado_manualmente:  row.marcado_manualmente  || false,
    };
    if (STATE.session[row.ejercicio_id]) {
      STATE.session[row.ejercicio_id].status = row.status;
      // Si el ejercicio ya estaba completo, reflejar en .completed también
      if (row.status === 'completo' || row.status === 'completo_sin_datos') {
        STATE.session[row.ejercicio_id].completed = true;
      }
    }
  }
}

/* ---- OUTBOX: escrituras confiables con reintento (R1/R2) ----
   Antes writeSet/writeExerciseStatus/saveFoodSwap eran fire-and-forget: si la
   red fallaba, el cliente creía haber guardado y perdía datos en silencio. El
   Outbox encola cada escritura en localStorage, la intenta, y si falla la
   reintenta (backoff) al reconectar, al volver a foco o al reabrir la app.
   Feature flag OUTBOX_ENABLED para poder volver al modo directo si hiciera falta. */
const OUTBOX_ENABLED = true;

function showSaveState(state) {
  // state: 'saving' | 'saved' | 'offline'
  let el = document.getElementById('save-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'save-toast';
    document.body.appendChild(el);
  }
  const txt = state === 'saving' ? 'Guardando…'
            : state === 'saved'  ? '✓ Guardado'
            : '⚠ Sin conexión — se reintenta solo';
  el.dataset.state = state;
  el.textContent = txt;
  el.classList.add('show');
  clearTimeout(el._hideT);
  // 'saving' queda visible hasta que cambie; 'saved'/'offline' se autoocultan.
  if (state !== 'saving') {
    el._hideT = setTimeout(() => el.classList.remove('show'), state === 'saved' ? 1400 : 3200);
  }
}
function hideSaveToast() {
  const el = document.getElementById('save-toast');
  if (el) el.classList.remove('show');
}

const Outbox = (() => {
  const KEY = () => `mypump_outbox_${TOKEN || 'anon'}`;
  let queue = [];
  let flushing = false;
  let timer = null;
  let hadProblem = false;   // hubo offline/fallo desde el último éxito → reasegurar con '✓ Guardado'

  // F2 — Resuelve la sesión CORRECTA para una op encolada: la capturada al
  // encolar, o (si aún no existía) la sesión de ESE día+semana. Un drenado
  // tardío tras cambiar de día ya no cruza los sets a la sesión del día nuevo.
  const _sesionPorDia = {};   // `${diaId}|${semana}` → sesionId (cache)
  async function resolveSesion(p) {
    if (p.sesionId) return p.sesionId;
    const semanaActual = (DATA && DATA.rutina && DATA.rutina.semana_actual) || 1;
    // El día encolado es el abierto ahora → usar/crear la sesión actual.
    if (DATA && DATA.dia && p.diaId === DATA.dia.id && (p.semana == null || p.semana === semanaActual)) {
      return _sesionId || await ensureSesionIniciada();
    }
    const key = `${p.diaId}|${p.semana}`;
    if (_sesionPorDia[key]) return _sesionPorDia[key];
    const remota = await window.mypumpDB.getSesionDia(TOKEN, p.diaId, p.semana);
    if (remota && remota.id) { _sesionPorDia[key] = remota.id; return remota.id; }
    // No existe sesión de ese día (raro): crear una para no perder los sets.
    const res = await window.mypumpDB.iniciarSesion(TOKEN, p.diaId, p.semana);
    if (res && res.success && res.data) { _sesionPorDia[key] = res.data; return res.data; }
    return null;
  }

  const EXEC = {
    async carga(p) {
      const sid = await resolveSesion(p);
      if (!sid) return { success: false };
      return window.mypumpDB.registrarCarga(TOKEN, sid, p.datos);
    },
    async estado(p) {
      const sid = await resolveSesion(p);
      if (!sid) return { success: false };
      return window.mypumpDB.marcarEjercicioEstado(
        TOKEN, sid, p.diaId, p.exId, p.seriesObjetivo, p.status, p.manual);
    },
    async swap(p) {
      return window.mypumpDB.saveFoodSwap(TOKEN, p.dietaId, p.comidaId, p.optIdx, p.foodIdx, p.food);
    },
    async peso(p) {
      // Upsert idempotente por (cliente, fecha, tipo, fuente) — mig 027.
      return window.mypumpDB.ingestSalud(TOKEN, [{ fecha: p.fecha, tipo: 'peso_kg', valor: p.valor, fuente: 'manual' }]);
    },
    async checkin(p) {
      // Upsert del check semanal (mig 035). p.fecha = hoy local; el server ancla al lunes ISO.
      return window.mypumpDB.guardarCheckin(TOKEN, p.fecha, p.datos);
    },
  };

  function load() {
    try { queue = JSON.parse(localStorage.getItem(KEY()) || '[]'); }
    catch { queue = []; }
  }
  function save() {
    try { localStorage.setItem(KEY(), JSON.stringify(queue)); } catch {}
  }

  // dedupeKey: reemplaza una op pendiente del mismo target (último valor gana).
  function enqueue(kind, payload, dedupeKey) {
    if (!OUTBOX_ENABLED) return;
    if (dedupeKey) queue = queue.filter(op => op.dedupeKey !== dedupeKey);
    queue.push({ kind, payload, dedupeKey, tries: 0, ts: Date.now() });
    save();
    flushSoon(0);
  }

  function flushSoon(delay = 0) {
    if (timer) return;
    timer = setTimeout(() => { timer = null; flush(); }, delay);
  }

  async function flush() {
    if (flushing || !OUTBOX_ENABLED || !queue.length) return;
    if (navigator.onLine === false) { hadProblem = true; showSaveState('offline'); flushSoon(5000); return; }
    flushing = true;
    // Camino feliz = SILENCIOSO (el tilde de la serie ya es el feedback). Solo se
    // muestra 'Guardando…' si el envío tarda >900ms (conexión lenta), para no
    // parpadear un toast en cada serie confirmada.
    const slowTimer = setTimeout(() => showSaveState('saving'), 900);
    const remaining = [];
    let anyFail = false;
    for (const op of queue) {
      const exec = EXEC[op.kind];
      if (!exec) continue;   // op desconocida → descartar
      let res;
      try { res = await exec(op.payload); } catch { res = { success: false }; }
      if (res && res.success) continue;   // enviada → no re-encolar
      op.tries++;
      anyFail = true;
      remaining.push(op);
    }
    clearTimeout(slowTimer);
    queue = remaining;
    save();
    flushing = false;
    if (anyFail) {
      hadProblem = true;
      showSaveState('offline');
      const backoff = Math.min(30000, 2000 * Math.max(1, queue[0]?.tries || 1));
      flushSoon(backoff);
    } else if (hadProblem) {
      // Recién ahí mostramos '✓ Guardado': reasegura tras una racha offline.
      hadProblem = false;
      showSaveState('saved');
    } else {
      hideSaveToast();   // éxito normal → sin ruido
    }
  }

  return { load, enqueue, flush, flushSoon, pending: () => queue.length,
    // F8 — dedupeKeys pendientes (para que el hydrate no pise swaps aún no sincronizados)
    pendingKeys: () => new Set(queue.map(op => op.dedupeKey).filter(Boolean)) };
})();

/* ---- SUPABASE WRITES ---- */
// F2 — el arranque de la sesión se PERSISTE por día: la duración sobrevive
// reloads y cierres de tab (antes _sessionStart era memoria volátil → tras un
// reload la sesión "duraba" 0/— min y el total guardado quedaba corto).
function persistSessionStart() {
  try {
    if (_sessionStart && DATA && DATA.dia) {
      localStorage.setItem(`mypump_sesion_${TOKEN}_${DATA.dia.id}_start`, String(_sessionStart));
    }
  } catch (_) {}
}

let _sesionInflight = null;   // promesa de creación en vuelo (anti-concurrencia + retry-safe)
async function ensureSesionIniciada() {
  if (_sessionStart == null) { _sessionStart = Date.now(); persistSessionStart(); }
  if (_sesionId) return _sesionId;
  if (!RUTINA_ID) { _sesionIniciada = true; return null; }   // demo mode — no writes
  if (_sesionInflight) return _sesionInflight;               // reusar llamada en vuelo
  _sesionInflight = (async () => {
    const res = await window.mypumpDB.iniciarSesion(TOKEN, DATA.dia.id, DATA.rutina.semana_actual || 1);
    if (res && res.success && res.data) {
      _sesionId = res.data;
      _sesionIniciada = true;
      // Persistir para restaurar estado al recargar la página
      const key = `mypump_sesion_${TOKEN}_${DATA.dia.id}`;
      localStorage.setItem(key, _sesionId);
      localStorage.setItem(`${key}_semana`, DATA.rutina.semana_actual || 1);
    }
    _sesionInflight = null;   // liberar guard → permite reintento si falló
    return _sesionId;
  })();
  return _sesionInflight;
}

function writeSet(exId, setIdx) {
  if (!RUTINA_ID) return;   // demo mode — no writes
  const s = STATE.session[exId].sets[setIdx];
  const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
  // Si el cliente sustituyó el ejercicio, snapshotear el NOMBRE del sustituto
  // (lo que realmente hizo). El ejercicio_id se mantiene → no rompe histórico/progresión.
  const swap = STATE.exerciseSwaps[exId];
  const ejercicioNombre = swap ? swap.current.nombre : ex.nombre;
  Outbox.enqueue('carga', {
    // F2 — capturar sesión/día/semana AL ENCOLAR: un drenado tardío (tras
    // cambiar de día) va a la sesión correcta, no a la del día abierto.
    sesionId: _sesionId || null,
    diaId:    DATA.dia.id,
    semana:   DATA.rutina.semana_actual || 1,
    datos: {
      diaId:          DATA.dia.id,
      ejercicioId:    exId,
      ejercicioNombre:ejercicioNombre,
      serie:          setIdx + 1,
      peso:           parseFloat(s.kg) || 0,
      reps:           parseInt(s.reps) || 0,
      rir:            parseInt(s.rir) || null,
      // Para ejercicios con variante (ej: rueda abdominal) guardamos el nivel
      // elegido en notas, para que el coach lo vea.
      notas:          (STATE.session[exId] && STATE.session[exId].variante) || null,
    },
  }, `carga_${DATA.dia.id}_${exId}_${setIdx}`);
}

async function writeFinish(notas) {
  if (!RUTINA_ID) return;
  // Garantizar que exista la sesión antes de finalizar (defensivo: el cliente
  // podría cerrar sin haber confirmado ninguna serie).
  await ensureSesionIniciada();
  if (!_sesionId) { alert('No se pudo guardar la sesión. Revisá tu conexión e intentá de nuevo.'); return; }
  // Drenar el Outbox antes de cerrar: garantizar que las series pendientes se
  // guarden antes de marcar el día como finalizado.
  await Outbox.flush();

  // F2 — persistir la duración real (wall-clock desde el arranque de la sesión).
  const duracionSeg = _sessionStart ? Math.round((Date.now() - _sessionStart) / 1000) : null;
  const res = await window.mypumpDB.finalizarSesion(TOKEN, _sesionId, notas || null, duracionSeg);
  if (!res || res.success === false) {
    alert('No se pudo cerrar la sesión. Revisá tu conexión e intentá de nuevo.');
    return;
  }
  // Día cerrado = día HECHO (aunque no se hayan tildado todos los ejercicios).
  _diaFinalizado = true;
  localStorage.setItem(`mypump_sesion_${TOKEN}_${DATA.dia.id}_finalizada`, '1');
  // F1 — marcar el día en verde en el picker, al instante.
  STATE.diasCompletados.add(DATA.dia.id);
  renderDayPicker();
  // F5 — al cerrar el día, los swaps no fijados de este día expiran.
  pruneExerciseSwaps();
  renderTrain();
}

// F1 — Días con sesión finalizada esta semana → pinta el day picker.
// No bloqueante; al avanzar de semana la página se recarga y esto trae la
// semana nueva (reset automático).
async function loadDiasCompletados() {
  if (!TOKEN || (DATA && DATA._isDemo) || !window.mypumpDB.getSesionesSemana) return;
  try {
    const rows = await window.mypumpDB.getSesionesSemana(TOKEN, DATA.rutina.semana_actual || 1);
    STATE.diasCompletados = new Set((rows || []).filter(r => r.finalizada_en).map(r => r.dia_id));
    renderDayPicker();
    // F5 — con los días completados a mano, expirar swaps no fijados de días cerrados.
    pruneExerciseSwaps();
  } catch (_) { /* sin red: el picker queda sin marcas, no rompe */ }
}

/* ---- AVANCE DE SEMANA ---- */
// Simplificación: verifica solo el día actual (no todos los días de la semana).
// El chequeo multi-día requeriría RPCs adicionales (pendiente Parte B).
function isWeekCompleted() {
  return checkIfDayCompleted();
}

async function doAvanzarSemana() {
  const nueva = await window.mypumpDB.avanzarSemana(TOKEN);
  if (nueva != null) {
    // Limpiar sesiones cacheadas de la semana anterior
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(`mypump_sesion_${TOKEN}_`)) localStorage.removeItem(k);
    });
    location.reload();
  }
}

async function confirmEmpezarBloqueNuevo() {
  const ok = await MyPump.ui.showConfirmModal({
    title:        '¡Nuevo bloque!',
    body:         'Terminaste tu plan 💪. Tu coach ya te dejó preparado el siguiente bloque. ¿Lo empezamos? Vas a arrancar en la primera semana del bloque nuevo — tus cargas anteriores quedan guardadas.',
    confirmLabel: '🎉 Empezar bloque nuevo →',
    cancelLabel:  'Ahora no',
  });
  if (ok) await doEmpezarBloqueNuevo();
}

async function doEmpezarBloqueNuevo() {
  const ok = await window.mypumpDB.activarSiguiente(TOKEN);
  if (ok) {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(`mypump_sesion_${TOKEN}_`)) localStorage.removeItem(k);
    });
    location.reload();
  } else {
    MyPump.ui.showConfirmModal({ title: 'Ups', body: 'No pudimos activar el bloque nuevo. Probá de nuevo en un rato o escribile a tu coach.', confirmLabel: 'Ok', cancelLabel: '' });
  }
}

async function confirmAvanzarSemana() {
  const semana = DATA.rutina.semana_actual || 1;
  const total  = DATA.rutina.semanas_total || 12;
  if (semana >= total) return; // ya en la última semana

  const off = DATA.rutina.semana_offset || 0;   // macrociclo 2+: labels continuados
  const diaCompleto = checkIfDayCompleted();
  const ok = await MyPump.ui.showConfirmModal({
    title:        `Pasar a Semana ${semana + off + 1}`,
    body:         diaCompleto
      ? `¿Confirmás que querés avanzar a la SEMANA ${semana + off + 1}?`
      : `Todavía tenés ejercicios sin completar en la SEMANA ${semana + off}. Si avanzás, la semana nueva empieza con progresión actualizada. ¿Continuar?`,
    confirmLabel: `Pasar a SEM ${semana + off + 1} →`,
    cancelLabel:  'Cancelar',
  });
  if (ok) await doAvanzarSemana();
}

async function showDayCompletedModal() {
  // Idempotente: si ya se mostró para este día, no volver a abrir.
  if (STATE.diaCompletadoMostrado) return;
  STATE.diaCompletadoMostrado = true;

  const dias = DATA._dias || [];
  const currentIdx = dias.findIndex(d => d.id === DATA.dia.id);
  const nextDia = currentIdx >= 0 ? dias[currentIdx + 1] : null;

  if (!nextDia) {
    // Último día de la lista — solo felicitar, sin avance automático.
    // El cliente debe usar el botón manual "Pasar a Semana N+1" cuando él decida.
    await MyPump.ui.showConfirmModal({
      title:        '🎉 ¡Día completado!',
      body:         'Buen trabajo. Cuando hayas terminado todos los días de la semana, usá el botón "Pasar a Semana N+1" abajo para avanzar.',
      confirmLabel: 'Listo',
      cancelLabel:  'Cerrar',
    });
    return;
  }

  const nextNombre = nextDia.nombre || `Día ${currentIdx + 2}`;
  const ok = await MyPump.ui.showConfirmModal({
    title:        '🎉 ¡Día completado!',
    body:         `Buen trabajo. ¿Querés ir al siguiente día (${nextNombre})?`,
    confirmLabel: `Ir a ${nextNombre} →`,
    cancelLabel:  'Ahora no',
  });

  if (ok) {
    stopRest(); // limpiar el descanso de la última serie antes de cambiar de día
    // Cambiar día activo — replicar lógica del click del day-pill (línea ~1033)
    DATA.dia = nextDia;
    DATA.historico_por_ejercicio = {};
    STATE.exerciseStates = {};
    STATE.exerciseMeta = {};
    STATE.diaCompletadoMostrado = false;
    STATE.session = buildSession();
    STATE.expandedId = null;
    _sesionIniciada = false;
    _sesionId = null;
    persistLastDay(nextDia.id, RUTINA_ID);
    updateDayHeader();
    renderDayPicker();
    renderTrain();
    prefetchHistoricoDia();
    window.scrollTo(0, 0);
  }
}

/* ---- RESTAURAR REGISTROS DE CARGA ---- */
// Lee los sets guardados en Supabase y los vuelca en STATE.session.
// Solo sobrescribe sets que aún no estén confirmados localmente.
// Columnas reales: serie_numero, peso_kg, reps_realizadas, rir_real, notas.
async function loadRegistrosCarga() {
  if (!RUTINA_ID || !_sesionId) return;
  const result = await window.mypumpDB.getRegistrosSesion(TOKEN, _sesionId);
  if (!result.success || !result.data.length) return;

  for (const reg of result.data) {
    const exSession = STATE.session[reg.ejercicio_id];
    if (!exSession) continue;

    const setIdx = reg.serie_numero - 1;  // DB es 1-indexed, array es 0-indexed
    if (setIdx < 0 || setIdx >= exSession.sets.length) continue;

    const setObj = exSession.sets[setIdx];
    if (setObj.confirmed) continue;  // no pisar datos que el usuario ya ingresó en esta carga

    setObj.kg        = reg.peso_kg        != null ? String(reg.peso_kg)        : '';
    setObj.reps      = reg.reps_realizadas != null ? String(reg.reps_realizadas) : '';
    setObj.rir       = reg.rir_real        != null ? String(reg.rir_real)        : '';
    setObj.confirmed = true;
    // Restaurar el nivel/variante elegido (guardado en notas).
    if (reg.notas && getVariantesEj(DATA.dia.bloques.flatMap(b=>b.ejercicios).find(x=>x.id===reg.ejercicio_id))) {
      exSession.variante = reg.notas;
    }
  }
  console.log(`[mypump] Restauradas ${result.data.length} series desde sesión ${_sesionId}`);
}

/* Restaura la sesión del día ACTUAL (DATA.dia) desde localStorage o el server:
 * _sesionId, estados de ejercicios, series cargadas y si el día ya fue cerrado
 * (_diaFinalizado). Se usa en el bootstrap Y al cambiar de día — antes el cambio
 * de día NO restauraba nada, así que un día ya hecho aparecía vacío/pendiente. */
async function restoreSesionDelDia() {
  _sesionId = null;
  _sesionIniciada = false;
  _diaFinalizado = false;
  _sessionStart = null;   // F2 — el arranque es POR DÍA; se restaura abajo
  if (!RUTINA_ID || (DATA && DATA._isDemo)) return;

  const sesionKey    = `mypump_sesion_${TOKEN}_${DATA.dia.id}`;
  const savedSesionId = localStorage.getItem(sesionKey);
  const savedSemana   = parseInt(localStorage.getItem(`${sesionKey}_semana`) || '0', 10);
  const semanaActual  = DATA.rutina.semana_actual || 1;

  // F2 — restaurar el arranque persistido (la duración sobrevive reloads)
  const savedStart = parseInt(localStorage.getItem(`${sesionKey}_start`) || '0', 10);

  if (savedSesionId && savedSemana === semanaActual) {
    // Sesión local de la semana actual — recuperar
    _sesionId       = savedSesionId;
    _sesionIniciada = true;
    _diaFinalizado  = localStorage.getItem(`${sesionKey}_finalizada`) === '1';
    if (savedStart > 0) _sessionStart = savedStart;
    await loadExerciseStates();
    await loadRegistrosCarga();
  } else {
    if (savedSesionId && savedSemana !== semanaActual) {
      localStorage.removeItem(sesionKey);
      localStorage.removeItem(`${sesionKey}_semana`);
      localStorage.removeItem(`${sesionKey}_finalizada`);
      localStorage.removeItem(`${sesionKey}_start`);
    }
    try {
      const remote = await window.mypumpDB.getSesionDia(TOKEN, DATA.dia.id, semanaActual);
      if (remote && remote.id) {
        _sesionId       = remote.id;
        _sesionIniciada = true;
        _diaFinalizado  = !!remote.finalizada_en;   // ← día cerrado = día HECHO
        // Arranque: preferir el persistido local (cambio de device: iniciada_en remota)
        if (savedStart > 0) _sessionStart = savedStart;
        else if (remote.iniciada_en) {
          const t = new Date(remote.iniciada_en).getTime();
          if (isFinite(t)) { _sessionStart = t; persistSessionStart(); }
        }
        localStorage.setItem(sesionKey, remote.id);
        localStorage.setItem(`${sesionKey}_semana`, semanaActual);
        if (_diaFinalizado) localStorage.setItem(`${sesionKey}_finalizada`, '1');
        await loadExerciseStates();
        await loadRegistrosCarga();
      }
    } catch (e) {
      console.warn('[mypump] error restaurando sesión del día:', e);
    }
  }
}

/* ---- LAZY LOAD HISTORICO ---- */
const _histPromises = {};
async function loadHistorico(exId) {
  // Si ya hay un fetch en vuelo (p.ej. del prefetch del día), esperarlo — así
  // await loadHistorico() devuelve recién cuando los datos están listos, y no
  // renderiza vacío por un fetch que corre tarde (bug del auto-avance).
  if (_histPromises[exId]) { await _histPromises[exId]; return; }
  if (Array.isArray(DATA.historico_por_ejercicio[exId])) return; // ya cargado
  const p = window.mypumpDB.getHistoricoEjercicio(TOKEN, exId, 24)
    .then(rows => { DATA.historico_por_ejercicio[exId] = rows || []; })
    .catch(() => { DATA.historico_por_ejercicio[exId] = []; });
  DATA.historico_por_ejercicio[exId] = []; // marca "cargando" (defined)
  _histPromises[exId] = p;
  await p;
  delete _histPromises[exId];
}

// Precarga el histórico de TODOS los ejercicios de trabajo del día (en paralelo),
// para que el peso sugerido / récord / última vez aparezcan al primer render de
// cualquier ejercicio — incluido el que se abre solo al avanzar. Re-renderiza al
// terminar. Fire-and-forget.
function prefetchHistoricoDia() {
  if (!DATA || !DATA.dia || !DATA.dia.bloques) return;
  const ids = DATA.dia.bloques.flatMap(b => b.ejercicios || [])
    .filter(e => e.tipo !== 'calentamiento' && !Array.isArray(DATA.historico_por_ejercicio[e.id]) && !_histPromises[e.id])
    .map(e => e.id);
  if (!ids.length) return;
  Promise.all(ids.map(id => loadHistorico(id))).then(() => {
    if (STATE.scene === 'train' && typeof renderTrain === 'function') renderTrain();
  });
}

function showLoading() {
  $('#loadScreen').hidden = false;
  $('#errorScreen').hidden = true;

function showError(type, detail) {
  $('#loadScreen').hidden = true;
  $('#appRoot').hidden = true;
  const err = $('#errorScreen');
  err.hidden = false;
  const pasteWrap = $('#errorPasteWrap');
  if (pasteWrap) pasteWrap.hidden = (type !== 'no-token'); // form solo en 'no-token'
  if (type === 'no-token') {
    $('#errTitle').textContent = 'Bienvenido a MyPump';
    $('#errSub').textContent = 'Pegá abajo el link que te mandó Mati. Solo lo hacés esta vez — después la app abre directo.';
    $('#errCode').textContent = '';
    // Activar el form de pegado
    const inp = $('#errorPasteInput'), btn = $('#errorPasteBtn'), errEl = $('#errorPasteErr');
    if (inp && btn) {
      const TOKEN_RE = /^[a-zA-Z0-9_-]{16,64}$/;
      function tryExtract(raw) {
        if (!raw) return null;
        raw = raw.trim();
        // Si pegan el link completo, extraer ?t=
        const m1 = raw.match(/[?&]t=([a-zA-Z0-9_-]{16,64})\b/);
        if (m1) return m1[1];
        // Si pegan el path "/TOKEN"
        const m2 = raw.match(/\/([a-zA-Z0-9_-]{16,64})(?:[/?#]|$)/);
        if (m2) return m2[1];
        // Si pegan solo el token
        if (TOKEN_RE.test(raw)) return raw;
        return null;
      }
      btn.onclick = () => {
        const tok = tryExtract(inp.value);
        if (!tok) {
          if (errEl) {
            errEl.textContent = 'No reconocí ese link. Copialo de WhatsApp y pegalo entero.';
            errEl.hidden = false;
          }
          return;
        }
        try { localStorage.setItem('mypump_token', tok); } catch(e){}
        // Recargar con el token explícito en la URL para asegurar todos los flujos
        window.location.replace('/cliente.html?t=' + encodeURIComponent(tok));
      };
      inp.onkeydown = (e) => { if (e.key === 'Enter') btn.click(); };
    }
    // Boton "Ver demo": entra sin token con datos de ejemplo (revision App Store).
    const demoBtn = $('#errorDemoBtn');
    if (demoBtn) {
      demoBtn.hidden = false;
      demoBtn.onclick = () => { window.location.href = '?demo=1'; };
    }
  } else if (type === 'service-down') {
    $('#errTitle').textContent = 'Servicio fuera de línea';
    $('#errSub').textContent = 'No pudimos cargar tu plan. Probá de nuevo en unos minutos. Si sigue sin entrar, avisale a Mati — tu acceso está bien, es un problema temporal del servidor.';
    $('#errCode').textContent = detail || '';
  } else {
    $('#errTitle').textContent = 'Enlace inválido';
    $('#errSub').textContent = 'Este enlace no existe o fue revocado. Escribile a Mati por WhatsApp para que te mande uno nuevo.';
    $('#errCode').textContent = detail || '';
  }
}

/* ---- DAY PICKER ---- */
function renderDayPicker() {
  const dias = DATA._dias || [DATA.dia];

  const picker = $('#dayPicker');
  picker.innerHTML = dias.map(d => {
    const num  = getDayNum(d, dias);

    // F1 — día con sesión FINALIZADA esta semana → verde con ✓ (de un vistazo

    // recarga filtrado por semana_actual).

    renderTrain();
    prefetchHistoricoDia();

    await restoreSesionDelDia();

/* ---- TRAIN SCENE ---- */

/**
 * Extrae el nombre visible del bloque con soporte para dos formatos:
 *  - Seed legacy:  { subtitulo: 'Calentamiento' }           → "CALENTAMIENTO"
 *  - Cerebro:      { titulo: 'BLOQUE 0 — CALENTAMIENTO' }   → "CALENTAMIENTO"
 * Si el titulo no tiene separador (em/en-dash o guion), lo devuelve en mayusculas.
 */
function getNombreBloque(bloque) {
  // Formato seed: campo subtitulo separado
  if (bloque.subtitulo) return bloque.subtitulo.toUpperCase();

  // Formato Cerebro: titulo incluye el numero y nombre juntos
  const raw = bloque.titulo || bloque.nombre || bloque.title || '';
  if (!raw) return '';

  // "BLOQUE 0 — CALENTAMIENTO" → "CALENTAMIENTO"
  const match = raw.match(/^bloque\s+\d+\s*[—–-]\s*(.+)$/i);
  if (match) return match[1].trim().toUpperCase();

  return raw.toUpperCase();
}

function renderTrain() {
  const root = $('#scene-train');
  const allEx = DATA.dia.bloques.flatMap(b => b.ejercicios);
  const TERMINAL = new Set(['completo','completo_sin_datos','saltado']);
  const completedCount = allEx.filter(ex => TERMINAL.has(getExStatus(ex.id))).length;
  const totalEx = allEx.length;
  const allTerminal = completedCount === totalEx;
  const allDone = allTerminal || _diaFinalizado;   // día cerrado también cuenta como hecho
  const pendingCount = totalEx - completedCount;
  const mins = _sessionStart ? Math.round((Date.now()-_sessionStart)/60000) : 0;

  $('#progFill').style.width = `${(completedCount/totalEx)*100}%`;
  $('#progDone').textContent = completedCount;
  $('#progTotal').textContent = totalEx;
  $('#hdrProgress').hidden = false;

  let html = '';

  if (DATA._isDemo) {
    html += `<div class="demo-banner">⚠ <strong>Modo demo</strong> — Mati todavía no publicó tu plan. Los datos que ves son de ejemplo.</div>`;
  }

  if (allDone) {
    let totalSets=0, tonnage=0, totalReps=0;
    for (const exId of Object.keys(STATE.session)) {
      for (const s of STATE.session[exId].sets) {
        if (s.confirmed) {
          totalSets++;
          tonnage += (parseInt(s.reps)||0) * (parseFloat(s.kg)||0);
          totalReps += parseInt(s.reps)||0;
        }
      }
    }
    html += `
    <div class="finish-card">
      <div class="eyebrow">${_diaFinalizado ? '✓ DÍA CERRADO' : 'SESIÓN COMPLETA'}</div>
      <h2>${completedCount}/${totalEx} ejercicios listos</h2>
      <div class="finish-summary">
        <div class="fs-cell"><span class="lbl">Series</span><span class="val">${totalSets}</span></div>
        <div class="fs-cell"><span class="lbl">Volumen</span><span class="val">${Math.round(tonnage)}<small>kg</small></span></div>
        <div class="fs-cell"><span class="lbl">Duración</span><span class="val">${mins||'—'}<small>min</small></span></div>
      </div>
      ${_diaFinalizado
        ? `<div class="finish-cerrado-msg">Tu sesión de hoy quedó guardada. 💪</div>`
        : `<button class="btn-primary" id="finishBtn">${ICONS.flag} Cerrar sesión de hoy</button>`}
    </div>`;
  }

  // Banner-resumen: cuántos ejercicios cambian carga/volumen esta semana.
  const _exDia = DATA.dia.bloques.flatMap(b => b.ejercicios);
  const _nCambian = _exDia.filter(ex => ex.tipo !== 'calentamiento' && computeProgresionNota(ex, DATA.rutina.semana_actual)?.cambia).length;
  // Calibración solo en la semana 1 del PRIMER macrociclo (fase 2+ continúa cargas)
  const _esCalibracion = (DATA.rutina.semana_actual || 1) <= 1 && !(DATA.rutina.semana_offset || 0);
  if (_nCambian > 0) {
    html += `<div class="prog-banner">📈 Esta semana <strong>${_nCambian}</strong> ${_nCambian === 1 ? 'ejercicio cambia' : 'ejercicios cambian'} carga o volumen. Mirá el detalle al abrir cada uno.</div>`;
  } else if (_esCalibracion) {
    html += `<div class="prog-banner is-calibracion">🎯 Semana de calibración: llegá cerca del fallo muscular y encontrá tu peso real. Las reps son una guía (±2-3) — no te guardes reps.</div>`;
  }

  // F3 — Inicio claro del cronómetro de sesión (el timer de DESCANSO es otro y
  // no se toca). Si el cliente no toca Start, arranca solo con la primera serie
  // (comportamiento histórico) y el cronómetro lo aclara.
  if (!_diaFinalizado && !allDone) {
    if (!_sessionStart) {
      html += `
      <button class="session-start" id="btnStartSesion">
        <span class="ss-icon">▶</span>
        <span class="ss-txt"><strong>Empezar entrenamiento</strong>
        <small>arranca el cronómetro de la sesión — o empezá directo: corre solo con tu primera serie</small></span>
      </button>`;
    } else {
      html += `
      <div class="session-crono" id="sessionCrono">
        <span class="sc-dot"></span>
        <span class="sc-lbl">EN CURSO</span>
        <span class="sc-time" id="cronoTime">${fmtCrono(Date.now() - _sessionStart)}</span>
        ${_startedByButton ? '' : '<span class="sc-hint">⏱ arrancó con tu primera serie</span>'}
      </div>`;
    }
  }

  for (let bi=0; bi<DATA.dia.bloques.length; bi++) {
    const b = DATA.dia.bloques[bi];
    const done = b.ejercicios.filter(ex => TERMINAL.has(getExStatus(ex.id))).length;
    html += `
    <section class="block">
      <div class="block-header">
        <span class="block-num">B${bi}</span>
        <span class="block-title">${getNombreBloque(b)}</span>
        <span class="block-meta">${done}/${b.ejercicios.length}</span>
      </div>
      <div class="block-list">
        ${b.ejercicios.map((ex, ei) => renderExCard(getEffectiveEx(ex), ei+1)).join('')}
      </div>
    </section>`;
  }

  // Botón de avance de semana — siempre visible si no es demo y no es la última semana
  const _semanaActual = DATA.rutina.semana_actual || 1;
  const _semanasTotal = DATA.rutina.semanas_total || 12;
  const _semOff = DATA.rutina.semana_offset || 0;   // macrociclo 2+: label continuado
  if (!DATA._isDemo && _semanaActual < _semanasTotal) {
    html += `
    <div class="week-advance-wrap">
      <button class="btn-week-advance" onclick="confirmAvanzarSemana()">
        Pasar a Semana ${_semanaActual + _semOff + 1} →
      </button>
    </div>`;
  } else if (!DATA._isDemo && _semanaActual >= _semanasTotal && DATA.rutina.tiene_siguiente) {
    // Última semana del bloque + hay un bloque nuevo en cola → activarlo.
    html += `
    <div class="week-advance-wrap">
      <button class="btn-week-advance" style="background:var(--color-brand)" onclick="confirmEmpezarBloqueNuevo()">
        🎉 Empezar bloque nuevo →
      </button>
      <div style="font-size:11px;color:var(--color-text-muted);text-align:center;margin-top:6px;font-family:var(--font-mono)">Terminaste tu plan. Tu próximo bloque ya está listo.</div>
    </div>`;
  }

  // Footer: siempre visible cuando hay sesión iniciada
  if (!allDone) {
    const hasStarted = _sesionIniciada || completedCount > 0;
    html += `
    <div class="finish-card" style="margin-top:0">
      <div class="finish-summary">
        <div class="fs-cell"><span class="lbl">Hechos</span><span class="val">${completedCount}/${totalEx}</span></div>
        <div class="fs-cell"><span class="lbl">Tiempo</span><span class="val">${mins||'—'}<small>min</small></span></div>
        <div class="fs-cell"><span class="lbl">Restan</span><span class="val">${pendingCount}<small>ej</small></span></div>
      </div>
      <button class="btn-secondary-outline" id="earlyFinishBtn" ${!hasStarted?'style="opacity:.5"':''}>
        ${ICONS.flag} Cerrar sesión de hoy
      </button>
    </div>`;
  }

  root.innerHTML = html;
  bindTrainEvents();
  syncCronoTick();   // F3 — arrancar/parar el tick del cronómetro según estado
}

/* F3 — Cronómetro de la SESIÓN (no confundir con el timer de descanso).
   El tiempo real vive en _sessionStart (persistido por día, F2); acá solo se
   formatea y se refresca el span una vez por segundo sin re-render completo. */
let _startedByButton = false;
let _cronoInterval = null;
function fmtCrono(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  const p = n => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${p(m)}:${p(ss)}` : `${m}:${p(ss)}`;
}
function syncCronoTick() {
  const el = document.getElementById('cronoTime');
  if (el && _sessionStart && !_diaFinalizado) {
    if (!_cronoInterval) {
      _cronoInterval = setInterval(() => {
        const t = document.getElementById('cronoTime');
        if (!t || !_sessionStart) { clearInterval(_cronoInterval); _cronoInterval = null; return; }
        t.textContent = fmtCrono(Date.now() - _sessionStart);
      }, 1000);
    }
  } else if (_cronoInterval) {
    clearInterval(_cronoInterval); _cronoInterval = null;
  }
}
async function startEntrenamiento() {
  _startedByButton = true;
  await ensureSesionIniciada();   // crea la sesión (iniciada_en real) + persiste _sessionStart
  renderTrain();
}

// VARIANTES por ejercicio (F4): un mismo ejercicio se hace con distinto agarre
// o nivel, y el peso/historial debe discriminarse por variante. La elegida se
// guarda en registros_carga.notas y el sugerido se filtra por ella.
//  - label: título del picker ("Nivel" o "Agarre").
//  - sinPeso: true solo para las de peso corporal (rueda) — las de agarre
//    (tríceps en polea, jalón…) SÍ llevan kg.
const VARIANTES_EJ = [
  { re: /rueda\s*abdom|ab\s*wheel|abdominal\s*wheel|rollout|roller\s*abdom/i,
    ops: ['Rodillas flexionadas', 'Rodillas extendidas'], label: 'Nivel', sinPeso: true },
  { re: /(tr(i|í)ceps|pushdown|jal(o|ó)n\s+de\s+tr(i|í)ceps).*(polea|cable)|polea.*tr(i|í)ceps/i,
    ops: ['Barra', 'Soga', 'Maneral'], label: 'Agarre' },
  { re: /jal(o|ó)n\s+(al|a la|de)\s+(pecho|nuca)|pulldown|dorsalera/i,
    ops: ['Prono', 'Supino', 'Neutro'], label: 'Agarre' },
  { re: /remo\s+(en\s+)?(polea|cable|gironda)|gironda/i,
    ops: ['Neutro', 'Ancho', 'Supino'], label: 'Agarre' },
  { re: /curl\s+.*(polea|cable)|polea.*curl/i,
    ops: ['Barra', 'Soga'], label: 'Agarre' },
];
// Entrada completa de variantes del ejercicio (o null).
function getVariantesEntry(ex) {
  return VARIANTES_EJ.find(v => v.re.test((ex && ex.nombre) || '')) || null;
}
// Solo las opciones (compat con los usos existentes).
function getVariantesEj(ex) {
  const m = getVariantesEntry(ex);
  return m ? m.ops : null;
}
const _SIN_PESO_RE = /rueda\s*abdom|ab\s*wheel|rollout|plancha\b|abdominal(es)?\b|crunch|lagartija|flexi(o|ó)n(es)?\s+de\s+brazo|elevaci(o|ó)n(es)?\s+de\s+piernas|mountain\s*climber|hollow/i;
// Si el nombre menciona equipo/carga externa, el ejercicio SÍ lleva kg aunque el
// patrón base sea "de peso corporal" (ej: "Crunch abdominal en máquina",
// "Crunch en polea alta", "Plancha con disco", "Flexiones con lastre").
const _CON_CARGA_RE = /m(a|á)quina|polea|cable|disco|lastre|mancuerna|barra\b|kettlebell|pesa\b|pesas\b|con\s+peso|con\s+carga|smith|multipower|banco\s+declinado\s+con/i;
function esSinPeso(ex) {
  if (!ex || ex.tipo === 'calentamiento') return false;   // el warmup se maneja aparte
  const nombre = ex.nombre || '';
  if (_CON_CARGA_RE.test(nombre)) return false;           // carga externa GANA
  const entry = getVariantesEntry(ex);
  // Solo las variantes marcadas sinPeso (rueda) anulan el kg; las de AGARRE
  // (tríceps polea, jalón…) llevan peso normal.
  return (entry ? entry.sinPeso === true : false) || _SIN_PESO_RE.test(nombre);
}
// ¿Este ejercicio NO usa columna de peso? (warmup o peso corporal)
function exNoKg(ex) {
  return (ex && ex.tipo === 'calentamiento') || esSinPeso(ex);
}

function renderSetRow(ex, s, i, isActive) {
  const conf = s.confirmed;
  const isWarmup = ex.tipo === 'calentamiento';
  const noKg = exNoKg(ex);
  const prog = getProgresionActual(ex, DATA.rutina.semana_actual);
  const sugRepsPlan = _repsSug(prog.reps);              // objetivo del plan (null si AMRAP)
  const sugKg   = noKg ? '' : suggestedKg(ex.id, i);    // peso de la última vez
  const sugRepsHist = suggestedReps(ex.id, i);          // reps de la última vez ('' si no hay)
  // Para mostrar/autocompletar: preferimos lo de la última vez; si no hay, el plan.
  const sugRepsShow = sugRepsHist !== '' ? sugRepsHist : (sugRepsPlan != null ? String(sugRepsPlan) : '');
  // El one-tap requiere reps objetivo del plan (no AMRAP) + peso conocido (o sin peso).
  const hasSug  = (sugRepsPlan != null) && (noKg || sugKg !== '');
  const typed   = s.reps !== '' || s.kg !== '';
  // El check se habilita si el cliente ya cargó datos, o si hay sugerido (one-tap).
  // El kg puede HEREDARSE de una serie ya confirmada (no hace falta repetirlo).
  const kgHer = noKg ? '' : kgHeredable(ex.id, i);
  const canConfirm = typed ? (s.reps !== '' && (noKg || s.kg !== '' || kgHer !== '')) : hasSug;
  const cls = 'set-row' + (conf?' is-confirmed':'') + (!conf&&!isActive?' is-pending':'') + (isActive?' is-active':'');
  // Hint one-tap: registra lo de la última vez (peso + reps). El RIR NO se
  // autocompleta — es subjetivo, lo pone el cliente si quiere.
  const hint = (!conf && isActive && hasSug && !typed)
    ? `<div class="set-sug-hint" data-sugconfirm="${ex.id}|${i}" role="button" tabindex="0">✓ Tocá para registrar lo de la última vez${noKg ? ` · <b>${sugRepsShow} reps</b>` : ` · <b>${sugKg}kg × ${sugRepsShow}</b>`} — o editá si hiciste otra cosa</div>`
    : '';
  // B4 — Primera vez con este ejercicio (sin histórico → sin peso sugerido):
  // guiar la elección del peso en vez de dejar el input mudo. No aplica a los
  // ejercicios sin peso (peso corporal).
  const calibHint = (!conf && isActive && !hasSug && !typed && !noKg && sugRepsPlan != null)
    ? `<div class="set-sug-hint is-calib">🎯 Primera vez con este ejercicio: elegí un peso con el que llegues a ${prog.reps} reps dejando 1–2 en reserva. Queda de referencia para la próxima.</div>`
    : '';
  return `
  <div class="${cls}" data-set="${ex.id}|${i}">
    <span class="set-num">${i+1}</span>
    <input class="set-input" inputmode="numeric" placeholder="${sugRepsHist !== '' ? sugRepsHist : (prog.reps || '')}" value="${s.reps}" data-field="reps" ${conf?'readonly':''} />
    <input class="set-input" inputmode="decimal" placeholder="${noKg ? '—' : (sugKg || kgHer)}" value="${noKg ? '' : s.kg}" data-field="kg" ${conf||noKg?'readonly':''} />
    <button class="rir-btn" data-rir="${ex.id}|${i}">${s.rir!=='' ? `<span class="lbl">RIR</span>${s.rir}` : `<span class="lbl">RIR</span>·`}</button>
    ${conf
      ? `<button class="set-confirm is-edit" data-edit="${ex.id}|${i}" aria-label="Editar">${ICONS.edit}</button>`
      : `<button class="set-confirm" data-confirm="${ex.id}|${i}" aria-label="Registrar serie" title="${typed ? 'Registrar lo que hiciste' : 'Registrar lo sugerido'}"${canConfirm?'':' disabled'}>${ICONS.check}</button>`}
  </div>${hint}${calibHint}`;
}

// Parsea el objetivo de reps del plan a un entero (top del rango). null si es
// AMRAP/∞ (ahí el cliente TIENE que ingresar las reps reales, no hay one-tap).
function _repsSug(reps) {
  if (reps == null) return null;
  const str = String(reps);
  if (/amrap|∞|max|máx/i.test(str)) return null;
  const nums = str.match(/\d+/g);
  return nums ? parseInt(nums[nums.length - 1]) : null;
}

// Confirma una serie. Si el cliente NO editó nada → "cumplí lo sugerido":
// registra con el peso sugerido (última vez), las reps objetivo del plan y el
// RIR objetivo del plan. Si editó reps/peso → usa lo que puso (y NO fuerza RIR:
// queda lo que el cliente eligió, o null). Un toque = registrado.
async function confirmarSerie(exId, idx) {
  unlockAudio(); // primer user gesture confiable — habilita beeps en iOS
  const setObj = STATE.session[exId]?.sets?.[idx];
  if (!setObj || setObj.confirmed) return;
  const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
  if (!ex) return;

  // R5 — Si el día ya está finalizado, no dejar cargar series "fantasma" en
  // silencio. Se ofrece reabrir explícitamente; los sets nuevos se adjuntan a la
  // MISMA sesión (_sesionId se mantiene — mypump_iniciar_sesion no es idempotente,
  // así que no lo re-llamamos para no duplicar la sesión).
  if (_diaFinalizado) {
    const reabrir = await MyPump.ui.showConfirmModal({
      title: 'Este día ya lo cerraste',
      body: 'Lo marcaste como terminado. ¿Querés reabrirlo para seguir cargando series?',
      confirmLabel: 'Reabrir día',
      cancelLabel: 'Dejarlo cerrado',
    });
    if (!reabrir) return;
    _diaFinalizado = false;
    localStorage.removeItem(`mypump_sesion_${TOKEN}_${DATA.dia.id}_finalizada`);
    renderTrain();
  }
  const isWarmup = ex.tipo === 'calentamiento';
  const noKg = exNoKg(ex);
  const prog = getProgresionActual(ex, DATA.rutina.semana_actual);

  const editoManual = setObj.reps !== '' || setObj.kg !== '';
  if (!editoManual) {
    // One-tap: registrar lo de la ÚLTIMA vez (reps + peso). Reps: preferimos las
    // que hiciste la semana pasada; si no hay histórico, el objetivo del plan.
    // El RIR NO se autocompleta — es subjetivo, lo pone el cliente si quiere.
    const sugRepsHist = suggestedReps(exId, idx);
    const sugRepsPlan = _repsSug(prog.reps);
    const useReps = sugRepsHist !== '' ? sugRepsHist : (sugRepsPlan != null ? String(sugRepsPlan) : '');
    const sugKg   = noKg ? '' : suggestedKg(exId, idx);
    if (useReps !== '') setObj.reps = useReps;
    if (!noKg && sugKg !== '') setObj.kg = String(sugKg);
  }
  // Sin peso → nunca guardar kg (aunque quedara algo tipeado antes).
  if (noKg) setObj.kg = '';
  // Kg heredado: tipeó reps pero no repitió el peso → arrastrar el de la serie
  // confirmada anterior (fix "no me deja confirmar los últimos casilleros").
  if (!noKg && setObj.kg === '' && setObj.reps !== '') {
    const her = kgHeredable(exId, idx);
    if (her !== '') setObj.kg = her;
  }
  // No confirmar sin datos mínimos (ej: sin sugerido y sin editar).
  if (setObj.reps === '' || (!noKg && setObj.kg === '')) return;

  setObj.confirmed = true;
  await ensureSesionIniciada();
  writeSet(exId, idx); // fire-and-forget

  if (!isWarmup) startRest(ex.descanso_segundos);

  const allConfirmed = STATE.session[exId].sets.every(s => s.confirmed);
  if (allConfirmed && getExStatus(exId) === 'pendiente') {
    setExStatus(exId, 'completo');
    STATE.session[exId].completed = true;
    const all = DATA.dia.bloques.flatMap(b => b.ejercicios);
    const i = all.findIndex(e => e.id === exId);
    const next = all.slice(i + 1).find(e => getExStatus(e.id) === 'pendiente');
    if (next) {
      STATE.expandedId = next.id;
      // Cargar el histórico del siguiente ANTES de renderizar, para que el peso
      // sugerido / récord / última vez aparezcan al primer load (bug del auto-avance).
      if (!Array.isArray(DATA.historico_por_ejercicio[next.id])) await loadHistorico(next.id);
      marcarLeidosEjercicio(next.id);
    }
  }
  renderTrain();
  if (!DATA._isDemo && checkIfDayCompleted()) {
    setTimeout(() => showDayCompletedModal(), 500);
  }
}

function bindTrainEvents() {
  // F3 — botón "Empezar entrenamiento" (inicio explícito del cronómetro)
  const startBtn = document.getElementById('btnStartSesion');
  if (startBtn) startBtn.addEventListener('click', () => {
    startBtn.disabled = true;
    startEntrenamiento();
  });

  $$('[data-toggle]').forEach(btn => btn.addEventListener('click', async () => {
    const id = btn.getAttribute('data-toggle');
    const wasExpanded = STATE.expandedId === id;
    STATE.expandedId = wasExpanded ? null : id;
    if (!wasExpanded) {
      if (DATA.historico_por_ejercicio[id] === undefined) await loadHistorico(id);
      marcarLeidosEjercicio(id);   // limpia el badge (optimista) + backend en background
    }
    renderTrain();
  }));

  // Enviar comentario del cliente anclado al ejercicio
  $$('[data-comment-send]').forEach(btn => btn.addEventListener('click', async () => {
    const exId  = btn.getAttribute('data-comment-send');
    const input = document.querySelector(`textarea[data-comment-input="${exId}"]`);
    const txt   = input ? input.value : '';
    if (!txt.trim()) return;
    const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
    btn.disabled = true; btn.textContent = 'Enviando…';
    await enviarComentarioEjercicio(exId, ex ? ex.nombre : '', txt);
    renderTrain();
  }));

  $$('[data-set] input').forEach(inp => {
    inp.addEventListener('input', () => {
      const [exId, idx] = inp.closest('[data-set]').getAttribute('data-set').split('|');
      STATE.session[exId].sets[+idx][inp.getAttribute('data-field')] = inp.value;
      const row = inp.closest('.set-row');
      const setObj = STATE.session[exId].sets[+idx];
      const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
      const noKg = exNoKg(ex);
      const ok = setObj.reps !== '' && (noKg || setObj.kg !== '' || kgHeredable(exId, +idx) !== '');
      const prog = getProgresionActual(ex, DATA.rutina.semana_actual);
      const hasSug = (_repsSug(prog.reps) != null) && (noKg || suggestedKg(exId, +idx) !== '');
      const btn = row.querySelector('[data-confirm]');
      if (btn) btn.disabled = !(ok || hasSug);   // one-tap sigue disponible si hay sugerido
    });
  });

  // El check (o el hint "cumplí lo sugerido") confirman la serie por la misma vía.
  $$('[data-confirm], [data-sugconfirm]').forEach(btn => btn.addEventListener('click', () => {
    const attr = btn.getAttribute('data-confirm') || btn.getAttribute('data-sugconfirm');
    const [exId, idx] = attr.split('|');
    confirmarSerie(exId, +idx);
  }));

  // Selector de nivel/variante (ej: rueda abdominal). Solo cambia el nivel de las
  // series que se confirmen DESPUÉS; las ya cargadas conservan su nivel.
  $$('[data-variante]').forEach(btn => btn.addEventListener('click', () => {
    const raw = btn.getAttribute('data-variante');
    const i = raw.indexOf('|');
    const exId = raw.slice(0, i), op = raw.slice(i + 1);
    if (STATE.session[exId]) STATE.session[exId].variante = op;
    renderTrain();
  }));

  $$('[data-edit]').forEach(btn => btn.addEventListener('click', () => {
    const [exId, idx] = btn.getAttribute('data-edit').split('|');
    STATE.session[exId].sets[+idx].confirmed = false;
    STATE.session[exId].completed = false;
    if (getExStatus(exId) === 'completo') setExStatus(exId, 'pendiente');
    renderTrain();
  }));

  $$('[data-rir]').forEach(btn => btn.addEventListener('click', () => {
    const [exId, idx] = btn.getAttribute('data-rir').split('|');
    openRirPicker(exId, +idx);
  }));

  // Botón clásico (series todas confirmadas → completo)
  $$('[data-mark]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.getAttribute('data-mark');
    const exState = STATE.session[id];
    const allConfirmed = exState.sets.every(s => s.confirmed);
    if (!allConfirmed) return; // sólo funciona si todas las series están confirmadas
    setExStatus(id, 'completo');
    exState.completed = true;
    const all = DATA.dia.bloques.flatMap(b => b.ejercicios);
    const i = all.findIndex(e => e.id === id);
    const next = all.slice(i+1).find(e => getExStatus(e.id) === 'pendiente');
    if (next) STATE.expandedId = next.id;
    stopRest();
    renderTrain();
    if (!DATA._isDemo && checkIfDayCompleted()) {
      setTimeout(() => showDayCompletedModal(), 500);
    }
  }));

  // "Terminé este ejercicio" — sin datos, con confirmación si 0 series cargadas
  $$('[data-finish]').forEach(btn => btn.addEventListener('click', async () => {
    const id = btn.getAttribute('data-finish');
    const exState = STATE.session[id];
    const confirmedCount = exState.sets.filter(s => s.confirmed).length;
    let confirmed = true;
    if (confirmedCount === 0) {
      confirmed = await MyPump.ui.showConfirmModal({
        title: 'Terminaste sin cargar datos',
        body: 'No confirmaste ninguna serie. ¿Querés marcar este ejercicio como terminado de todas formas?',
        confirmLabel: 'Sí, terminé',
        cancelLabel: 'Volver',
      });
    }
    if (!confirmed) return;
    const newStatus = confirmedCount > 0 ? 'completo' : 'completo_sin_datos';
    // marcadoManualmente = true porque el botón fue presionado explícitamente
    await ensureSesionIniciada();
    setExStatus(id, newStatus, true);
    exState.completed = true;
    const all = DATA.dia.bloques.flatMap(b => b.ejercicios);
    const i = all.findIndex(e => e.id === id);
    const next = all.slice(i+1).find(e => getExStatus(e.id) === 'pendiente');
    if (next) STATE.expandedId = next.id;
    stopRest();
    renderTrain();
    if (!DATA._isDemo && checkIfDayCompleted()) {
      setTimeout(() => showDayCompletedModal(), 500);
    }
  }));

  // Reabrir un ejercicio ya completado
  $$('[data-reopen]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.getAttribute('data-reopen');
    setExStatus(id, 'pendiente');
    STATE.session[id].completed = false;
    renderTrain();
  }));

  $$('[data-acc]').forEach(btn => btn.addEventListener('click', () => {
    const tgt = $('#' + btn.getAttribute('data-acc'));
    if (!tgt) return;
    const open = !tgt.hasAttribute('hidden');
    if (open) tgt.setAttribute('hidden',''); else tgt.removeAttribute('hidden');
    btn.classList.toggle('is-open', !open);
  }));

  const fb = $('#finishBtn');
  if (fb) fb.addEventListener('click', openFinishModal);

  // Botón "Cerrar sesión" visible antes de que todo esté completo
  const efb = $('#earlyFinishBtn');
  if (efb) efb.addEventListener('click', openEarlyFinishModal);

  // Abrir modal de sustitución de ejercicio
  $$('[data-swap-ex]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    if (btn.disabled) return;
    const exId = btn.getAttribute('data-swap-ex');
    const ex = DATA.dia.bloques.flatMap(b => b.ejercicios).find(x => x.id === exId);
    if (ex) openExSwapModal(getEffectiveEx(ex));
  }));
  // Revertir sustitución de ejercicio (vuelve al original)
  $$('[data-revert-ex]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const exId = btn.getAttribute('data-revert-ex');
    delete STATE.exerciseSwaps[exId];
    persistExerciseSwaps();
    renderTrain();
  }));
}
