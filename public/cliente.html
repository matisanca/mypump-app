      ).join('')
    }</div>`;
  }

  // Calcular consumido y porcentaje del ring de kcal
  const consumido = calcularConsumido();
  const pctKcal = tg.kcal > 0 ? Math.min(100, (consumido.kcal / tg.kcal) * 100) : 0;
  // Ring SVG: circunferencia = 2 * PI * r (r=36) ≈ 226.19
  const RING_CIRC = 226.19;
  const ringOffset = RING_CIRC * (1 - pctKcal / 100);

  root.innerHTML = `
  ${tipoDiaHtml}
  <div class="diet-hdr">
    <div class="diet-hdr-top">
      <div class="kcal-ring">
        <svg viewBox="0 0 88 88">
          <circle class="track" cx="44" cy="44" r="36"/>
          <circle class="ring" cx="44" cy="44" r="36"
                  stroke-dasharray="${RING_CIRC.toFixed(2)}"
                  stroke-dashoffset="${ringOffset.toFixed(2)}"/>
        </svg>
        <div class="center"><span class="num">${Math.round(consumido.kcal).toLocaleString('es-AR')}</span><span class="lbl">/${tg.kcal}</span></div>
      </div>
      <div class="diet-info">
        <div class="eyebrow">DIETA · SEM ${DATA.rutina.semana_actual + (DATA.rutina.semana_offset || 0)}/${DATA.rutina.semanas_total + (DATA.rutina.semana_offset || 0)}</div>
        <h2>${tg.kcal} kcal objetivo</h2>
        <div class="target"><strong>${tg.prot}g</strong> prot · <strong>${tg.carb}g</strong> carb · <strong>${tg.fat}g</strong> gra</div>
      </div>
    </div>
    <div class="macros-row">
      ${renderMacroTarget('p','Proteína',tg.prot,'g')}
      ${renderMacroTarget('c','Carbs',tg.carb,'g')}
      ${renderMacroTarget('f','Grasa',tg.fat,'g')}
    </div>
    <div class="consumido-row">
      <div class="consumido-hdr">
        <span class="consumido-lbl">Consumido hoy</span>
        <span class="consumido-progreso">${consumido.nComidasMarcadas}/${consumido.nComidas} comidas</span>
      </div>
      <div class="consumido-bar">
        <div class="consumido-bar-fill" style="width:${pctKcal.toFixed(1)}%"></div>
      </div>
      <div class="consumido-macros">
        <strong>${Math.round(consumido.kcal)}</strong> / ${tg.kcal} kcal ·
        <strong>${Math.round(consumido.prot)}</strong>p ·
        <strong>${Math.round(consumido.carb)}</strong>c ·
        <strong>${Math.round(consumido.fat)}</strong>g
      </div>
    </div>
  </div>
  ${plan.comidas.map((c,i) => renderMeal(c,i)).join('')}`;
  bindDietEvents();
}

function renderMacroTarget(cls, label, target, unit) {
  return `
    <div class="macro ${cls}">
      <span class="lbl">${label}</span>
      <span class="val">${target}<small>${unit}</small></span>
    </div>`;
}

// ============================================================
// porcionReferencia(food) — referencia de porción casera (mano/objeto/unidades)
// para clientes que no usan balanza. Deriva la equivalencia de los gramos o
// unidades que ya trae el alimento. Devuelve un string (sin el prefijo "≈",
// que lo agrega la UI) o null si no hay match. 100% frontend, no toca backend.
// ============================================================
function porcionReferencia(food) {
  if (!food || typeof food !== 'object') return null;
  const norm = s => (s || '').toString().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
  const name = norm(food.name);
  if (!name) return null;
  const qty = Number(food.qty);
  if (!isFinite(qty) || qty <= 0) return null;
  const unitRaw = norm(food.unit);
  const unitGrams = Number(food.unitGrams);
  const GRAM_UNITS = ['g', 'gr', 'grs', 'gramo', 'gramos'];
  const ML_UNITS = ['ml', 'cc', 'mililitro', 'mililitros'];
  const isMl = ML_UNITS.includes(unitRaw);
  const isGram = unitRaw === '' || GRAM_UNITS.includes(unitRaw) || isMl;
  const UNIT_WORDS = ['u', 'un', 'uni', 'unid', 'unidad', 'unidades'];

  // helpers de formato
  const singular = w => {
    if (w.length > 4 && /ces$/.test(w)) return w.slice(0, -3) + 'z';
    if (w.length > 3 && /es$/.test(w))  return w.slice(0, -2);
    if (w.length > 3 && /s$/.test(w))   return w.slice(0, -1);
    return w;
  };
  const plural = w => /[aeiou]$/.test(w) ? w + 's' : w + 'es';
  const nStr = n => {
    n = Math.round(n * 2) / 2;
    const whole = Math.floor(n);
    const half = (n - whole) === 0.5;
    if (whole === 0) return '½';
    return half ? (whole + '½') : String(whole);
  };
  const fmtCount = (n, base) => {
    n = Math.round(n * 2) / 2;
    if (n <= 0) return null;
    const whole = Math.floor(n);
    const half = (n - whole) === 0.5;
    if (whole === 0) return '½ ' + base;
    if (half) return whole + '½ ' + plural(base);
    return whole + ' ' + (n === 1 ? base : plural(base));
  };
  const nounFromName = () => {
    const stop = new Set(['de', 'del', 'la', 'el', 'los', 'las', 'al', 'con', 'a', 'en', 'sin', 'y']);
    const tokens = name.split(/[\s/]+/).filter(t => t && !stop.has(t));
    return singular(tokens[0] || name);
  };

  // ---- Rama unidad (unit no gramo → qty ya es conteo; o spec: unitGrams) ----
  if (!isGram) {
    let n, base;
    if (unitGrams > 0 && qty > 20) {
      n = qty / unitGrams;
      base = (unitRaw && !UNIT_WORDS.includes(unitRaw)) ? singular(unitRaw) : nounFromName();
    } else if (UNIT_WORDS.includes(unitRaw)) {
      n = qty;
      base = nounFromName();
    } else {
      return null; // unidad ya casera (plato, taza…): no aporta info nueva
    }
    return fmtCount(n, base);
  }

  // ---- Rama gramos / ml ----
  const has = (...kw) => kw.some(k => name.includes(k));
  const g = qty;

  // Formateo de tazas en cuartos (¼ ½ ¾) — la medida de cocina más práctica.
  // Se usa SOLO para categorías que naturalmente se miden en taza (granos,
  // legumbres, yogur). El resto usa fmtCount (mitades: palmas, puños, cucharadas).
  const CUP_FRAC = { 0: '', 0.25: '¼', 0.5: '½', 0.75: '¾' };
  const fmtCup = (cups) => {
    cups = Math.round(cups * 4) / 4;
    if (cups <= 0) return null;
    const whole = Math.floor(cups);
    const frac = CUP_FRAC[cups - whole] || '';
    const num = whole === 0 ? frac : (whole + frac);
    return num + ' ' + (cups > 1 ? 'tazas' : 'taza');
  };

  // Mantequilla/crema de maní untable — cucharadas de 16 g (cdta ≈ 8 g).
  if (has('mani', 'cacahuate') && has('mantequilla', 'manteca', 'crema', 'pasta', 'untable')) {
    if (g < 8) return '1 cucharadita';
    return fmtCount(g / 16, 'cucharada');
  }
  // Aceite / manteca / líquidos — cucharada = 15 ml, cucharadita = 5 ml.
  if (isMl || has('aceite', 'oliva', 'ghee') || has('manteca', 'mantequilla')) {
    if (g < 7.5) return '1 cucharadita';
    return fmtCount(g / 15, 'cucharada');
  }
  // Frutos secos y semillas — puñado = 30 g (porción estándar).
  if (has('almendra', 'nuez', 'nueces', 'castana', 'avellana', 'pistacho', 'mani',
          'cacahuate', 'frutos secos', 'semilla', 'girasol', 'chia', 'lino', 'mix de')) {
    return fmtCount(g / 30, 'puñado');
  }
  // Proteína en polvo — scoop = 30 g.
  if (has('whey', 'proteina en polvo', 'caseina') || (has('proteina') && g <= 60)) {
    const scoops = Math.max(1, Math.round(g / 30));
    return scoops === 1 ? '1 scoop (1 medida)' : scoops + ' scoops';
  }
  if (has('atun')) {
    const n = g / 120;
    const frac = n - Math.floor(n);
    if (frac >= 0.75) return 'casi ' + Math.ceil(n) + ' latas';
    const nh = Math.round(n * 2) / 2;
    const whole = Math.floor(nh);
    if (nh - whole === 0.5) return whole >= 1 ? (whole + ' lata' + (whole > 1 ? 's' : '') + ' y media') : 'media lata';
    return whole + ' lata' + (whole > 1 ? 's' : '') + ' escurrida' + (whole > 1 ? 's' : '');
  }
  // Carnes y pescado — palma = 100 g COCIDO. Si el nombre dice "crudo/a",
  // se descuenta ~25 % de merma de cocción antes de convertir. Sin techo:
  // 300 g → "3 palmas" (antes colapsaba a "1 palma extra grande").
  if (has('pollo', 'pechuga', 'carne', 'nalga', 'bife', 'cerdo', 'lomo', 'pescado',
          'merluza', 'pavo', 'salmon', 'cuadril', 'cuadrada', 'peceto', 'asado',
          'bondiola', 'milanesa', 'tira', 'magra', 'roast', 'colita')) {
    const gCocido = has('crud') ? g * 0.75 : g;
    return fmtCount(gCocido / 100, 'palma');
  }
  // Granos. Avena en tazas secas (taza = 80 g). Arroz/fideos/quinoa: si vienen
  // "cocido" se miden directo (taza cocida ≈ 175 g); si vienen crudos se muestra
  // la taza cruda + su equivalente cocido con el ratio real de expansión.
  if (has('arroz', 'fideo', 'pasta', 'avena', 'quinoa', 'polenta', 'tallarin',
          'noqui', 'cuscus', 'couscous', 'trigo', 'mostacho', 'spaghetti', 'ravioli')) {
    if (has('avena')) return fmtCup(g / 80);
    const cocido = has('cocid', 'hervid', 'al dente');
    if (cocido) return fmtCup(g / 175);
    let ratio = 2.8, rawCup = 185;                 // arroz por defecto
    if (has('fideo', 'pasta', 'tallarin', 'noqui', 'mostacho', 'spaghetti', 'ravioli', 'cuscus', 'couscous')) { ratio = 2.4; rawCup = 100; }
    else if (has('quinoa')) { ratio = 2.6; rawCup = 170; }
    else if (has('polenta')) { ratio = 4; rawCup = 150; }
    const cruda = fmtCup(g / rawCup);
    const cocidaTaza = fmtCup((g * ratio) / 175);
    if (!cruda) return null;
    return cruda + ' en crudo (≈ ' + cocidaTaza + ' cocido)';
  }
  // Legumbres — taza cocida ≈ 190 g.
  if (has('lenteja', 'garbanzo', 'poroto', 'alubia', 'frijol', 'chaucha seca')) {
    return fmtCup(g / 190);
  }
  // Papa / batata — por tamaño real de verdulería, con múltiplos sin techo.
  if (has('papa', 'patata', 'batata', 'boniato') && !has('papaya')) {
    if (g < 110) return '1 chica';
    if (g <= 190) return '1 mediana';
    if (g <= 280) return '1 grande';
    const n = Math.max(2, Math.round(g / 160));
    return n + ' medianas';
  }
  if (has('lechuga', 'rucula', 'radicheta', 'escarola', 'hojas verdes', 'mix de hojas')) {
    return 'libre 🥗';
  }
  // Verduras — puño = 90 g (≈ 1 taza). Continuo, sin techo.
  if (has('brocoli', 'brecol', 'coliflor', 'calabaza', 'zapallo', 'zanahoria',
          'espinaca', 'morron', 'pimiento', 'berenjena', 'zucchini', 'zapallito',
          'repollo', 'remolacha', 'chaucha', 'cebolla', 'tomate', 'verdura')) {
    return fmtCount(g / 90, 'puño');
  }
  // Yogur / ricota / quesos untables — taza = 245 g. Se elimina "pote"
  // (ambiguo: 120-190 g según marca) a favor de la taza estándar.
  if (has('ricota', 'untable', 'yogur', 'yoghurt', 'queso blanco', 'queso crema',
          'cottage', 'requeson')) {
    return fmtCup(g / 245);
  }
  // Berries — puñado = 80 g. Continuo (140 g → "2 puñados", antes "1").
  if (has('frutilla', 'arandano', 'mora', 'frambuesa', 'frutos rojos', 'berries')) {
    return fmtCount(g / 80, 'puñado');
  }
  if (has('palta', 'aguacate')) {
    if (g <= 90) return 'media palta chica';
    if (g <= 160) return '1 palta';
    return nStr(g / 140) + ' paltas';
  }
  // Pan — rebanada = 30 g (unificado con UNIT_FOODS).
  if (has('pan') && !has('rallado')) {
    const n = Math.max(1, Math.round(g / 30));
    return n + ' rebanada' + (n > 1 ? 's' : '');
  }
  if (has('tostada')) {
    const per = has('arroz') ? 9 : 25;
    const n = Math.max(1, Math.round(g / per));
    return n + ' tostada' + (n > 1 ? 's' : '');
  }

  return null;
}

function renderFood(originalFood, comidaId, optIdx, foodIdx) {
  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  const swap = STATE.foodSwaps[key];
  const f = swap ? swap.current : originalFood;
  const isSwapped = !!swap;
  const cat = originalFood.category || inferFoodCategory(originalFood);
  const swappable = originalFood.swappable !== false && cat !== 'condimento';
  const porcion = porcionReferencia(f);
  const porcionId = `porcion_${comidaId}_${optIdx}_${foodIdx}`;
  const porcionPrefix = porcion && /^libre/.test(porcion) ? '' : '≈ ';

  return `
  <div class="food">
    <div class="food-info">
      <div class="food-name">${f.name}${isSwapped
        ? ` <span class="swap-badge" data-revert="${comidaId}|${optIdx}|${foodIdx}" title="Toca para volver al original">↔</span>`
        : ''}</div>
      <div class="food-qty">${f.qty} ${f.unit} · ${f.kcal} kcal</div>
      ${porcion
        ? `<div class="porcion-ref" id="${porcionId}" hidden>✋ ${porcionPrefix}${porcion}</div>`
        : ''}
    </div>
    <div class="food-macros">
      <span><strong>${f.prot}</strong>p</span>
      <span><strong>${f.carb}</strong>c</span>
      <span><strong>${f.fat}</strong>g</span>
      ${porcion
        ? `<button class="porcion-btn" data-porcion="${comidaId}|${optIdx}|${foodIdx}" aria-label="Ver porción casera" title="Ver porción casera">✋</button>`
        : ''}
      ${swappable
        ? `<button class="swap-btn" data-swap="${comidaId}|${optIdx}|${foodIdx}" title="Sustituir">↔</button>`
        : ''}
    </div>
  </div>`;
}

function renderMeal(c, idx) {
  const st = STATE.meals[c.id] || {selectedOpt:0};
  const optIdx = st.selectedOpt || 0;
  const opt = c.options[optIdx] || c.options[0];
  const displayFoods = opt.foods.map((f,fi) => getEffectiveFood(f, c.id, optIdx, fi));
  const tot = displayFoods.reduce((a,f) => ({
    kcal: a.kcal+(f.kcal||0), prot: a.prot+(f.prot||0),
    carb: a.carb+(f.carb||0), fat:  a.fat+(f.fat||0)
  }), {kcal:0,prot:0,carb:0,fat:0});
  const mealNum = idx !== undefined ? idx+1 : c.id.replace('c','');

  // Estado de tracking (comido/saltado/pendiente)
  const mark = STATE.comidasMarcadas[c.id];
  const estado = mark?.estado;
  const mealCls = 'meal' + (estado === 'comido' ? ' is-comido' : estado === 'saltado' ? ' is-saltado' : '');
  const badge = estado === 'comido'  ? ' <span class="meal-badge ok">✓</span>'
              : estado === 'saltado' ? ' <span class="meal-badge skip">✗</span>'
              : '';

  return `
  <div class="${mealCls}">
    <button class="meal-head" data-meal="${c.id}">
      <span class="meal-num">${mealNum}</span>
      <div class="meal-info">
        <div class="meal-name">${c.name}${badge}</div>
        <div class="meal-sub">opción ${opt.name} · ${opt.foods.length} alimentos</div>
      </div>
      <span class="meal-kcal">${Math.round(tot.kcal)}<small>kcal</small></span>
    </button>
    <div class="meal-track">
      <button class="track-btn track-yes${estado==='comido' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|comido"
              aria-label="Marcar como comido">✓ Comí</button>
      <button class="track-btn track-no${estado==='saltado' ? ' is-active' : ''}"
              data-comida-mark="${c.id}|saltado"
              aria-label="Marcar como saltado">✗ Salté</button>
    </div>
    <div class="meal-body">
      <div class="opt-tabs">
        ${c.options.map((o,i) =>
          `<button class="opt-tab${i===optIdx?' is-active':''}" data-opt="${c.id}|${i}">Opción ${o.name}</button>`
        ).join('')}
      </div>
      ${estado === 'comido'
        ? `<div class="comi-parte-hint">🍽️ Destildá lo que <b>no</b> comiste — solo se cuenta lo tildado.</div>`
        : ''}
      <div class="foods">
        ${opt.foods.map((f,fi) => {
          const foodHtml = renderFood(f, c.id, optIdx, fi);
          if (estado !== 'comido') return foodHtml;
          const excl = (mark.foodsExcluidos || []).includes(fi);
          return `<div class="food-comi-row${excl ? ' is-excluido' : ''}">
            <button class="food-comi-check" data-food-comido="${c.id}|${fi}" role="checkbox" aria-checked="${excl ? 'false' : 'true'}" aria-label="${excl ? 'No comido' : 'Comido'}">${excl ? '' : '✓'}</button>
            <div class="food-comi-body">${foodHtml}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="meal-totals">
        <span><span class="lbl">TOTAL</span></span>
        <span><strong>${Math.round(tot.kcal)}</strong> kcal · <strong>${Math.round(tot.prot)}</strong>p / <strong>${Math.round(tot.carb)}</strong>c / <strong>${Math.round(tot.fat)}</strong>g</span>
      </div>
    </div>
  </div>`;
}

function bindDietEvents() {
  // Selector tipo-día (Formato B)
  $$('[data-tipodía]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    STATE.activeTipoDia = btn.getAttribute('data-tipodía');
    localStorage.setItem('mypump_tipo_dia', STATE.activeTipoDia);
    STATE.meals = buildMeals();
    renderDiet();
  }));
  // Expand/collapse meal (sin acciones hijas)
  $$('[data-meal]').forEach(btn => btn.addEventListener('click', e => {
    if (e.target.closest('[data-opt]') || e.target.closest('[data-swap]') || e.target.closest('[data-revert]') || e.target.closest('[data-comida-mark]')) return;
    renderDiet();
  }));
  // Toggle "✓ Comí" / "✗ Salté" — no expande el meal
  $$('[data-comida-mark]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, accion] = btn.getAttribute('data-comida-mark').split('|');
    const current = STATE.comidasMarcadas[comidaId]?.estado;
    const nuevo = current === accion ? null : accion; // toggle: re-tap desmarca
    toggleComidaEstado(comidaId, nuevo);
  }));
  // Consumo parcial: incluir/excluir un alimento de una comida marcada "comido"
  $$('[data-food-comido]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, foodIdx] = btn.getAttribute('data-food-comido').split('|');
    toggleFoodComido(comidaId, +foodIdx);
  }));
  // Cambio de opción
  $$('[data-opt]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [id, idx] = btn.getAttribute('data-opt').split('|');
    STATE.meals[id].selectedOpt = +idx;
    renderDiet();
  }));
  // Toggle referencia de porción casera (inline, sin re-render — tap mobile)
  $$('[data-porcion]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = 'porcion_' + btn.getAttribute('data-porcion').replace(/\|/g, '_');
    const ref = document.getElementById(id);
    if (!ref) return;
    const show = ref.hasAttribute('hidden');
    if (show) ref.removeAttribute('hidden'); else ref.setAttribute('hidden', '');
    btn.classList.toggle('is-active', show);
  }));
  // Abrir modal swap
  $$('[data-swap]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-swap').split('|');
    const plan = getActivePlan();
    const comida = plan.comidas.find(c => c.id === comidaId);
    if (!comida) return;
    const food = comida.options[+optIdx]?.foods[+foodIdx];
    if (!food) return;
    openSwapModal(food, comidaId, +optIdx, +foodIdx);
  }));
  // Revertir swap — local + backend
  $$('[data-revert]').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const [comidaId, optIdx, foodIdx] = btn.getAttribute('data-revert').split('|');
    const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
    delete STATE.foodSwaps[key];
    persistSwaps();
    renderDiet();
    if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
      const res = await window.mypumpDB.deleteFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx);
      if (!res.success) console.warn('[swap] error borrando swap en backend:', res.error);
    }
  }));
}

// Hidrata foodSwaps + custom foods desde Supabase y re-renderiza la dieta.
// También migra los swaps de localStorage al backend la primera vez (one-shot).
async function hydrateSwapsAndCustomFoodsFromBackend() {
  try {
    // 0. Preferencias del cliente (restricciones alimentarias, ej: sin cerdo).
    //    El swap (app.js) lee window.MYPUMP_PREFS.excluir para esconder esos
    //    alimentos de las sugerencias. Invalidar el cache de sustitutos por las dudas.
    try {
      window.MYPUMP_PREFS = await window.mypumpDB.getClientePrefs(TOKEN);
    } catch (e) { window.MYPUMP_PREFS = { excluir: [], idioma: 'es' }; }
    if (typeof _swapCache !== 'undefined') { for (const k in _swapCache) delete _swapCache[k]; }

    // 1. Custom foods → agregar a MYPUMP_FOOD_DB
    const customs = await window.mypumpDB.getCustomFoods(TOKEN) || [];
    customs.forEach(cf => {
      const food = {
        name: cf.name,
        kcal: Number(cf.kcal),
        prot: Number(cf.prot),
        carb: Number(cf.carb),
        fat:  Number(cf.fat),
        unit: cf.unit,
        unitGrams: cf.unit_grams ? Number(cf.unit_grams) : undefined,
        category: cf.category,
        _isCustom: true,
      };
      const idx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === food.name.toLowerCase());
      if (idx >= 0) window.MYPUMP_FOOD_DB[idx] = food;
      else window.MYPUMP_FOOD_DB.push(food);
    });

    // 2. Food swaps remotos
    const remoteSwaps = await window.mypumpDB.getFoodSwaps(TOKEN, DIETA_ID) || [];

    if (remoteSwaps.length === 0 && Object.keys(STATE.foodSwaps).length > 0) {
      // Caso migración: hay swaps en localStorage pero ninguno en backend → subir los locales
      const promises = [];
      for (const [key, swap] of Object.entries(STATE.foodSwaps)) {
        if (!swap || !swap.current) continue;
        // key format: swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}
        const m = key.match(new RegExp(`^swap_${DIETA_ID}_(.+?)_(\\d+)_(\\d+)$`));
        if (!m) continue;
        const [, comidaId, optIdx, foodIdx] = m;
        promises.push(window.mypumpDB.saveFoodSwap(TOKEN, DIETA_ID, comidaId, +optIdx, +foodIdx, swap.current));
      }
      await Promise.allSettled(promises);
    } else if (remoteSwaps.length > 0) {
      // Backend es la fuente de verdad — sobrescribir STATE.foodSwaps
      const newSwaps = {};
      remoteSwaps.forEach(s => {
        const key = `swap_${DIETA_ID}_${s.comida_id}_${s.opt_idx}_${s.food_idx}`;
        newSwaps[key] = { original: null, current: s.food_data };
      });
      STATE.foodSwaps = newSwaps;
      persistSwaps(); // mantener cache local sincronizado
    }

    // Si estamos en la escena de dieta, re-renderizar para reflejar swaps/custom foods
    if (STATE.scene === 'diet') renderDiet();
  } catch (e) {
    console.warn('[init] hydrate swaps/custom foods error:', e);
  }
}

/* ---- PROGRESS SCENE ---- */
function renderProgress() {
  const root = $('#scene-progress');
  if (!STATE.progressLoaded) {
    root.innerHTML = `<div class="prog-empty">Cargando historial…</div>`;
    loadProgressAndRender();
    return;
  }
  const pd = STATE.progressData;
  let html = `<div class="prog-stats">`;
  for (const s of pd.stats) {
    html += `<div class="prog-stat"><span class="lbl">${s.lbl}</span><span class="val">${s.val}<small>${s.suffix||''}</small></span>${s.delta?`<span class="delta${s.delta.startsWith('-')?' neg':''}">${ICONS.trend} ${s.delta}</span>`:''}</div>`;
  }
  html += `</div>`;
  if (pd.exercises.length) {
    // Agrupar por día (preserva el orden de la rutina)
    const byDia = {};
    for (const ex of pd.exercises) { (byDia[ex.dia] = byDia[ex.dia] || []).push(ex); }
    for (const [dia, exs] of Object.entries(byDia)) {
      html += `<div class="prog-section-title"><span>${dia}</span><span class="meta">máx por sesión</span></div>`;
      for (const ex of exs) {
        html += `
        <button class="exer-row" data-detail="${ex.id}">
          <div class="info">
            <div class="name">${ex.name}</div>
            <div class="meta">Top: <strong>${ex.top}</strong></div>
          </div>
          ${sparkSVG(ex.series, 88, 36)}
          <div class="delta${ex.delta && ex.delta.startsWith('-') ? ' neg' : ''}">${ex.delta || '—'}</div>
        </button>`;
      }
    }
  } else {
    html += `<div class="prog-empty">Aún no hay historial registrado.<br>Empezá tu primera sesión para ver el progreso aquí.</div>`;
  }
  root.innerHTML = html;
  $$('[data-detail]').forEach(btn => btn.addEventListener('click', () => openDetail(btn.getAttribute('data-detail'))));
}

async function loadProgressAndRender() {
  // Recorrer TODOS los días de la rutina (no solo el día actual): el progreso
  // debe mostrar cada ejercicio que el cliente entrenó en cualquiera de sus días.
  const dias = DATA._dias || [DATA.dia];
  const allEx = [];
  const seen = new Set();
  for (const d of dias) {
    const diaNombre = (d.nombre || `Día ${getDayNum(d, dias)}`);
    for (const b of (d.bloques || [])) {
      for (const ex of (b.ejercicios || [])) {
        if (ex.tipo === 'calentamiento') continue;
        if (seen.has(ex.id)) continue;     // ids únicos por slot/día
        seen.add(ex.id);
        allEx.push({ id: ex.id, nombre: ex.nombre, dia: diaNombre });
      }
    }
  }

  const results = await Promise.all(
    allEx.map(ex => window.mypumpDB.getHistoricoEjercicio(TOKEN, ex.id, 24)
      .then(rows => ({ id: ex.id, name: ex.nombre, dia: ex.dia, rows: rows || [] }))
      .catch(() => ({ id: ex.id, name: ex.nombre, dia: ex.dia, rows: [] }))
    )
  );
  // Cache into DATA
  for (const r of results) DATA.historico_por_ejercicio[r.id] = r.rows;

  const exercises = results
    .filter(r => r.rows.length > 0)
    .map(r => {
      // Group by date, take max weight
      const byDate = {};
      for (const row of r.rows) {
        const date = (row.registrado_en || '').split('T')[0];
        if (!date) continue;
        if (byDate[date] === undefined || row.peso_kg > byDate[date]) byDate[date] = row.peso_kg;
      }
      // Ordenar por FECHA ascendente (las filas vienen DESC del backend) y
      // quedarse con las 8 sesiones MÁS RECIENTES. Así series[0]=más vieja y
      // series[último]=más nueva → el delta y la sparkline van en el sentido real.
      const series = Object.keys(byDate)
        .sort()                 // fechas ISO YYYY-MM-DD ordenan bien como string
        .slice(-8)              // 8 más recientes (antes tomaba las 8 más viejas)
        .map(date => byDate[date]);
      if (!series.length) return null;
      const topVal = Math.max(...series);
      const first = series[0], last = series[series.length-1];
      const delta = (series.length > 1 && first > 0) ? ((last-first)/first*100).toFixed(1) : null;
      return {
        id: r.id,
        name: r.name,
        dia: r.dia,
        series,
        top: `${topVal}kg`,
        delta: delta ? `${delta > 0 ? '+' : ''}${delta}%` : null,
        best: `${topVal}kg`,
      };
    }).filter(Boolean);

  // Sesiones entrenadas = fechas distintas con registros
  const fechas = new Set();
  for (const r of results) for (const row of r.rows) {
    const dt = (row.registrado_en || '').split('T')[0];
    if (dt) fechas.add(dt);
  }

  STATE.progressData = {
    stats: [
      {lbl:'Ejercicios',  val: exercises.length, suffix:'', delta:null},
      {lbl:'Sesiones',    val: fechas.size,      suffix:'', delta:null},
    ],
    exercises,
  };
  STATE.progressLoaded = true;
  renderProgress();
}

function sparkSVG(series, w, h) {
  const pad = 2;
  const min = Math.min(...series), max = Math.max(...series);
  const range = (max-min) || 1;
  const xStep = (w-pad*2) / Math.max(series.length-1, 1);
  const pts = series.map((v,i) => [pad+i*xStep, h-pad - ((v-min)/range)*(h-pad*2)]);
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${path} L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const last = pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <path d="${area}" fill="var(--color-brand-subtle)"/>
    <path d="${path}" fill="none" stroke="var(--color-brand)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.4" fill="var(--color-brand)" stroke="var(--color-bg-primary)" stroke-width="1.2"/>
  </svg>`;
}

/* ---- MI DÍA ---- */
function formatFechaLocal(isoDate) {
  // isoDate = 'YYYY-MM-DD'
  const [y, m, d] = isoDate.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

async function loadMyday() {
  if (!TOKEN) return;
  try {
    const [habitos, streak] = await Promise.all([
      window.mypumpDB.getHabitosDia(TOKEN, TODAY_LOCAL),
      window.mypumpDB.getStreak(TOKEN),
    ]);
    MYDAY  = habitos;
    STREAK = streak;
    STATE.mydayLoaded = true;
    // Si el tab ya está abierto, re-renderizar ahora que tenemos datos
    if (STATE.scene === 'myday') renderMyday();
  } catch(e) {
    console.error('[Mi Día] error cargando hábitos:', e);
    MYDAY  = null;
    STREAK = { streak: 0, ultimo_dia_valido: null };
    STATE.mydayLoaded = true;
    if (STATE.scene === 'myday') renderMyday();
  }
}

async function setHabito(campo, valor) {
  if (!TOKEN) return;
  const res = await window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, campo, valor);
  if (res.success && res.data && res.data.length > 0) {
    MYDAY = res.data[0];
    // Re-render solo las partes que cambiaron
    renderMyday();
    // Actualizar streak si fue un hábito que afecta streak
    if (['entrenamiento','comio_segun_plan','durmio_bien'].includes(campo)) {
      const streakData = await window.mypumpDB.getStreak(TOKEN);
      if (streakData) STREAK = streakData;
      renderMydayStreak();
    }
  }
}

function renderAguaGlasses(n) {
  let html = '';
  for (let i = 0; i < 12; i++) {
    html += `<span class="agua-glass${i < n ? '' : ' empty'}">💧</span>`;
  }
  return html;
}

let _aguaTimer = null;
function cambiarAgua(delta) {
  const current = MYDAY?.vasos_agua ?? 0;
  const next = Math.max(0, Math.min(12, current + delta));
  if (next === current) return;

  // Actualizar UI inmediatamente (optimistic)
  if (MYDAY) MYDAY.vasos_agua = next;
  else MYDAY = { vasos_agua: next };
  const numEl = $('#aguaNum');
  const glassEl = $('#aguaGlasses');
  if (numEl) numEl.textContent = next;
  if (glassEl) glassEl.innerHTML = renderAguaGlasses(next);

  // Debounce: guardar al servidor 600ms después del último clic
  clearTimeout(_aguaTimer);
  _aguaTimer = setTimeout(() => {
    window.mypumpDB.setHabito(TOKEN, TODAY_LOCAL, 'vasos_agua', String(next)).then(res => {
      if (res.success && res.data?.length > 0) MYDAY = res.data[0];
    });
  }, 600);
}

function renderAdhGrid(rows) {
  if (!rows || rows.length === 0) {
    return `<div style="padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:13px">Sin datos aún</div>`;
  }
  // rows ordenados más reciente primero (desde la RPC)
  // Necesitamos reversed para mostrar cronológicamente de izq a der
  const sorted = [...rows].reverse(); // más antiguo primero
  let html = '<div class="adh-grid">';
  sorted.forEach(row => {
    const isHoy = row.fecha === TODAY_LOCAL;
    let cls = 'adh-day vacio';
    if (row.es_valido) cls = 'adh-day valido';
    else if (row.entrenamiento || row.comio_segun_plan != null || row.durmio_bien != null) cls = 'adh-day parcial';
    if (isHoy) cls += ' hoy';
    const label = new Date(row.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    html += `<div class="${cls}" title="${label}"></div>`;
  });
  html += '</div>';
  // Leyenda
  const validos = rows.filter(r => r.es_valido).length;
  html += `<div style="padding:0 var(--space-4) var(--space-4);display:flex;gap:var(--space-3);font-size:12px;color:var(--color-text-muted);align-items:center">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-brand);display:inline-block;opacity:.85"></span> Día cumplido</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--color-bg-tertiary);border:1px solid var(--color-border);display:inline-block"></span> Sin datos</span>
    <span style="margin-left:auto;font-weight:600;color:var(--color-text-secondary)">${validos}/30</span>
  </div>`;
  return html;
}

function setScene(scene) {
  STATE.scene = scene;
  $$('.tab').forEach(t => {
    const active = t.getAttribute('data-scene') === scene;
    t.classList.toggle('is-active', active);
    t.setAttribute('aria-selected', active);
  });
  $$('.scene').forEach(s => s.classList.toggle('is-active', s.id === `scene-${scene}`));

  const dp = $('#dayPicker');
  const hp = $('#hdrProgress');

  if (scene === 'train') {
    updateDayHeader();
    if (dp) dp.hidden = (DATA._dias || []).length <= 1;
    if (hp) hp.hidden = false;
  } else if (scene === 'diet') {
    $('#hdrEyebrow').textContent = 'DIETA · HOY';
    $('#hdrTitle').textContent = 'Plan de alimentación';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  } else if (scene === 'myday') {
    $('#hdrEyebrow').textContent = 'HÁBITOS · HOY';
    $('#hdrTitle').textContent = 'Mi Día';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  } else {
    $('#hdrEyebrow').textContent = `PROGRESO · ${DATA.rutina.nombre_plan.split('—')[0].trim().toUpperCase()}`;
    $('#hdrTitle').textContent = 'Tu evolución';
    if (dp) dp.hidden = true;
    if (hp) hp.hidden = true;
  }

  if (scene === 'train') renderTrain();
  if (scene === 'diet') renderDiet();
  if (scene === 'myday') renderMyday();
  if (scene === 'progress') renderProgress();
  window.scrollTo(0, 0);
}

/* ---- INIT ---- */
async function init() {
  // Apply saved theme
  const savedTheme = localStorage.getItem('mypump-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.body.setAttribute('data-theme', savedTheme);

  if (!TOKEN) { showError('no-token'); return; }

  showLoading();
  window.mypumpDB.init();

  let info = await window.mypumpDB.getClienteInfo(TOKEN);
  let rutina, dieta;
  let _fromCache = false;
  if (info) {
    [rutina, dieta] = await Promise.all([
      window.mypumpDB.getRutinaActiva(TOKEN),
      window.mypumpDB.getDietaActiva(TOKEN),
    ]);
    // Guardar snapshot para modo offline (solo si trajo rutina real con estructura).
    if (rutina && rutina.estructura && rutina.estructura.dias) {
      saveOfflineSnapshot(info, rutina, dieta);
    }
  } else {
    // Distinguir: token inválido (sin error) vs servicio caído / sin conexión.
    const lastErr = window.mypumpDB._lastError;
    if (lastErr) {
      // Servicio caído o sin conexión (network down, 402 cuota, 503, etc.).
      // Antes de rendirse: intentar el último snapshot cacheado → modo offline.
      const snap = loadOfflineSnapshot();
      if (snap && snap.info && snap.rutina) {
        info = snap.info; rutina = snap.rutina; dieta = snap.dieta; _fromCache = true;
        console.warn('[init] offline → usando snapshot cacheado');
      } else {
        console.error('[init] Service error:', lastErr);
        showError('service-down', TOKEN.slice(0,8)+'…');
        return;
      }
    } else {
      // Sin error pero info=null → el token realmente no existe o está revocado
      showError('invalid', TOKEN.slice(0,8)+'…');
      return;
    }
  }

  // Build DATA
  if (rutina && rutina.estructura && rutina.estructura.dias) {
    RUTINA_ID = rutina.id;
    const est = rutina.estructura;
    const dia = getSuggestedDay(est.dias, rutina.id);
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil },
      rutina: {
        nombre_plan: est.nombre_plan || 'Mi plan',
        split: est.split || est.perfil?.split || '',
        semana_actual: rutina.semana_actual || 1,
        semanas_total: est.semanas_total || 1,
        // Macrociclo 2+: la semana se MUESTRA continuada (SEM 13/24) aunque
        // internamente el plan siga siendo 1-12. Solo afecta labels.
        semana_offset: Number(est.semana_offset) || 0,
        // Hay un bloque nuevo EN COLA (se activa al terminar el actual).
        tiene_siguiente: !!rutina.tiene_siguiente,
      },
      dia,
      historico_por_ejercicio: {},
      _dias: est.dias,
      _isDemo: false,
    };
    persistLastDay(dia.id, rutina.id); // persiste el día sugerido como punto de partida
  } else {
    // Demo fallback
    const dia = getSuggestedDay(SAMPLE_RUTINA.dias, 'demo');
    DATA = {
      cliente: { nombre: info.nombre, perfil: info.perfil },
      rutina: { ...SAMPLE_RUTINA, semana_actual: 1 },
      dia,
      historico_por_ejercicio: {},
      _dias: SAMPLE_RUTINA.dias,
      _isDemo: true,
    };
  }

  if (dieta && dieta.estructura && (dieta.estructura.comidas || dieta.estructura.tipos_dia)) {
    DIETA_ID = dieta.id;
    DIET = dieta.estructura;
  } else {
    DIET = SAMPLE_DIET;
  }

  // Restaurar tipo-día seleccionado (Formato B)
  if (DIET.tipos_dia && DIET.tipos_dia.length) {
    const savedTipo = localStorage.getItem('mypump_tipo_dia');
    STATE.activeTipoDia = (DIET.tipos_dia.find(t => t.id === savedTipo) || DIET.tipos_dia[0]).id;
  }

  STATE.meals = buildMeals();

  // Cargar swaps persistidos del localStorage (fast path; sirve como cache de lectura)
  STATE.foodSwaps = JSON.parse(
    localStorage.getItem(`mypump_food_swaps_${DIETA_ID||'demo'}`) || '{}'
  );

  // Hidratar foodSwaps + custom foods desde Supabase (multi-device + truth of source)
  // Es paralelo y no bloqueante; re-renderiza la dieta cuando termina.
  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    hydrateSwapsAndCustomFoodsFromBackend();
  }

  // Swaps de ejercicio (visual/por-sesión) desde localStorage.
  STATE.exerciseSwaps = JSON.parse(
    localStorage.getItem(`mypump_exercise_swaps_${RUTINA_ID||'demo'}`) || '{}'
  );

  // Catálogo de ejercicios en memoria: cache local sincrónico + refresh async.
  window.MYPUMP_EJERCICIO_DB = window.MYPUMP_EJERCICIO_DB || [];
  hydrateEjercicioDBFromCache();
  if (!(DATA && DATA._isDemo)) loadEjercicioCatalogo();   // no bloqueante

  // Comentarios coach ↔ cliente (para badges + secciones). No bloqueante.
  if (!(DATA && DATA._isDemo)) loadComentarios();

  STATE.session = buildSession();
  prefetchHistoricoDia();

  // Restaurar la sesión del día (estados + series + si el día ya fue cerrado).
  // Reconecta con la sesión real aunque localStorage esté vacío (cambio de
  // dispositivo, incógnito, cache limpio, retroceso de semana).
  await restoreSesionDelDia();

  // Update header initial state (con offset de macrociclo: "SEM 13/24")
  const _wOff = DATA.rutina.semana_offset || 0;
  $('#hdrWeek').textContent = DATA.rutina.semana_actual + _wOff;
  $('#hdrWeekTotal').textContent = DATA.rutina.semanas_total + _wOff;
  updateDayHeader();

  DATA._offline = _fromCache;   // arrancó desde snapshot cacheado (sin conexión)

  showApp();
  renderDayPicker();
  renderTrain();
  renderDiet();
  updateOfflineBanner();
  // Mi Día y Progress cargan de forma lazy cuando se abre el tab
  loadMyday(); // inicia en background; cuando termina, STATE.mydayLoaded = true
  // Tracking de comidas del día — en background, re-renderiza si la scene es 'diet'
  loadComidasMarcadas();

  // Outbox: cargar escrituras pendientes de sesiones anteriores y drenarlas.
  if (OUTBOX_ENABLED && !(DATA && DATA._isDemo)) {
    Outbox.load();
    if (Outbox.pending() > 0) Outbox.flushSoon(1500);   // esperar a que asiente el arranque
  }
}

/* ---- OFFLINE: snapshot de datos + banner (R3) ---- */
// Guarda el último cliente/rutina/dieta que trajo el backend, para poder abrir
// la app sin conexión (el gym con mala señal). Junto al service worker (sw.js)
// que cachea el código, esto hace la app usable 100% offline.
function saveOfflineSnapshot(info, rutina, dieta) {
  try {
    localStorage.setItem(`mypump_offline_${TOKEN}`, JSON.stringify({ info, rutina, dieta, ts: Date.now() }));
  } catch (_) {}
}
function loadOfflineSnapshot() {
  try { return JSON.parse(localStorage.getItem(`mypump_offline_${TOKEN}`) || 'null'); }
  catch (_) { return null; }
}
function updateOfflineBanner() {
  const offline = !navigator.onLine || (DATA && DATA._offline);
  let el = document.getElementById('offline-banner');
  if (offline) {
    if (!el) { el = document.createElement('div'); el.id = 'offline-banner'; document.body.appendChild(el); }
    el.textContent = (DATA && DATA._offline)
      ? '⚡ Sin conexión — mostrando tu última rutina guardada. Lo que cargues se sincroniza al volver.'
      : '⚡ Sin conexión — lo que cargues se guarda y se sincroniza al volver.';
    el.classList.add('show');
  } else if (el) {
    el.classList.remove('show');
    // Volvió la conexión: si habíamos arrancado de cache, ya no lo estamos.
    if (DATA) DATA._offline = false;
  }
}
window.addEventListener('online',  updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

const _swapCache = {};

function openSwapModal(food, comidaId, optIdx, foodIdx) {

// Card de un sustituto. data-sub usa el índice en allSubs (no en la lista
// mostrada) para que selectSwapCard/confirmSwap sigan funcionando tras agrupar/filtrar.
function _swapCardHtml(s, allSubs, food) {
  const origIdx = allSubs.indexOf(s);
  const origKcal = food.kcal;
  const kcalDiff = origKcal > 0 ? Math.round((s.kcal - origKcal) / origKcal * 100) : 0;
  const sign = kcalDiff > 0 ? '+' : '';
  const dCls = Math.abs(kcalDiff) <= 5 ? 'ok' : 'warn';
  const customBadge = s._isCustom ? '<span class="swap-custom-badge">★ Personalizado</span>' : '';
  const uniBadge = s._universal ? '<span class="swap-uni-badge" style="margin-left:6px">🌍</span>' : '';
  const enLabel = s._en ? `<div class="swap-card-en" style="font-size:11px;color:var(--color-text-muted);margin-top:1px">${s._en}</div>` : '';
  return `<div class="swap-card${origIdx===_swapState.selected?' is-selected':''}" data-sub="${origIdx}" onclick="selectSwapCard(this,${origIdx})">
    <div class="swap-card-info">
      <div class="swap-card-name">${s.name}${uniBadge}${customBadge}</div>
      ${enLabel}
      <div class="swap-card-qty">${s.qty} ${s.unit}</div>
      <div class="swap-card-macros">${s.kcal} kcal · ${s.prot}p / ${s.carb}c / ${s.fat}g</div>
    </div>
    <span class="swap-delta ${dCls}">${sign}${kcalDiff}%</span>
  </div>`;
}

// Lista de sustitutos agrupada: universales (disponibles en cualquier país)
// arriba, el resto debajo. Todo dentro de un único wrapper para el re-render parcial.
function _swapListHtml(subs, allSubs, food, query) {
  if (!subs.length) {
    return `<div class="swap-empty">${query
      ? `Sin resultados para "${query}". Probá crear tu alimento personalizado.`
      : 'No hay sustitutos equivalentes disponibles dentro del rango de macros.'}</div>`;
  }
  const uni  = subs.filter(s => s._universal);
  const rest = subs.filter(s => !s._universal);
  let html = '';
  if (uni.length) {
    html += `<div class="swap-subs-title">🌍 Disponibles en cualquier país</div>`;
    html += `<div class="swap-list">${uni.map(s => _swapCardHtml(s, allSubs, food)).join('')}</div>`;
  }
  if (rest.length) {
    if (uni.length) html += `<div class="swap-subs-title">Otras opciones</div>`;
    html += `<div class="swap-list">${rest.map(s => _swapCardHtml(s, allSubs, food)).join('')}</div>`;
  }
  return html;
}

function renderSwapModal() {
  const { original: food, query } = _swapState;
  const cat = food.category || inferFoodCategory(food);
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  // Si el cache está vacío para este key (ej: tras crear un custom food
  // que invalida el cache anterior), recomputar acá en vez de mostrar lista vacía.
  if (!_swapCache[cacheKey]) {
    _swapCache[cacheKey] = window.MyPump
      ? window.MyPump.foodSwap.findSubstitutes(food)
      : [];
  }
  const allSubs = _swapCache[cacheKey] || [];

  // Filtro por query (búsqueda libre por nombre)
  const subs = query
    ? allSubs.filter(s => s.name.toLowerCase().includes(query.toLowerCase().trim()))
    : allSubs;

  $('#modalHost').innerHTML = `
  <div class="modal-back" id="swapModalBack">
    <div class="modal-sheet swap-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Sustituir alimento</div>
      <div class="swap-original">
        <div class="sw-name">${food.name}</div>
        <div class="sw-meta">${food.qty} ${food.unit} · ${food.kcal} kcal · ${food.prot}p / ${food.carb}c / ${food.fat}g</div>
      </div>
      <div class="swap-search-row">
        <input type="text" id="swapSearch" class="swap-search" placeholder="Buscar alimento..." value="${query.replace(/"/g,'&quot;')}" />
        <span class="swap-count">${subs.length}/${allSubs.length}</span>
      </div>

      <div class="swap-help" style="font-size:12px;color:var(--color-text-muted);margin:0 0 8px;line-height:1.4">¿No conseguís este alimento? Elegí una opción 🌍 disponible en cualquier país.</div>
      <div id="swapListWrap">${_swapListHtml(subs, allSubs, food, query)}</div>

  const search = $('#swapSearch');
  if (search) {

// Re-render parcial solo de la lista de sustitutos (evita perder el foco del input)
function _swapRenderListOnly() {
  const { original: food, query } = _swapState;
  const cat = food.category || inferFoodCategory(food);
  const cacheKey = `${food.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  if (!_swapCache[cacheKey]) {
    _swapCache[cacheKey] = window.MyPump
      ? window.MyPump.foodSwap.findSubstitutes(food)
      : [];
  }
  const allSubs = _swapCache[cacheKey] || [];
  const subs = query
    ? allSubs.filter(s => s.name.toLowerCase().includes(query.toLowerCase().trim()))
    : allSubs;

  const wrap = $('#swapListWrap');
  if (wrap) wrap.innerHTML = _swapListHtml(subs, allSubs, food, query);

function selectSwapCard(el, idx) {
  $$('.swap-card').forEach(c => c.classList.remove('is-selected'));
  el.classList.add('is-selected');
  _swapState.selected = idx;
  const btn = $('#swapConfirmBtn');
  if (btn) btn.disabled = false;
}

function closeSwapModal() {
  $('#modalHost').innerHTML = '';
  _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
}

async function confirmSwap() {
  if (_swapState.selected === null) return;
  const { comidaId, optIdx, foodIdx, original } = _swapState;
  const cat = original.category || inferFoodCategory(original);
  const cacheKey = `${original.name}__${cat}__${(window.MYPUMP_FOOD_DB||[]).length}`;
  const subs = _swapCache[cacheKey] || [];
  const sub = subs[_swapState.selected];
  if (!sub) return;

  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  STATE.foodSwaps[key] = { original, current: sub };
  persistSwaps();
  closeSwapModal();
  renderDiet();

  // Persistir en backend vía Outbox (reintenta si falla la red). Demo: solo local.
  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    Outbox.enqueue('swap', { dietaId: DIETA_ID, comidaId, optIdx: +optIdx, foodIdx: +foodIdx, food: sub },
      `swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}`);
  }
}

  const kcal = parseFloat($('#cfKcal').value);
  const prot = parseFloat($('#cfProt').value);
  const carb = parseFloat($('#cfCarb').value);
  const fat  = parseFloat($('#cfFat').value);
  const unit = $('#cfUnit').value;
  const unitGramsRaw = $('#cfUnitGrams') ? $('#cfUnitGrams').value : '';
  const unitGrams = (unit === 'g' || unit === 'ml') ? null : parseFloat(unitGramsRaw);
  const category = $('#cfCategory').value;

  const errEl = $('#cfErr');
  function showErr(msg) { if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } }

  if (!name) { showErr('El nombre es obligatorio.'); return; }
  if (!(kcal >= 0) || !(prot >= 0) || !(carb >= 0) || !(fat >= 0)) {
    showErr('Los macros deben ser números válidos (≥ 0).'); return;
  }
  if (unit !== 'g' && unit !== 'ml' && (!unitGrams || unitGrams <= 0)) {
    showErr(`Para "${unit}" tenés que indicar gramos por unidad.`); return;
  }

  const foodData = {
    name, kcal, prot, carb, fat, unit,
    unitGrams: unitGrams || undefined,
    category,
  };

  // Demo / sin token: agregar solo en memoria
  if (!TOKEN || (DATA && DATA._isDemo)) {
    const localFood = { ...foodData, _isCustom: true };
    if (!window.MYPUMP_FOOD_DB.find(f => f.name.toLowerCase() === name.toLowerCase())) {
      window.MYPUMP_FOOD_DB.push(localFood);
    }
    _invalidateSwapCache();
    await aplicarCustomFoodComoSwap(name);
    return;
  }

  // Backend
  const res = await window.mypumpDB.createCustomFood(TOKEN, foodData);
  if (!res.success) {
    showErr(res.error || 'No se pudo crear el alimento. Probá de nuevo.');
    return;
  }
  // Agregar a la DB local para que aparezca en los sustitutos
  const created = res.data && res.data[0];
  if (created) {
    const localFood = {
      name: created.name,
      kcal: Number(created.kcal),
      prot: Number(created.prot),
      carb: Number(created.carb),
      fat:  Number(created.fat),
      unit: created.unit,
      unitGrams: created.unit_grams ? Number(created.unit_grams) : undefined,
      category: created.category,
      _isCustom: true,
    };
    const existingIdx = window.MYPUMP_FOOD_DB.findIndex(f => f.name.toLowerCase() === localFood.name.toLowerCase());
    if (existingIdx >= 0) window.MYPUMP_FOOD_DB[existingIdx] = localFood;
    else window.MYPUMP_FOOD_DB.push(localFood);
  }
  _invalidateSwapCache();
  // "Crear y usar" → aplicarlo de una como sustituto de la comida (antes solo lo
  // agregaba a la lista; si el cliente no lo seleccionaba + Sustituir, no quedaba
  // aplicado y al recargar la comida volvía al original → "desaparecía").
  await aplicarCustomFoodComoSwap(name);
}

// Aplica el custom food recién creado como sustituto del alimento del swap actual
// (persiste local + backend) y muestra la dieta. Replica el flujo de confirmSwap.
async function aplicarCustomFoodComoSwap(name) {
  const orig = _swapState.original;
  if (!orig || _swapState.comidaId == null) { closeCustomFoodModal(); return; }
  const subs = window.MyPump.foodSwap.findSubstitutes(orig) || [];
  const sub  = subs.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (!sub) { closeCustomFoodModal(); return; }  // fallback: queda en la lista para elegir

  const { comidaId, optIdx, foodIdx } = _swapState;
  const key = `swap_${DIETA_ID||'demo'}_${comidaId}_${optIdx}_${foodIdx}`;
  STATE.foodSwaps[key] = { original: orig, current: sub };
  persistSwaps();
  $('#modalHost').innerHTML = '';
  _swapState = { comidaId:null, optIdx:null, foodIdx:null, original:null, selected:null, query:'' };
  renderDiet();

  if (DIETA_ID && TOKEN && !(DATA && DATA._isDemo)) {
    Outbox.enqueue('swap', { dietaId: DIETA_ID, comidaId, optIdx: +optIdx, foodIdx: +foodIdx, food: sub },
      `swap_${DIETA_ID}_${comidaId}_${optIdx}_${foodIdx}`);
  }
}

function _invalidateSwapCache() {
  for (const k of Object.keys(_swapCache)) delete _swapCache[k];
}

/* ---- PWA: AGREGAR A PANTALLA DE INICIO ----
 * Detecta plataforma (Android Chrome vs iOS Safari) y muestra un prompt
 * para instalar la app como PWA. Una vez instalada (display: standalone)
 * o dismissed, no vuelve a aparecer (persiste en localStorage).
 *
 * Android Chrome: usa el evento beforeinstallprompt → prompt nativo.
 * iOS Safari: NO tiene API de instalación, muestra instrucciones manuales
 * (Compartir → Agregar a pantalla de inicio).
 */
(function setupA2HS() {
  // Si ya está corriendo como PWA instalada, no hacer nada
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  if (isStandalone) return;

  // Si el usuario ya respondió (instalado o dismissed), no volver a mostrar
  const A2HS_KEY = 'mypump_a2hs_v1';
  const stored = localStorage.getItem(A2HS_KEY);
  if (stored === 'installed' || stored === 'dismissed') return;

  // Detección de plataforma
  const ua = navigator.userAgent || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/i.test(ua);
  const isSafariIOS = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);

  let deferredPrompt = null;

  // Android Chrome: capturar el evento para disparar el prompt nativo on-demand
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar nuestro banner; el click llama deferredPrompt.prompt()
    setTimeout(showA2HSBanner, 1500);
  });

  // Si ya está instalada (Chrome dispara 'appinstalled')
  window.addEventListener('appinstalled', () => {
    localStorage.setItem(A2HS_KEY, 'installed');
    closeA2HSBanner();
  });

  // En iOS, no hay beforeinstallprompt — mostrar banner manual después del load
  if (isSafariIOS) {
    // Esperar a que la app cargue completamente para no interrumpir
    setTimeout(() => {
      if (localStorage.getItem(A2HS_KEY)) return; // por las dudas
      showA2HSBanner();
    }, 4000);
  }

  function showA2HSBanner() {
    if (document.getElementById('a2hsBanner')) return; // ya está visible
    const banner = document.createElement('div');
    banner.id = 'a2hsBanner';
    banner.className = 'a2hs-banner';

    if (isSafariIOS) {
      // iOS: instrucciones manuales con icono de Share
      banner.innerHTML = `
        <button class="a2hs-close" id="a2hsClose" aria-label="Cerrar">×</button>
        <div class="a2hs-icon">
          <svg viewBox="0 0 512 512" width="44" height="44">
            <rect width="512" height="512" rx="96" fill="#10b981"/>
            <g fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 110 195 C 130 165, 175 145, 210 150 L 256 178 L 302 150 C 337 145, 382 165, 402 195 L 402 250 C 395 270, 380 280, 365 282 L 350 282 L 340 320 L 350 360 L 332 405 L 296 432 L 256 442 L 216 432 L 180 405 L 162 360 L 172 320 L 162 282 L 147 282 C 132 280, 117 270, 110 250 Z"/>
              <path d="M 210 195 C 195 215, 195 245, 220 265 L 250 275"/>
              <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275"/>
              <line x1="256" y1="282" x2="256" y2="405"/>
              <line x1="200" y1="312" x2="312" y2="312"/>
              <line x1="195" y1="348" x2="317" y2="348"/>
              <line x1="190" y1="385" x2="322" y2="385"/>
            </g>
          </svg>
        </div>
        <div class="a2hs-body">
          <div class="a2hs-title">Tenela como app en tu inicio</div>
          <div class="a2hs-text">
            Tocá
            <svg class="a2hs-share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13"/><path d="m6 8 6-6 6 6"/><rect x="4" y="14" width="16" height="8" rx="2"/></svg>
            <strong>Compartir</strong> abajo y elegí <strong>Pantalla de Inicio</strong>.
          </div>
        </div>`;
    } else {
      // Android Chrome (o navegador con beforeinstallprompt soportado)
      banner.innerHTML = `
        <button class="a2hs-close" id="a2hsClose" aria-label="Cerrar">×</button>
        <div class="a2hs-icon">
          <svg viewBox="0 0 512 512" width="44" height="44">
            <rect width="512" height="512" rx="96" fill="#10b981"/>
            <g fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 110 195 C 130 165, 175 145, 210 150 L 256 178 L 302 150 C 337 145, 382 165, 402 195 L 402 250 C 395 270, 380 280, 365 282 L 350 282 L 340 320 L 350 360 L 332 405 L 296 432 L 256 442 L 216 432 L 180 405 L 162 360 L 172 320 L 162 282 L 147 282 C 132 280, 117 270, 110 250 Z"/>
              <path d="M 210 195 C 195 215, 195 245, 220 265 L 250 275"/>
              <path d="M 302 195 C 317 215, 317 245, 292 265 L 262 275"/>
              <line x1="256" y1="282" x2="256" y2="405"/>
              <line x1="200" y1="312" x2="312" y2="312"/>
              <line x1="195" y1="348" x2="317" y2="348"/>
              <line x1="190" y1="385" x2="322" y2="385"/>
            </g>
          </svg>
        </div>
        <div class="a2hs-body">
          <div class="a2hs-title">Instalá MyPump como app</div>
          <div class="a2hs-text">Tenela en tu inicio y abrila como una app, sin el navegador.</div>
        </div>
        <button class="a2hs-install" id="a2hsInstall">Instalar</button>`;
    }

    document.body.appendChild(banner);
    // Animación de entrada
    requestAnimationFrame(() => banner.classList.add('is-open'));

    // Eventos
    document.getElementById('a2hsClose').addEventListener('click', () => {
      localStorage.setItem(A2HS_KEY, 'dismissed');
      closeA2HSBanner();
    });

    const installBtn = document.getElementById('a2hsInstall');
    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) { closeA2HSBanner(); return; }
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') localStorage.setItem(A2HS_KEY, 'installed');
        else localStorage.setItem(A2HS_KEY, 'dismissed');
        deferredPrompt = null;
        closeA2HSBanner();
      });
    }
  }

  function closeA2HSBanner() {
    const b = document.getElementById('a2hsBanner');
    if (!b) return;
    b.classList.remove('is-open');
    setTimeout(() => b.remove(), 250);
  }
})();

/* ---- MANIFEST DINÁMICO ----
 * Si tenemos un TOKEN válido, generamos un manifest blob con el token
 * inyectado en start_url. Así cuando el cliente haga "Agregar a Inicio"
 * en iOS Safari (que respeta el start_url del manifest), el ícono
 * guardado abre /cliente.html?t=TOKEN directamente — sin depender de
 * localStorage que iOS aísla entre Safari y el contexto standalone PWA.
 *
 * Si no hay token, dejamos el manifest estático tal cual.
 */
(function injectDynamicManifest() {
  if (!TOKEN) return;
  try {
    const link = document.querySelector('link[rel="manifest"]');
    if (!link) return;
    // Construir manifest con start_url personalizado
    const manifest = {
      "name": "MyPump — Pump Team",
      "short_name": "MyPump",
      "description": "Tu sector dentro del team. Rutina, dieta y tracking diario.",
      "start_url": "/cliente.html?t=" + encodeURIComponent(TOKEN),
      "scope": "/",
      "display": "standalone",
      "orientation": "portrait",
      "background_color": "#ffffff",
      "theme_color": "#10b981",
      "lang": "es",
      "categories": ["health", "fitness", "lifestyle"],
      "icons": [
        { "src": "/icons/logo.svg?v=3",    "sizes": "any",      "type": "image/svg+xml", "purpose": "any" },
        { "src": "/icons/icon-192.png?v=3","sizes": "192x192",  "type": "image/png",     "purpose": "any maskable" },
        { "src": "/icons/icon-512.png?v=3","sizes": "512x512",  "type": "image/png",     "purpose": "any maskable" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    link.href = URL.createObjectURL(blob);
  } catch(e) { /* sin manifest dinámico, fallback al estático */ }
})();

init();

// Service Worker — offline real (R3). Registro no bloqueante; si falla, la app
// sigue funcionando normal (solo pierde el offline). En localhost por http se
// permite; en producción CF Pages es https.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((e) => console.warn('[sw] no registró:', e));
  });
}
</script>
