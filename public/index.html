<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MyPump — Tu sector dentro del team.">
  <title>MyPump — Pump Team</title>

  <!-- PWA — Add to Home Screen -->
  <link rel="manifest" href="/manifest.json?v=3">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyPump">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">

  <style>
    /* Layout de landing — no va en components.css porque es específico de esta página */
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .landing-header {
      padding: var(--space-4) var(--space-5);
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-bg-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      transition:
        background var(--transition-fast),
        border-color var(--transition-fast),
        color var(--transition-fast);
    }

    .theme-toggle:hover {
      background: var(--color-bg-tertiary);
      color: var(--color-text-primary);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Muestra sol en dark, luna en light */
    .icon-sun  { display: none; }
    .icon-moon { display: block; }
    [data-theme="dark"] .icon-sun  { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    /* Zona central */
    .landing-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-5);
      text-align: center;
    }

    /* Logo placeholder — reemplazar con SVG real del logo de Pump Team */
    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      background: var(--color-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-md);
    }

    .logo-wrap svg {
      width: 40px;
      height: 40px;
      color: var(--color-on-brand);
    }

    .landing-title {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.025em;
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }

    .landing-subtitle {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3);
    }

    .landing-body {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      max-width: 280px;
      line-height: var(--line-height-relaxed);
      margin-bottom: var(--space-8);
    }

    /* Botón secundario (outlined) */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      text-decoration: none;
      cursor: pointer;
      transition:
        background var(--transition-fast),
        border-color var(--transition-fast);
    }

    .btn-secondary:hover {
      background: var(--color-bg-tertiary);
      border-color: var(--color-text-muted);
      opacity: 1;
    }

    .btn-secondary svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .landing-footer {
      padding: var(--space-5);
      text-align: center;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }
  </style>
</head>

<body>
  <header class="landing-header">
    <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
      <!-- Sol (visible en dark mode) -->
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Luna (visible en light mode) -->
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main class="landing-main">
    <!-- Logo placeholder — sustituir por <img src="/assets/logo.svg"> cuando esté listo -->
    <div class="logo-wrap" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="20" cy="20" r="6"/>
        <line x1="20" y1="6" x2="20" y2="11"/>
        <line x1="20" y1="29" x2="20" y2="34"/>
        <line x1="6" y1="20" x2="11" y2="20"/>
        <line x1="29" y1="20" x2="34" y2="20"/>
        <line x1="10.1" y1="10.1" x2="13.5" y2="13.5"/>
        <line x1="26.5" y1="26.5" x2="29.9" y2="29.9"/>
        <line x1="29.9" y1="10.1" x2="26.5" y2="13.5"/>
        <line x1="13.5" y1="26.5" x2="10.1" y2="29.9"/>
      </svg>
    </div>

    <h1 class="landing-title">MyPump</h1>
    <p class="landing-subtitle">Tu sector dentro del team.</p>
    <p class="landing-body">Si Mati te compartió un link, abrilo desde ahí.</p>

    <a
      href="https://mypumpteam.com"
      class="btn-secondary"
      target="_blank"
      rel="noopener noreferrer"
    >
      <!-- Ícono de flecha externa -->
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 2H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/>
        <path d="M8 1h5v5"/>
        <path d="M13 1 7 7"/>
      </svg>
      Ir a Pump Team
    </a>
  </main>

  <footer class="landing-footer">
    &copy; Pump Team 2026
  </footer>

  <script src="/js/theme.js"></script>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      window.mypumpTheme.toggle();
    });
  </script>

  <!-- Detección de token + redirección a la app del cliente.
       1. ?t=TOKEN en URL → redirige con token (caso link del coach)
       2. Token previamente guardado en localStorage → redirige sin token
          (caso PWA "Agregar a inicio" en iOS, donde la URL pierde ?t=).
          cliente.html va a recuperar el token desde localStorage. -->
  <script>
    (function () {
      var TOKEN_KEY = 'mypump_token';
      var TOKEN_RE = /^[a-zA-Z0-9_-]{16,64}$/;

      var params = new URLSearchParams(window.location.search);
      var token = params.get('t');
      if (token && TOKEN_RE.test(token)) {
        try { localStorage.setItem(TOKEN_KEY, token); } catch(e) {}
        window.location.replace('/cliente.html?t=' + encodeURIComponent(token));
        return;
      }

      // Sin token en URL, pero hay uno guardado → ir a cliente.html (lee de localStorage)
      try {
        var stored = localStorage.getItem(TOKEN_KEY);
        if (stored && TOKEN_RE.test(stored)) {
          window.location.replace('/cliente.html');
          return;
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
