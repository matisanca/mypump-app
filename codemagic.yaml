# =============================================================
# codemagic.yaml — Build iOS en la nube (sin tocar Xcode ni la terminal)
#
# Compila la app Capacitor, la FIRMA sola (App Store Connect API key →
# "automatic code signing" de Codemagic, sin certificados a mano) y la sube a
# TestFlight. Corre en las Mac de Codemagic (ellos tienen Xcode).
#
# SOLO corre cuando Apple ya aceptó tu cuenta Developer. Pasos de una-sola-vez
# en la UI de Codemagic (ver docs/IOS_CLOUD_BUILD.md):
#   1. Crear cuenta en codemagic.io (gratis) y conectar este repo de GitHub.
#   2. Integrations → App Store Connect → subir una API key (la generás en
#      App Store Connect → Users and Access → Integrations). Nombrala como el
#      valor de `app_store_connect` de abajo: "PumpTeam_ASC".
#   3. Start build. (El APP_STORE_APPLE_ID ya esta cargado: 6793259380.)
# =============================================================
workflows:
  ios-testflight:
    name: MyPump iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Nombre de la API key de App Store Connect que cargás en Codemagic UI.
      app_store_connect: PumpTeam_ASC

    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.pumpteam.mypump"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Apple ID numerico de la app (App Store Connect). Ya seteado.
        APP_STORE_APPLE_ID: "6793259380"

    scripts:
      - name: Instalar dependencias (npm)
        script: npm ci
      - name: Capacitor sync iOS
        script: npx cap sync ios
      - name: Resolver Swift Packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
      - name: Configurar firma (crea certificado + perfil si no existen)
        script: |
          keychain initialize
          # Cuenta nueva sin certificados: crear el certificado de distribución
          # (genera la clave privada localmente). El || true evita fallar si ya
          # existe / se llega al límite de Apple.
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save || echo "create-certificate: ya existe o límite alcanzado, sigo"
          # Crea el provisioning profile del bundle (incluye HealthKit del App ID).
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Compilar IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Sube el build a TestFlight (no lo manda a review de la App Store).
        submit_to_testflight: true
        # Descomentá y completá para auto-asignar a un grupo de testers interno:
        # beta_groups:
        #   - "Pump Team interno"
